<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BB Video System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js';document.head.appendChild(s)"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#14141d;--surface-2:#1d1d2a;--surface-3:#262635;--border:rgba(255,255,255,0.06);--border-strong:rgba(255,255,255,0.12);--accent:#a855f7;--accent-2:#7c3aed;--accent-glow:rgba(168,85,247,0.15);--accent-soft:rgba(168,85,247,0.08);--text:#f1f5f9;--text-2:#94a3b8;--text-3:#64748b;--green:#22c55e;--green-soft:rgba(34,197,94,0.12);--amber:#f59e0b;--amber-soft:rgba(245,158,11,0.12);--red:#ef4444;--red-soft:rgba(239,68,68,0.12);--blue:#3b82f6;--blue-soft:rgba(59,130,246,0.12);--sidebar-w:240px;--topbar-h:64px;--shadow-modal:rgba(0,0,0,0.5);--shadow-soft:rgba(0,0,0,0.25)}
[data-theme="light"]{--bg:#f7f7fa;--surface:#ffffff;--surface-2:#f1f1f6;--surface-3:#e5e5ed;--border:rgba(15,15,30,0.08);--border-strong:rgba(15,15,30,0.18);--accent:#9333ea;--accent-2:#7e22ce;--accent-glow:rgba(147,51,234,0.18);--accent-soft:rgba(147,51,234,0.10);--text:#0f1117;--text-2:#475569;--text-3:#94a3b8;--green:#16a34a;--green-soft:rgba(22,163,74,0.12);--amber:#d97706;--amber-soft:rgba(217,119,6,0.12);--red:#dc2626;--red-soft:rgba(220,38,38,0.10);--blue:#2563eb;--blue-soft:rgba(37,99,235,0.10);--shadow-modal:rgba(15,15,30,0.18);--shadow-soft:rgba(15,15,30,0.06)}
html,body{transition:background-color .25s ease,color .25s ease}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:56px 48px 40px;width:100%;max-width:440px;box-shadow:0 24px 80px var(--shadow-modal)}
.bb-wordmark{text-align:center;line-height:0.88;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:2px}
.bb-logo-wrap{text-align:center;margin-bottom:8px}
.bb-logo-img{width:240px;max-width:72%;height:auto;display:inline-block}
.bb-wm-row{font-family:'Poppins',sans-serif;font-size:46px;font-weight:800;letter-spacing:-0.04em;color:var(--text);text-transform:uppercase;display:flex;align-items:center;justify-content:center;line-height:0.95}
.bb-wm-row.with-arrow{padding-left:8px}
.bb-arrow{display:inline-block;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:14px solid var(--text);margin-right:-4px;margin-top:-22px;align-self:flex-start;position:relative;top:6px}
.bb-inf{display:inline-block;font-size:0.95em;font-weight:800;letter-spacing:-0.18em;margin:0 -0.08em;transform:translateY(0.04em);font-family:'Poppins',sans-serif}
.login-subtitle{text-align:center;font-size:11px;font-weight:700;letter-spacing:0.32em;color:var(--accent);text-transform:uppercase;margin-top:12px;margin-bottom:24px}
.login-date{text-align:center;color:var(--text-3);font-size:13px;margin-bottom:28px}
.login-input-big{width:100%;background:var(--surface-2);border:1px solid transparent;border-radius:10px;padding:18px 20px;color:var(--text);font-size:13px;font-weight:600;text-align:center;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:12px;transition:all 0.15s;display:block}
.login-input-big::placeholder{color:var(--text-3);letter-spacing:0.24em;font-weight:500}
.login-input-big:focus{outline:none;border-color:var(--accent);background:var(--surface-3)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:white;font-weight:800;padding:18px 20px;border-radius:10px;margin-top:4px;font-size:14px;letter-spacing:0.24em;text-transform:uppercase;transition:all 0.15s;box-shadow:0 8px 24px rgba(168,85,247,0.3)}
.login-btn:hover{transform:translateY(-1px)}
.login-error{color:var(--red);font-size:12px;margin-top:14px;text-align:center;min-height:16px;font-weight:500}
.version-marker{position:fixed;bottom:10px;right:14px;font-size:9px;color:var(--text-3);letter-spacing:0.1em;font-weight:500;opacity:0.5;z-index:1000}
.app{display:flex;height:100vh;position:relative}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:20px 18px 14px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-brand{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.sidebar-bb-logo-img{width:160px;max-width:100%;height:auto;display:block;margin:0}
.sidebar-bb-wm{font-family:'Poppins',sans-serif;font-weight:800;line-height:0.9;letter-spacing:-0.04em;color:var(--text);text-transform:uppercase;text-align:center}
.sidebar-bb-wm .sb-row{font-size:22px;display:flex;align-items:center;justify-content:center;line-height:0.95}
.sidebar-bb-wm .sb-arrow{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:7px solid var(--text);margin-right:-3px;margin-top:-12px;align-self:flex-start;position:relative;top:4px}
.sidebar-bb-wm .sb-inf{font-size:0.95em;letter-spacing:-0.18em;margin:0 -0.08em;transform:translateY(0.05em);display:inline-block}
.sidebar-subtitle{font-size:9px;font-weight:700;letter-spacing:0.28em;color:var(--accent);text-transform:uppercase;text-align:left;margin-top:4px}
.sidebar-clock{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;margin-top:4px}
.sidebar-clock-time{font-size:22px;font-weight:800;color:var(--text);letter-spacing:0.04em;font-variant-numeric:tabular-nums;line-height:1}
.sidebar-clock-date{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;margin-top:6px}
.sidebar-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);display:grid;place-items:center;font-weight:800;font-size:14px;color:white;box-shadow:0 2px 12px var(--accent-glow)}
.sidebar-title{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text);text-transform:uppercase}
.sidebar-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;padding:12px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;color:var(--text-2);font-size:13px;font-weight:500;transition:all 0.12s;text-align:left;width:100%;cursor:pointer}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;background:var(--surface-3);color:var(--text-2);padding:1px 7px;border-radius:10px;font-weight:600}
.nav-badge.alert{background:var(--red-soft);color:var(--red)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surface-2);margin-bottom:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);display:grid;place-items:center;font-weight:700;font-size:11px;color:white;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em}
.logout-btn{width:100%;padding:8px;border-radius:6px;color:var(--text-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.15s}
.logout-btn:hover{background:var(--surface-2);color:var(--text-2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topbar-h);padding:0 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--surface);flex-shrink:0}
.topbar-titles{flex:1;min-width:0;overflow:hidden}
.topbar-titles .topbar-title,.topbar-titles .topbar-subtitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:var(--text)}
.topbar-subtitle{font-size:12px;color:var(--text-3);margin-top:2px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.page{flex:1;overflow:auto;padding:24px 28px 40px}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:white;box-shadow:0 2px 12px rgba(168,85,247,0.25)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border-strong)}
.btn-secondary:hover{background:var(--surface-3);border-color:var(--accent)}
.btn-ghost{color:var(--text-2);padding:8px 12px;font-size:12px}
.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-danger{color:var(--red)}
.btn-danger:hover{background:var(--red-soft)}
.btn-sm{padding:6px 12px;font-size:12px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.01em}
.page-sub{font-size:13px;color:var(--text-3);margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-card-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.stat-card-value{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.stat-card-sub{font-size:11px;color:var(--text-3);margin-top:6px}
.stat-card-sub.red{color:var(--red)}
.stat-card-sub.green{color:var(--green)}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:22px}
.pillar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;border-left:3px solid var(--text-3)}
.pillar.green{border-left-color:var(--green)}
.pillar.amber{border-left-color:var(--amber)}
.pillar.red{border-left-color:var(--red)}
.pillar-title{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.pillar-status{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)}
.pillar.green .pillar-status{color:var(--green)}
.pillar.amber .pillar-status{color:var(--amber)}
.pillar.red .pillar-status{color:var(--red)}
.pillar-note{font-size:11px;color:var(--text-3);line-height:1.4}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.06em}
.panel-body{padding:14px 18px}
.panel-row{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);font-size:13px}
.panel-row:last-child{border-bottom:none}
.panel-row:hover{background:var(--surface-2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:2fr 1fr;gap:14px}
@media(max-width:1100px){.two-col,.three-col{grid-template-columns:1fr}}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-input,.filter-select{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;min-width:160px}
.filter-input{flex:1;min-width:200px}
.filter-input:focus,.filter-select:focus{outline:none;border-color:var(--accent)}
.tbl{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;border-collapse:collapse}
.tbl th{text-align:left;padding:12px 16px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;background:var(--surface-2);border-bottom:1px solid var(--border)}
.tbl td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable{cursor:pointer;transition:background 0.12s}
.tbl tr.clickable:hover{background:var(--surface-2)}
.tbl .muted{color:var(--text-3);font-size:12px}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;background:var(--surface-2);color:var(--text-2)}
.tag.green{background:var(--green-soft);color:var(--green)}
.tag.amber{background:var(--amber-soft);color:var(--amber)}
.tag.red{background:var(--red-soft);color:var(--red)}
.tag.blue{background:var(--blue-soft);color:var(--blue)}
.tag.purple{background:var(--accent-soft);color:var(--accent)}
.pipeline-board-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:10px;margin-bottom:-10px}
.pipeline-board{display:flex;gap:14px;min-height:calc(100vh - 230px)}
.stage-col{width:286px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;max-height:calc(100vh - 230px)}
.stage-header{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border)}
.stage-title{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em;flex:1;display:flex;align-items:center;gap:8px}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.stage-dot.s-video_shot{background:#3b82f6}
.stage-dot.s-cutting_color_grading{background:#06b6d4}
.stage-dot.s-rendering{background:#8b5cf6}
.stage-dot.s-editing{background:#f59e0b}
.stage-dot.s-team_review{background:#a855f7}
.stage-dot.s-changes{background:#ef4444}
.stage-dot.s-client_review{background:#2563eb}
.stage-dot.s-client_changes{background:#f97316}
.stage-dot.s-coo_check{background:#ec4899}
.stage-dot.s-sent_to_client{background:#22c55e}
.stage-dot.s-video_head_review{background:#7c3aed}
.stage-dot.s-add_to_drive{background:#14b8a6}
.stage-dot.s-posted{background:#64748b}
.stage-count{background:var(--surface-2);color:var(--text-2);font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;min-width:26px;text-align:center}
.stage-cards{padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1}
.stage-cards.drop-target{background:var(--accent-soft)}
.stage-empty{padding:20px 10px;text-align:center;color:var(--text-3);font-size:11px;font-style:italic}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:grab;transition:all 0.18s;border-left:3px solid var(--text-3);position:relative}
.card.pr-urgent{border-left-color:var(--red)}
.card.pr-high{border-left-color:var(--amber)}
.card.pr-medium{border-left-color:var(--blue)}
.card.pr-low{border-left-color:var(--text-3)}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow-soft)}
.card.dragging{opacity:0.4;cursor:grabbing}
.card-title{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-0.01em}
.card-client{font-size:10px;color:var(--text-3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.card-meta-left{display:flex;align-items:center;gap:6px}
.priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.priority-urgent{background:var(--red);box-shadow:0 0 8px var(--red)}
.priority-high{background:var(--amber)}
.priority-medium{background:var(--blue)}
.priority-low{background:var(--text-3)}
.card-deadline{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.card-deadline.overdue{color:var(--red);font-weight:700}
.card-avatar{width:24px;height:24px;border-radius:50%;background:var(--surface-3);display:grid;place-items:center;font-size:9px;font-weight:700;color:var(--text)}
.card-avatar.assigned{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:white}
.modal-backdrop{position:fixed;inset:0;background:var(--shadow-modal);backdrop-filter:blur(4px);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.15s}
.modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:14px;width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px var(--shadow-modal);animation:slideUp 0.2s}
.modal-large{max-width:820px}
.modal-xl{max-width:1100px}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-sub{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}
.modal-close{color:var(--text-3);font-size:22px;width:32px;height:32px;border-radius:6px;display:grid;place-items:center;transition:all 0.15s;flex-shrink:0}
.modal-close:hover{background:var(--surface-2);color:var(--text)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.form-grid{display:grid;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.field-input,.field-select,.field-textarea{width:100%;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;transition:all 0.15s}
.field-input:focus,.field-select:focus,.field-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field-textarea{resize:vertical;min-height:70px;font-family:inherit}
.detail-section{margin-bottom:22px}
.detail-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
.detail-meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.detail-meta-item{background:var(--surface-2);padding:10px 12px;border-radius:8px}

.attn-panel{background:linear-gradient(135deg,rgba(239,68,68,0.06) 0%,var(--surface) 60%);border:1px solid var(--red);border-radius:14px;padding:18px 20px;margin-bottom:22px}
.attn-panel.all-clear{background:linear-gradient(135deg,var(--green-soft) 0%,var(--surface) 60%);border-color:var(--green);padding:16px 20px}
.attn-panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.attn-panel-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:0.08em}
.attn-panel-count{font-size:12px;font-weight:700;color:var(--red);background:rgba(239,68,68,0.12);padding:4px 12px;border-radius:20px}
.attn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.attn-block{background:var(--surface-2);border-radius:10px;padding:12px 14px;border-left:3px solid var(--text-3)}
.attn-block.red{border-left-color:var(--red)}
.attn-block.amber{border-left-color:var(--amber)}
.attn-block-label{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
.attn-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid var(--border);cursor:pointer;transition:all 0.12s}
.attn-row:first-of-type{border-top:none}
.attn-row:hover{padding-left:4px}
.attn-row-main{flex:1;min-width:0}
.attn-row-title{font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attn-row-sub{font-size:10.5px;color:var(--text-3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attn-tag{font-size:9px;font-weight:800;letter-spacing:0.05em;padding:3px 8px;border-radius:5px;flex-shrink:0;text-transform:uppercase}
.attn-tag.red{background:rgba(239,68,68,0.15);color:#ef4444}
.attn-tag.amber{background:rgba(245,158,11,0.15);color:#f59e0b}
.attn-more{font-size:11px;color:var(--text-3);font-style:italic;padding-top:8px;border-top:1px solid var(--border);margin-top:4px}
.attn-overload{margin-top:14px;padding:10px 14px;background:rgba(245,158,11,0.1);border:1px solid var(--amber);border-radius:8px;font-size:12px;color:var(--text-2)}
.attn-overload strong{color:var(--amber)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
/* ============================================================
   MOBILE LAYER — added on top of v23. Everything desktop is
   above this line and is NOT modified. These 3 base rules only
   hide brand-new nodes that do not exist in the desktop build,
   so desktop renders pixel-identical.
   ============================================================ */
.m-menu-btn{display:none}
.shoot-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px}
.shoot-tab{background:none;border:none;color:var(--text-3);font-size:13px;font-weight:600;padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.shoot-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.shoot-card-meta{font-size:11px;color:var(--text-3);margin-top:6px}
.card-smm{font-size:10px;color:var(--text-3);margin-top:3px;text-transform:uppercase;letter-spacing:.03em}
.card-editor-name{font-size:11px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.04em;align-self:center}
.card-editor-name.unassigned{color:var(--text-3);font-weight:500}
.shoot-card-actions{display:flex;gap:6px;margin-top:10px}
.shoot-card-actions .btn{flex:1}
.shoot-card-actions .shoot-del{flex:0 0 auto;width:34px;color:var(--text-3)}
.shoot-card-actions .shoot-del:hover{color:var(--red);background:var(--red-soft)}
.shoot-card.dragging{opacity:.4}
[data-shoot-drop].drop-hot{background:var(--accent-soft);border-radius:10px}
.cal-head{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.cal-month{font-size:18px;font-weight:700;color:var(--text)}
.cal-sub{margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-size:10px;font-weight:700;color:var(--text-3);letter-spacing:.08em;text-align:center;padding:6px 0}
.cal-cell{min-height:96px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:6px}
.cal-cell.cal-empty{background:transparent;border:none}
.cal-cell.cal-has{border-color:var(--accent)}
.cal-daynum{font-size:12px;color:var(--text-3);font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cal-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;border-radius:9px;padding:1px 6px}
.cal-event{background:var(--surface-3);border-radius:5px;padding:4px 6px;margin-bottom:4px;cursor:pointer;border-left:2px solid var(--accent)}
.cal-event:hover{background:var(--accent-soft)}
.cal-event-client{font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:.03em;font-weight:700}
.cal-event-title{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media (max-width:768px){

  .cal-grid{gap:3px}
  .cal-cell{min-height:62px;padding:4px}
  .cal-dow{font-size:8px}
  .cal-event-title{font-size:9px}
  .cal-event-client{font-size:8px}
  .cal-head{gap:8px}
  .cal-month{font-size:15px}
}

.card-move{display:none}
.card-menu-btn{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-3);font-size:16px;font-weight:700;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;z-index:2;transition:all .12s}
.card-menu-btn:hover{background:var(--surface-3);color:var(--text)}
.card-menu-dropdown{position:fixed;background:var(--surface);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 12px 36px var(--shadow-modal);z-index:300;min-width:160px;padding:6px;display:flex;flex-direction:column;gap:2px}
.card-menu-dropdown button{background:none;border:none;color:var(--text);font-size:12px;font-weight:500;padding:8px 12px;border-radius:7px;cursor:pointer;text-align:left;transition:background .12s;display:flex;align-items:center;gap:8px}
.card-menu-dropdown button:hover{background:var(--surface-2)}
.card-menu-dropdown button.danger{color:var(--red)}
.card-menu-dropdown button.danger:hover{background:var(--red-soft)}

function fmtDate(d){if(!d)return'';const x=new Date(d);const t=new Date();const tom=new Date(t.getTime()+86400000);if(x.toDateString()===t.toDateString())return'Today';if(x.toDateString()===tom.toDateString())return'Tomorrow';return x.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}

// === VIDEO COUNT HELPER ===
// Returns {posted, target, progressClass} for a client this month
function clientVideoCount(clientId){
  const now=new Date();
  const curMonth=now.getMonth()+1; // 1-indexed
  const curYear=now.getFullYear();
  const PUBLISHED=['posted','add_to_drive','sent_to_client'];
  // Count from active + archived projects matching this month
  const all=(DATA.projects||[]).concat(DATA.archivedProjects||[]);
  const posted=all.filter(p=>p.client_id===clientId&&PUBLISHED.includes(p.current_stage)&&parseInt(p.target_month)===curMonth&&parseInt(p.target_year||curYear)===curYear).length;
  const cl=getClient(clientId);
  const target=cl?.videos_per_month||cl?.monthly_videos||cl?.video_target||null;
  let progressClass='';
  if(target){
    if(posted>=target)progressClass='complete';
    if(posted>target)progressClass='over';
  }
  return {posted,target,progressClass};
}
function videoCountHtml(clientId){
  const {posted,target,progressClass}=clientVideoCount(clientId);
  if(!target)return `<span class="muted">${posted} this month</span>`;
  const pct=Math.min(100,(posted/target)*100);
  return `<span class="videos-progress ${progressClass}">${posted}/${target}<span class="videos-progress-bar"><span class="videos-progress-fill" style="width:${pct}%"></span></span></span>`;
}

// === TIME BREAKDOWN (from video_stage_history) ===
async function getProjectTimeBreakdown(pid){
  try{
    const {data}=await sb.from('video_stage_history').select('stage,duration_seconds,entered_at,exited_at').eq('video_project_id',pid);
    if(!data||!data.length)return {editing:0,changes:0,total:0,hasOpen:false};
    let editing=0,changes=0,total=0,hasOpen=false;
    data.forEach(r=>{
      let secs=r.duration_seconds;
      if(!secs&&r.entered_at&&!r.exited_at){
        secs=Math.floor((Date.now()-new Date(r.entered_at).getTime())/1000);
        hasOpen=true;
      }
      if(!secs)return;
      total+=secs;
      if(r.stage==='editing'||r.stage==='cutting_color_grading')editing+=secs;
      if(r.stage==='changes'||r.stage==='client_changes')changes+=secs;
    });
    return {editing,changes,total,hasOpen};
  }catch(_){return {editing:0,changes:0,total:0,hasOpen:false}}
}
// Returns the team_members.id for current user (used to filter editor visibility). null if not in team_members.
function currentEditorId(){if(!isEditor()||!DATA.teamMembers)return null;const m=DATA.teamMembers.find(x=>x.name&&x.name.toUpperCase()===currentUser.name.toUpperCase());return m?m.id:null}
// Filter projects: editors only see projects assigned to them. Everyone else sees all.
function visibleProjects(){if(!isEditor())return DATA.projects||[];const eid=currentEditorId();if(!eid)return [];return (DATA.projects||[]).filter(p=>Number(p.assigned_editor_id)===Number(eid))}
// Returns the monthly video target for a client. Tries multiple column names then falls back to summing smm_shoots.vids for current month.
function videoTarget(client){
  if(!client)return 0;
  const cols=['videos_per_month','monthly_videos','video_count','videos_mo','monthly_video_target','vids_per_month'];
  for(const c of cols){if(client[c]!=null&&!isNaN(parseInt(client[c])))return parseInt(client[c])}
  // Fallback: sum smm_shoots.vids for this client this month
  if(DATA.shoots){
    const mStart=startOfMonth();
    const mEnd=new Date(mStart.getFullYear(),mStart.getMonth()+1,1);
    const sh=DATA.shoots.filter(s=>s.client_id===client.id&&s.shoot_date&&new Date(s.shoot_date)>=mStart&&new Date(s.shoot_date)<mEnd);
    return sh.reduce((sum,s)=>sum+(parseInt(s.vids)||0),0);
  }
  return 0;
}
// Returns count of projects posted this month for a client
function videosPostedThisMonth(clientId){
  const mStart=startOfMonth();
  return (DATA.projects||[]).filter(p=>p.client_id===clientId&&p.current_stage==='posted'&&p.completed_at&&new Date(p.completed_at)>=mStart).length;
}
// Returns total seconds spent in given stages for a project (from video_stage_history)
function stageDurationSecs(projectId,stageKeys){
  if(!DATA.stageHistory)return 0;
  const stages=Array.isArray(stageKeys)?stageKeys:[stageKeys];
  const now=Date.now();
  return DATA.stageHistory
    .filter(h=>Number(h.video_project_id)===Number(projectId)&&stages.includes(h.stage))
    .reduce((sum,h)=>{
      if(h.duration_seconds)return sum+h.duration_seconds;
      if(h.entered_at&&!h.exited_at)return sum+Math.floor((now-new Date(h.entered_at).getTime())/1000);
      return sum;
    },0);
}

// === IMAGE ATTACH HELPER ===
// returns base64 data URI for inserting into image_url column, OR null
// Used by both project comments and team chat. Bound to elements by hostId.
const PENDING_IMG = {}; // hostId -> base64
function imageAttachHtml(hostId){
  return `<div class="image-attach" data-drop-host="${hostId}">
    <button type="button" class="image-attach-btn" data-attach-host="${hostId}">📎 Attach image</button>
    <input type="file" accept="image/*" hidden id="${hostId}-file">
    <span class="image-attach-hint">paste (Cmd/Ctrl+V) or drag & drop an image here</span>
  </div>
  <div id="${hostId}-preview"></div>`;
}
function wireImageAttach(hostId,hostTextarea){
  // file pick
  const btn=document.querySelector(`[data-attach-host="${hostId}"]`);
  const file=$(`#${hostId}-file`);
  if(btn&&file){btn.addEventListener('click',()=>file.click());file.addEventListener('change',e=>{const f=e.target.files[0];if(f)readImageFile(f,hostId);e.target.value=''});}
  // paste handler attached to the textarea
  const ta=hostTextarea?$(hostTextarea):null;
  if(ta){ta.addEventListener('paste',e=>{const items=(e.clipboardData||window.clipboardData).items;for(const it of items){if(it.type.indexOf('image')===0){const f=it.getAsFile();if(f){e.preventDefault();readImageFile(f,hostId)}break}}});}
  // drag and drop on the attach block AND the textarea
  const dropZones=[document.querySelector(`[data-drop-host="${hostId}"]`),ta].filter(Boolean);
  dropZones.forEach(zone=>{
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('img-drop-hot')});
    zone.addEventListener('dragleave',()=>zone.classList.remove('img-drop-hot'));
    zone.addEventListener('drop',e=>{
      e.preventDefault();zone.classList.remove('img-drop-hot');
      const files=e.dataTransfer?.files||[];
      if(!files.length)return;
      if(files.length>1){toast('Only one image at a time — using the first','info')}
      const f=files[0];
      if(!f.type.startsWith('image/')){toast('Only images can be dropped here','error');return}
      readImageFile(f,hostId);
    });
  });
}
function readImageFile(file,hostId){
  if(file.size>3*1024*1024){toast('Image too large (max 3MB)','error');return}
  if(PENDING_IMG[hostId]){toast('Replaced previous image','info')}
  const r=new FileReader();
  r.onerror=()=>toast('Could not read image file','error');
  r.onload=ev=>{
    PENDING_IMG[hostId]=ev.target.result;
    const pv=$(`#${hostId}-preview`);
    if(pv){pv.innerHTML=`<div class="image-preview-wrap"><img class="image-preview" src="${ev.target.result}"><div class="image-preview-remove" data-clear-img="${hostId}" title="Remove image">×</div></div>`;}
  };
  r.readAsDataURL(file);
}
function clearPendingImg(hostId){delete PENDING_IMG[hostId];const pv=$(`#${hostId}-preview`);if(pv)pv.innerHTML='';const f=$(`#${hostId}-file`);if(f)f.value='';}

// === NOTIFICATIONS ===
// Derived from DATA on every render — no new tables, no extra writes.
// Per-user "last seen" stored in localStorage so unread state is personal & local.
function notifLastSeenKey(){return 'bb_notif_seen_'+(currentUser?.name||'anon').toUpperCase()}
function notifLastSeen(){const v=localStorage.getItem(notifLastSeenKey());return v?parseInt(v):0}
function notifMarkAllSeen(){localStorage.setItem(notifLastSeenKey(),Date.now().toString())}
function deriveNotifications(){
  if(!currentUser||!DATA.projects||!DATA.teamMembers)return [];
  const isAdminUser=isAdmin();
  const me=DATA.teamMembers.find(m=>m.name&&m.name.toUpperCase()===currentUser.name.toUpperCase());
  const meId=me?Number(me.id):null;
  // Window: last 30 days only; anything older is irrelevant noise
  const cutoff=Date.now()-30*24*3600*1000;
  // Build a project lookup so we can attach project metadata to each event
  const projectById={};(DATA.projects||[]).forEach(p=>projectById[p.id]=p);
  const events=[];
  // 1) Comments
  (DATA.projectComments||[]).forEach(c=>{
    const t=c.created_at?new Date(c.created_at).getTime():0;
    if(!t||t<cutoff)return;
    const p=projectById[c.video_project_id]; if(!p)return;
    // Admin: see everything. Editor: only their own projects.
    if(!isAdminUser&&Number(p.assigned_editor_id)!==meId)return;
    // Self-notify: skip own comments
    if((c.author||'').toUpperCase()===currentUser.name.toUpperCase())return;
    events.push({t,kind:'comment',pid:p.id,projectTitle:p.title,who:c.author||'Someone',preview:(c.body||'').slice(0,80)||(c.image_url?'[image]':'')});
  });
  // 2) Stage moves (Changes / Editing / video_head_review only — high-signal stages)
  const NOTIFY_STAGES=['changes','client_changes','editing','video_head_review'];
  (DATA.stageHistory||[]).forEach(h=>{
    const t=h.entered_at?new Date(h.entered_at).getTime():0;
    if(!t||t<cutoff)return;
    if(!NOTIFY_STAGES.includes(h.stage))return;
    const p=projectById[h.video_project_id]; if(!p)return;
    if(!isAdminUser&&Number(p.assigned_editor_id)!==meId)return;
    if((h.moved_by||'').toUpperCase()===currentUser.name.toUpperCase())return;
    const stageLabel=STAGES.find(s=>s.key===h.stage)?.label||h.stage;
    events.push({t,kind:'move',pid:p.id,projectTitle:p.title,who:h.moved_by||'Someone',preview:'→ '+stageLabel});
  });
  // 3) New project assigned to you (editor only — admins create them, they don't get "assigned")
  if(!isAdminUser&&meId){
    (DATA.projects||[]).forEach(p=>{
      if(Number(p.assigned_editor_id)!==meId)return;
      const t=p.created_at?new Date(p.created_at).getTime():0;
      if(!t||t<cutoff)return;
      if((p.created_by||'').toUpperCase()===currentUser.name.toUpperCase())return;
      events.push({t,kind:'assigned',pid:p.id,projectTitle:p.title,who:p.created_by||'Someone',preview:'Assigned to you'});
    });
  }
  events.sort((a,b)=>b.t-a.t);
  return events.slice(0,30); // cap shown
}
function timeAgoShort(t){
  const s=Math.floor((Date.now()-t)/1000);
  if(s<60)return s+'s ago';
  const m=Math.floor(s/60); if(m<60)return m+'m ago';
  const h=Math.floor(m/60); if(h<24)return h+'h ago';
  const d=Math.floor(h/24); return d+'d ago';
}
function renderNotifications(){
  const wrap=$('#notifWrap'); if(!wrap)return;
  if(!currentUser){wrap.innerHTML='';return}
  const events=deriveNotifications();
  const lastSeen=notifLastSeen();
  const unread=events.filter(e=>e.t>lastSeen).length;
  wrap.innerHTML=`<button class="notif-bell${unread>0?' has-unread':''}" id="notifBell" aria-label="Notifications" title="${unread} unread"><svg class="notif-bell-svg" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6 8a6 6 0 1 1 12 0c0 4.5 1.5 5.5 2 7H4c.5-1.5 2-2.5 2-7Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 18a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>${unread>0?`<span class="notif-badge">${unread>99?'99+':unread}</span>`:''}</button>`;
  const bell=$('#notifBell'); if(!bell)return;
  bell.onclick=e=>{e.stopPropagation();toggleNotifPanel(events)};
}
function toggleNotifPanel(events){
  const existing=$('#notifPanel');
  if(existing){existing.remove();return}
  const wrap=$('#notifWrap'); if(!wrap)return;
  const lastSeen=notifLastSeen();
  const html=`<div class="notif-panel" id="notifPanel">
    <div class="notif-head"><div class="notif-title">Notifications</div><div class="notif-sub">${events.length?events.length+' in last 30 days':'No recent activity'}</div></div>
    <div class="notif-list">${events.length?events.map(e=>{
      const isNew=e.t>lastSeen;
      const icon=e.kind==='comment'?'💬':(e.kind==='move'?'↻':'➕');
      return `<div class="notif-item ${isNew?'new':''}" data-notif-pid="${e.pid}"><div class="notif-icon">${icon}</div><div class="notif-body"><div class="notif-line"><strong>${esc(e.who)}</strong> ${e.kind==='comment'?'commented on':(e.kind==='move'?'moved':'created')} <strong>${esc(e.projectTitle||'a project')}</strong></div>${e.preview?`<div class="notif-preview">${esc(e.preview)}</div>`:''}<div class="notif-time">${timeAgoShort(e.t)}</div></div></div>`;
    }).join(''):'<div class="notif-empty">You\'re all caught up</div>'}</div>
    ${events.length?'<div class="notif-foot"><button class="btn btn-ghost btn-sm" id="notifMarkRead">Mark all as read</button></div>':''}
  </div>`;
  wrap.insertAdjacentHTML('beforeend',html);
  const panel=$('#notifPanel');
  panel.addEventListener('click',ev=>{
    const item=ev.target.closest('[data-notif-pid]');
    if(item){const pid=parseInt(item.dataset.notifPid);panel.remove();notifMarkAllSeen();renderNotifications();if(typeof openProjectDetail==='function')openProjectDetail(pid);return}
    if(ev.target.closest('#notifMarkRead')){notifMarkAllSeen();renderNotifications();panel.remove();return}
  });
  // close on outside click
  setTimeout(()=>{const off=e=>{if(!panel.contains(e.target)&&!e.target.closest('#notifBell')){panel.remove();document.removeEventListener('click',off)}};document.addEventListener('click',off)},10);
}

function setupLogin(){
  const dEl=$('#loginDate');if(dEl)dEl.textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  $('#loginBtn').onclick=doLogin;
  ['#loginName','#loginPin'].forEach(s=>{const el=$(s);if(el)el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})});
  const saved=sessionStorage.getItem('bb_video_user');
  if(saved){try{const u=JSON.parse(saved);const ex=USERS.find(x=>x.name===u.name);if(ex){onLoginSuccess(ex);return}}catch(_){}}
  setTimeout(()=>$('#loginName')?.focus(),100);
}
function doLogin(){
  const n=$('#loginName').value.trim().toUpperCase();const p=$('#loginPin').value.trim();const e=$('#loginError');
  if(!n){e.textContent='Enter your name';return}
  if(!p){e.textContent='Enter your PIN';return}
  const u=USERS.find(x=>x.name===n);
  if(!u){e.textContent=`User "${n}" not found`;return}
  if(u.pin!==p){e.textContent='Wrong PIN';$('#loginPin').value='';return}
  e.textContent='';onLoginSuccess(u);
}
function onLoginSuccess(u){
  currentUser=u;sessionStorage.setItem('bb_video_user',JSON.stringify({name:u.name}));
  $('#loginScreen').hidden=true;$('#app').hidden=false;
  $('#userName').textContent=u.name;$('#userRole').textContent=u.role.replace('_',' ');
  $('#userAvatar').textContent=initials(u.name);
  // Write login to team_login_logs so CC Team page can see it
  const memberId = {THULAIB:1,SHIARA:2,USHANE:5,RAJEEWA:6,RAMANI:11,SANDUNU:null}[u.name];
  if(memberId&&sb){
    try{sb.from('team_login_logs').insert({team_member_id:memberId,member_name:u.name,logged_in_at:new Date().toISOString(),app:'video-system'}).catch(()=>{});}catch(_){}
  }
  bootApp();
}
function logout(){sessionStorage.removeItem('bb_video_user');if(refreshTimer)clearInterval(refreshTimer);currentUser=null;$('#app').hidden=true;$('#loginScreen').hidden=false;$('#loginPin').value=''}

// === BOOT ===
function bootApp(){
  buildSidebar();
  startClock();
  $('#logoutBtn').onclick=logout;
  currentPage=isEditor()?'my_dashboard':'dashboard';
  navTo(currentPage);
  // Guard: bootApp runs on every login. Without this, each login stacks another global listener.
  if(!window._bbGlobalListeners){
    document.addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
    window._bbGlobalListeners=true;
  }
  fetchAll();
  if(refreshTimer)clearInterval(refreshTimer);
  refreshTimer=setInterval(()=>{fetchAll(true)},REFRESH_MS);
}

// === DATA FETCH ===
let _pendingOps=0;
async function fetchAll(silent=false){
  if(silent&&_pendingOps>0)return;
  try{
    const [pr,cr,tr,llr,slr,clr,tkr,inr,shr,pcr,cmtr]=await Promise.all([
      sb.from('video_projects').select('*').eq('is_archived',false).order('created_at',{ascending:false}),
      sb.from('clients').select('*'),
      sb.from('team_members').select('id, name, role'),
      sb.from('video_project_links').select('*').order('created_at',{ascending:false}),
      sb.from('smm_shoots').select('*').order('shoot_date',{ascending:true}),
      sb.from('video_chat_messages').select('*').order('created_at',{ascending:true}),
      sb.from('tasks').select('*').order('created_at',{ascending:false}).limit(500),
      sb.from('video_inspo').select('*').order('created_at',{ascending:false}),
      sb.from('video_stage_history').select('*').order('entered_at',{ascending:true}),
      sb.from('video_project_comments').select('*').order('created_at',{ascending:true}),
      sb.from('client_monthly_targets').select('*'),
    ]);
    DATA.projects=pr.data||[];
    DATA.clients=cr.data||[];
    DATA.teamMembers=tr.data||[];
    DATA.links=llr.data||[];
    DATA.shoots=slr.data||[];
    DATA.chats=clr.data||[];
    DATA.tasks=tkr.data||[];
    DATA.inspo=inr.data||[];
    DATA.stageHistory=shr.data||[];
    DATA.projectComments=pcr.data||[];
    DATA.clientTargets=cmtr.data||[];
    // Load archived projects separately — Q2 plan needs them so counts don't break when archive happens
    try{const {data:arch}=await sb.from('video_projects').select('id,client_id,target_month,target_year,current_stage,is_archived').eq('is_archived',true);DATA.archivedProjects=arch||[]}catch(_){DATA.archivedProjects=[]}
    // Filter projects for editors
    if(isEditor()){
      const me=DATA.teamMembers.find(m=>m.name&&m.name.toUpperCase()===currentUser.name.toUpperCase());
      DATA.projects=me?DATA.projects.filter(p=>p.assigned_editor_id===me.id):[];
    }
    // Auto-archive: admin/video_head only. Anything at posted/add_to_drive/sent_to_client for >72h gets archived.
    // We only check projects already in memory (no extra query). Run silently — toast only on error.
    if(currentUser&&(currentUser.role==='admin'||currentUser.role==='video_head')){
      try{await autoArchiveStale()}catch(err){console.warn('auto-archive failed',err)}
    }
    // Load daily pillar state from Supabase (shared across all devices)
    await loadPillarState();
    if(silent){
      // Silent auto-refresh: snapshot every scroll axis before re-render, restore after
      var _pc=$('#pageContent');
      var _st=_pc?_pc.scrollTop:0;
      var _sl=_pc?_pc.scrollLeft:0;
      var _bw=document.querySelector('.pipeline-board-wrap');
      var _bl=_bw?_bw.scrollLeft:0;
      var _colScrolls=Array.from(document.querySelectorAll('.stage-cards')).map(function(c){return c.scrollTop;});
      // Preserve any message being typed in team chat so auto-refresh doesn't wipe it
      var _chatDraft=$('#chatBody')?$('#chatBody').value:'';
      renderPage();
      requestAnimationFrame(function(){
        var pc2=$('#pageContent');
        if(pc2){pc2.scrollTop=_st;pc2.scrollLeft=_sl;}
        var bw2=document.querySelector('.pipeline-board-wrap');
        if(bw2)bw2.scrollLeft=_bl;
        document.querySelectorAll('.stage-cards').forEach(function(c,i){if(_colScrolls[i])c.scrollTop=_colScrolls[i];});
        // Restore typed message if still on team chat
        if(_chatDraft){var cb2=$('#chatBody');if(cb2)cb2.value=_chatDraft;}
      });
    }else{
      renderPage();
    }
    if(!window._vsCheckinInit){window._vsCheckinInit=true;setTimeout(vsCheckinMaybeShow,800);}
  }catch(err){console.error(err);if(!silent)toast('Failed to load data: '+(err.message||''),'error')}
}

// === ROUTER ===
function renderPage(){
  const map={dashboard:renderDashboard,my_dashboard:renderMyDashboard,pipeline:renderPipeline,shoot_pipeline:renderShootPipeline,tasks:renderTasks,time_tracker:renderTimeTracker,weeklyplan:renderWeeklyPlan,drive_links:renderDriveLinks,clients:renderClients,team:renderTeam,analytics:renderAnalytics,team_chat:renderTeamChat,inspo:renderInspoHub,agents:renderAgentsPage};
  const fn=map[currentPage]||renderDashboard;

function renderMyDashboard(){
  const meId=(DATA.teamMembers.find(m=>m.name.toLowerCase()===currentUser.name.toLowerCase())||{}).id;
  const mine=DATA.projects.filter(p=>p.assigned_editor_id===meId);
  const now=Date.now();
  const todayStr=new Date().toISOString().slice(0,10);
  const thisMonthStart=startOfMonth();
  const lastMonthStart=new Date(thisMonthStart);lastMonthStart.setMonth(lastMonthStart.getMonth()-1);
  const lastMonthEnd=new Date(thisMonthStart);
  const weekStart=startOfWeek();
  // Counts
  const active=mine.filter(p=>!COMPLETED_STAGES.includes(p.current_stage));
  const doneThisMonth=mine.filter(p=>p.completed_at&&new Date(p.completed_at)>=thisMonthStart);
  const doneLastMonth=mine.filter(p=>p.completed_at&&new Date(p.completed_at)>=lastMonthStart&&new Date(p.completed_at)<lastMonthEnd);
  const doneThisWeek=mine.filter(p=>p.completed_at&&new Date(p.completed_at)>=weekStart);
  // Turnaround
  const turns=doneThisMonth.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000).filter(n=>n>=0);
  const avgTurn=turns.length?(turns.reduce((s,t)=>s+t,0)/turns.length).toFixed(1):null;
  const turnsLast=doneLastMonth.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000).filter(n=>n>=0);
  const avgTurnLast=turnsLast.length?(turnsLast.reduce((s,t)=>s+t,0)/turnsLast.length).toFixed(1):null;
  // Month-over-month trajectory
  const moDelta=doneThisMonth.length-doneLastMonth.length;
  const moTrend=doneLastMonth.length>0?(moDelta>=0?`<span style="color:var(--green)">▲ ${moDelta} vs last month</span>`:`<span style="color:var(--red)">▼ ${Math.abs(moDelta)} vs last month</span>`):(doneThisMonth.length>0?`<span style="color:var(--green)">first month tracked</span>`:'no history');
  const turnTrend=(avgTurn&&avgTurnLast)?(parseFloat(avgTurn)<=parseFloat(avgTurnLast)?`<span style="color:var(--green)">▲ faster than last month</span>`:`<span style="color:var(--red)">▼ slower than last month</span>`):'';
  // Needs-attention scoped to this editor — honest, not punitive
  const overdueMine=active.filter(p=>p.deadline&&new Date(p.deadline)<new Date(todayStr)).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const dueTodayMine=active.filter(p=>p.deadline&&p.deadline.slice(0,10)===todayStr);
  const dueSoonMine=active.filter(p=>{if(!p.deadline)return false;const d=(new Date(p.deadline)-new Date(todayStr))/86400000;return d>0&&d<=3}).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const attnCount=overdueMine.length+dueTodayMine.length;
  // Simple streak: consecutive days (looking back) where >=1 video completed. Cap at 30.
  let streak=0;
  const completedDays=new Set(mine.filter(p=>p.completed_at).map(p=>p.completed_at.slice(0,10)));
  for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if(completedDays.has(ds))streak++;else if(i>0)break;}
  // Best month (max completed in any calendar month from their history)
  const byMonth={};mine.filter(p=>p.completed_at).forEach(p=>{const k=p.completed_at.slice(0,7);byMonth[k]=(byMonth[k]||0)+1});
  const bestMonth=Math.max(0,...Object.values(byMonth));

  function queueRow(p){const cl=getClient(p.client_id);const ov=p.deadline&&new Date(p.deadline)<new Date(todayStr);return `<div class="panel-row clickable" data-pid="${p.id}"><div><div style="font-size:13px;font-weight:600">${esc(p.title)}</div><div class="muted">${esc(cl?.name||'No client')} · ${STAGES.find(s=>s.key===p.current_stage)?.label||''}</div></div><div class="${ov?'tag red':'tag'}">${p.deadline?(ov?'OVERDUE · ':'')+fmtDate(p.deadline):'no deadline'}</div></div>`}

  $('#pageContent').innerHTML=`
    <div class="page-head"><div><div class="page-title">${esc(currentUser.name)}'s Dashboard</div><div class="page-sub">Your work, your numbers — ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div></div></div>

    <div class="stat-grid">
      ${statCard('Done This Month',doneThisMonth.length,moTrend)}
      ${statCard('Avg Turnaround',avgTurn?avgTurn+'d':'—',turnTrend||(avgTurn?'this month':'no completions yet'))}
      ${statCard('Active Now',active.length,active.length?'in your queue':'queue empty')}
      ${statCard('Done This Week',doneThisWeek.length,'since Monday')}
      ${statCard('Streak',streak+(streak===1?' day':' days'),streak>0?'keep it going':'complete one today')}
    </div>

    ${onPaceForBest&&doneThisMonth.length>0?`<div class="attn-panel all-clear" style="margin-bottom:18px"><div class="attn-panel-title" style="color:var(--green)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>You're matching or beating your best month (${bestMonth}) — strong work</div></div>`:''}

    ${attnCount>0?`<div class="attn-panel" style="margin-bottom:18px">
      <div class="attn-panel-head"><div class="attn-panel-title"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Needs Your Attention</div><span class="attn-panel-count">${attnCount}</span></div>

      </div>
    </div>`:`<div class="attn-panel all-clear" style="margin-bottom:18px"><div class="attn-panel-title" style="color:var(--green)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>Nothing overdue or due today — you're on top of it</div></div>`}

    <div class="two-col">

        ${active.length?active.sort((a,b)=>{const da=a.deadline?new Date(a.deadline):new Date(8640000000000000);const db=b.deadline?new Date(b.deadline):new Date(8640000000000000);return da-db}).map(queueRow).join(''):'<div class="panel-body text-3" style="text-align:center;font-style:italic">No active projects assigned to you</div>'}

const USHANE_PILLARS=[

let _pillarCache={};
function pillarDateStr(){return new Date().toISOString().slice(0,10)}
async function loadPillarState(){
  try{
    const {data,error}=await sb.from('daily_pillar_state').select('state').eq('user_name','USHANE').eq('pillar_date',pillarDateStr()).maybeSingle();
    if(error&&window.bbReportDbError)window.bbReportDbError('daily_pillar_state','load',error);
    _pillarCache=data?.state||{};
  }catch(e){_pillarCache={};if(window.bbReportDbError)window.bbReportDbError('daily_pillar_state','load',e);}
  return _pillarCache;
}
async function savePillarState(s){
  _pillarCache=s;
  try{
    const {error:e1}=await sb.from('daily_pillar_state').upsert({user_name:'USHANE',pillar_date:pillarDateStr(),state:s,updated_at:new Date().toISOString()},{onConflict:'user_name,pillar_date'});
    if(e1){if(window.bbReportDbError)window.bbReportDbError('daily_pillar_state','save',e1);toast('Pillar save failed — see admin','error');}
    // Sync to CC pillars table so Command Centre Team page reads correct data
    const doneIds=JSON.stringify(Object.keys(s).filter(k=>s[k]));
    const {error:e2}=await sb.from('pillars').upsert({who:'USHANE',done_ids:doneIds,updated_at:new Date().toISOString()},{onConflict:'who'});
    if(e2&&window.bbReportDbError)window.bbReportDbError('pillars','save',e2);
  }catch(e){if(window.bbReportDbError)window.bbReportDbError('daily_pillar_state','save',e);}
}
async function toggleUshanePillar(k){const s={..._pillarCache};s[k]=!s[k];_pillarCache=s;_pendingOps++;try{await savePillarState(s);}finally{_pendingOps--;}renderDashboard()}
async function resetUshanePillars(){_pillarCache={};_pendingOps++;try{await savePillarState({});}finally{_pendingOps--;}renderDashboard()}

function renderPipeline(){

  $('#pageActions').innerHTML=`<button class="btn btn-ghost" data-action="refresh">↻</button>${bulkBtn}${isAdmin()?'<button class="btn btn-ghost" data-action="archived" title="View archived projects">🗄</button>':''}${isAdmin()?'<button class="btn btn-primary" data-action="new">+ New Project</button>':''}`;
  $('#pageActions').onclick=e=>{
    if(e.target.closest('[data-action="refresh"]'))fetchAll();

  };
  $('#pageSub').textContent=`${ps.length} of ${DATA.projects.length} project${DATA.projects.length===1?'':'s'}`;
  const filtersHtml=`<div class="filters">
    <input class="filter-input" placeholder="Search project or client..." id="fSearch" value="${esc(f.search)}">
    <select class="filter-select" id="fClient"><option value="">All clients</option>${DATA.clients.map(c=>`<option value="${c.id}" ${f.client==c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
    <select class="filter-select" id="fEditor"><option value="">All editors</option>${editors.map(m=>`<option value="${m.id}" ${f.editor==m.id?'selected':''}>${esc(m.name)}</option>`).join('')}</select>
    <select class="filter-select" id="fPriority"><option value="">All priorities</option>${['urgent','high','medium','low'].map(p=>`<option value="${p}" ${f.priority===p?'selected':''}>${p[0].toUpperCase()+p.slice(1)}</option>`).join('')}</select>
    <select class="filter-select" id="fMonth"><option value="">All months</option>${MONTHS.map((m,i)=>`<option value="${i+1}" ${parseInt(f.month)===i+1?'selected':''}>${m}</option>`).join('')}</select>
    ${(f.search||f.client||f.editor||f.priority||f.month)?'<button class="btn btn-ghost btn-sm" data-action="clear-filters">Clear filters</button>':''}
    <button class="btn btn-ghost btn-sm" data-action="my-work" style="color:var(--accent);font-weight:700">👤 My Work</button>
  </div>`;
  let monthSummaryHtml='';
  if(f.month){
    const DONE=['add_to_drive','posted'];
    const mi=parseInt(f.month);
    const byClient={};const yearsSeen=new Set();
    ps.forEach(p=>{
      if(p.target_year)yearsSeen.add(p.target_year);
      const cid=p.client_id==null?'none':p.client_id;
      if(!byClient[cid])byClient[cid]={done:0,prog:0};

    });
    const rows=Object.keys(byClient).map(cid=>{
      const name=cid==='none'?'— No client —':(getClient(Number(cid))?.name||'Unknown');

      return {name,done:v.done,prog:v.prog,total:v.done+v.prog};
    }).sort((a,b)=>b.total-a.total);
    const totDone=rows.reduce((s,r)=>s+r.done,0),totProg=rows.reduce((s,r)=>s+r.prog,0);
    const mName=MONTHS[mi-1]||f.month;
    const yrs=[...yearsSeen].sort();

    if(e.target.closest('[data-action="clear-filters"]')){FILTERS.pipeline={search:'',client:'',editor:'',priority:'',month:''};renderPipeline();return}

function cardHtml(p){
  const cl=getClient(p.client_id),ed=getMember(p.assigned_editor_id);
  const ov=p.deadline&&isOverdue(p.deadline)&&!COMPLETED_STAGES.includes(p.current_stage);
  // Editors can drag from any stage (editorCanMove always returns true)
  const canDrag=isAdmin()||isVideoHead()||isEditor();
  const dr=(canDrag&&!PIPELINE_STATE.bulkMode)?'draggable="true"':'';
  const mv=(canDrag&&!PIPELINE_STATE.bulkMode)?`<button class="card-move" data-move="${p.id}">&#8645; Move stage</button>`:'';
  const pr=p.priority||'medium';
  const sel=PIPELINE_STATE.selected.has(p.id);
  const bulkClass=PIPELINE_STATE.bulkMode?'selectable':'';
  const selClass=sel?'selected':'';
  const smm=clientSmm(p.client_id);
  const menuBtn=canDrag?`<button class="card-menu-btn" data-card-menu="${p.id}" title="Actions">⋮</button>`:'';
  const checkbox=PIPELINE_STATE.bulkMode?'<div class="card-checkbox"></div>':'';
  return `<div class="card pr-${pr} ${bulkClass} ${selClass}" data-pid="${p.id}" ${dr}>${checkbox}${menuBtn}<div class="card-title">${esc(p.title)}</div><div class="card-client">${esc(cl?.name||'— No client —')}</div>${smm?`<div class="card-smm">SMM: ${esc(smm)}</div>`:''}<div class="card-meta"><div class="card-meta-left"><div class="priority-dot priority-${pr}"></div>${p.deadline?`<div class="card-deadline ${ov?'overdue':''}">${fmtDate(p.deadline)}</div>`:''}</div>${ed?`<div class="card-editor-name">${esc(ed.name)}</div>`:'<div class="card-editor-name unassigned">Unassigned</div>'}</div>${mv}</div>`;
}

  wrap.innerHTML=`<button data-cm="edit">✏ Edit</button><button data-cm="move">↕ Move stage</button><button data-cm="dup">⎘ Duplicate</button><button data-cm="archive">🗄 Archive</button><button data-cm="delete" class="danger">🗑 Delete</button>`;
  document.body.appendChild(wrap);
  // Position near the ⋮ button
  const rect=btn.getBoundingClientRect();
  wrap.style.position='fixed';
  wrap.style.zIndex='300';
  // Place below-right of button, flip up if near bottom
  const spaceBelow=window.innerHeight-rect.bottom;
  if(spaceBelow<200){wrap.style.bottom=(window.innerHeight-rect.top)+'px'}
  else{wrap.style.top=rect.bottom+4+'px'}
  // Flip left if near right edge
  const spaceRight=window.innerWidth-rect.right;
  if(spaceRight<180){wrap.style.right=(window.innerWidth-rect.right)+'px'}
  else{wrap.style.left=rect.left+'px'}
  // Wire actions
  wrap.onclick=async e=>{
    e.stopPropagation();
    const act=e.target.closest('[data-cm]');if(!act)return;
    const cm=act.dataset.cm;
    wrap.remove();document.removeEventListener('click',closeMenu);
    if(cm==='edit')openProjectForm(p);

    if(cm==='dup'){if(confirm('Duplicate this project?')){try{await duplicateProject(pid);await fetchAll();toast('Duplicated','success')}catch(err){toast('Failed: '+(err.message||''),'error')}}}

  };
  // Close on click outside — delayed to avoid immediate trigger
  function closeMenu(e){if(!wrap.contains(e.target)&&e.target!==btn){wrap.remove();document.removeEventListener('click',closeMenu)}}
  requestAnimationFrame(()=>{document.addEventListener('click',closeMenu)});
}

// Auto-archive: scan projects at terminal stages (posted/add_to_drive/sent_to_client) whose
// last stage entry is >72h old, batch-archive them. Uses video_stage_history to find when
// they entered their current stage. Skips if already archived or if entry time unknown.
async function autoArchiveStale(){
  const TERMINAL=['posted','add_to_drive','sent_to_client'];
  const THRESH_MS=72*3600*1000;
  const now=Date.now();
  if(!DATA.projects||!DATA.stageHistory)return;
  // Build a lookup: when each project entered its current (still-open) stage
  const latestStageEntry={};
  DATA.stageHistory.forEach(h=>{
    if(h.exited_at)return;
    const pid=Number(h.video_project_id);
    const t=h.entered_at?new Date(h.entered_at).getTime():0;
    if(!t)return;
    if(!latestStageEntry[pid]||t>latestStageEntry[pid])latestStageEntry[pid]=t;
  });
  const stale=DATA.projects.filter(p=>{
    if(!TERMINAL.includes(p.current_stage))return false;
    const t=latestStageEntry[Number(p.id)];
    if(!t)return false;
    return (now-t)>=THRESH_MS;
  });
  if(!stale.length)return;
  const ids=stale.map(p=>p.id);
  const {error}=await sb.from('video_projects').update({is_archived:true,updated_at:new Date().toISOString()}).in('id',ids);
  if(error)throw error;
  // Update in-memory caches: remove from projects, add to archivedProjects (so Q2 plan still counts them)
  DATA.archivedProjects=(DATA.archivedProjects||[]).concat(stale.map(p=>({id:p.id,client_id:p.client_id,target_month:p.target_month,target_year:p.target_year,current_stage:p.current_stage,is_archived:true})));
  DATA.projects=DATA.projects.filter(p=>!ids.includes(p.id));
  if(typeof toast==='function')toast(`Auto-archived ${stale.length} completed video${stale.length===1?'':'s'} (>72h at final stage)`,'success');
}

async function moveProject(project,newStage){
  const old=project.current_stage;

  if(newStage==='posted')project.completed_at=new Date().toISOString();
  _pendingOps++;
  renderPage();
  let succeeded=false;
  try{
    const {data:open}=await sb.from('video_stage_history').select('*').eq('video_project_id',project.id).is('exited_at',null);
    if(open&&open.length){const o=open[0];const ex=new Date();const en=new Date(o.entered_at);await sb.from('video_stage_history').update({exited_at:ex.toISOString(),duration_seconds:Math.floor((ex-en)/1000)}).eq('id',o.id)}
    await sb.from('video_stage_history').insert({video_project_id:project.id,stage:newStage,moved_by:currentUser.name});
    const up={current_stage:newStage,updated_at:new Date().toISOString()};
    if(newStage==='posted')up.completed_at=new Date().toISOString();
    const {error}=await sb.from('video_projects').update(up).eq('id',project.id);
    if(error)throw error;
    succeeded=true;

  }catch(err){
    console.error(err);toast('Move failed','error');

    if(old!=='posted')project.completed_at=undefined;
  }finally{
    _pendingOps--;
    await fetchAll(true);
  }
}

function stageTimingSection(projectId){
  if(!DATA.stageHistory)return '';
  const hist=DATA.stageHistory.filter(h=>h.video_project_id===projectId);
  if(!hist.length)return '<div class="detail-section"><div class="detail-section-title">Time Tracking</div><div class="link-empty">No stage history yet — timing starts tracking once the project moves between stages</div></div>';
  const editingSecs=stageDurationSecs(projectId,'editing');
  const teamChangesSecs=stageDurationSecs(projectId,'changes');
  const clientChangesSecs=stageDurationSecs(projectId,'client_changes');
  const cuttingSecs=stageDurationSecs(projectId,'cutting_color_grading');
  const renderingSecs=stageDurationSecs(projectId,'rendering');
  const reviewSecs=stageDurationSecs(projectId,['team_review','coo_check']);
  // Build a per-stage list showing entered/exited timestamps
  const histRows=hist.map(h=>{
    const lbl=STAGES.find(s=>s.key===h.stage)?.label||h.stage;
    const dur=h.duration_seconds?fmtDuration(h.duration_seconds):(h.exited_at?fmtDuration((new Date(h.exited_at)-new Date(h.entered_at))/1000):'in progress');
    return `<tr><td>${esc(lbl)}</td><td class="muted">${fmtDateTime(h.entered_at)}</td><td class="muted">${h.exited_at?fmtDateTime(h.exited_at):'<span style="color:var(--accent)">currently here</span>'}</td><td><strong>${dur}</strong></td></tr>`;
  }).join('');
  return `<div class="detail-section"><div class="detail-section-title">Time Tracking</div>
    <div class="detail-meta-grid" style="margin-bottom:14px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
      <div class="detail-meta-item"><div class="detail-meta-label">Cutting/Color</div><div class="detail-meta-value">${fmtDuration(cuttingSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Rendering</div><div class="detail-meta-value">${fmtDuration(renderingSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Editing</div><div class="detail-meta-value">${fmtDuration(editingSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Team Changes</div><div class="detail-meta-value">${fmtDuration(teamChangesSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Client Changes</div><div class="detail-meta-value">${fmtDuration(clientChangesSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Review</div><div class="detail-meta-value">${fmtDuration(reviewSecs)}</div></div>
    </div>
    <details><summary style="cursor:pointer;font-size:12px;color:var(--text-3);padding:6px 0">Show full stage history (${hist.length})</summary>
    <table class="tbl" style="margin-top:8px"><thead><tr><th>Stage</th><th>Entered</th><th>Exited</th><th>Duration</th></tr></thead><tbody>${histRows}</tbody></table>
    </details>
  </div>`;
}

// === PAGE: SHOOT PIPELINE ===
let SHOOT_VIEW='pipeline', SHOOT_CAL=new Date();
function renderShootPipeline(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button><button class="btn btn-primary" data-action="add-shoot">+ Add Shoot</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll();if(e.target.closest('[data-action="add-shoot"]'))openShootForm()};
  const stageResolve=(raw)=>{
    if(raw==null||raw==='')return SHOOT_STAGES[0].key;
    const v=String(raw).trim();
    const exact=SHOOT_STAGES.find(s=>s.key===v); if(exact)return exact.key;
    const byAlt=SHOOT_STAGES.find(s=>s.alt===v); if(byAlt)return byAlt.key;
    const ci=SHOOT_STAGES.find(s=>s.key.toLowerCase()===v.toLowerCase()||s.alt.toLowerCase()===v.toLowerCase()||s.label.toLowerCase()===v.toLowerCase());
    if(ci)return ci.key;
    return '__unmapped__';
  };
  const grouped={}; SHOOT_STAGES.forEach(s=>grouped[s.key]=[]); let unmapped=0;
  DATA.shoots.forEach(sh=>{const k=stageResolve(sh.stage||sh.current_stage);if(k==='__unmapped__'){unmapped++;return;}grouped[k].push(sh)});
  $('#pageSub').textContent=`${DATA.shoots.length} shoots in system`+(unmapped?` · ⚠ ${unmapped} unrecognised stage (not shown)`:'');
  const tabs=`<div class="shoot-tabs"><button class="shoot-tab ${SHOOT_VIEW==='pipeline'?'active':''}" data-sview="pipeline">Pipeline</button><button class="shoot-tab ${SHOOT_VIEW==='calendar'?'active':''}" data-sview="calendar">Weekly Calendar</button></div>`;
  const shootCard=(s)=>{const cl=getClient(s.client_id);const meta=[s.quarter,s.month,(s.video_count!=null?s.video_count+' vids':null),(s.shoot_date?fmtDate(s.shoot_date):null)].filter(Boolean).join(' · ');return `<div class="card shoot-card" draggable="true" data-shoot-id="${s.id}"><div class="card-client" style="text-transform:uppercase;font-size:11px;letter-spacing:.04em;color:var(--accent)">${esc(cl?.name||'— No client —')}</div><div class="card-title">${esc(s.title||'Shoot')}</div><div class="shoot-card-meta">${esc(meta||'No details')}</div><div class="shoot-card-actions"><button class="btn btn-secondary btn-sm" data-edit-shoot="${s.id}">Edit</button><button class="btn btn-ghost btn-sm shoot-del" data-del-shoot="${s.id}" title="Delete shoot">×</button></div></div>`};
  let body;
  if(SHOOT_VIEW==='calendar'){
    body=shootCalendarHtml();
  } else {
    body=`<div class="pipeline-board">${SHOOT_STAGES.map(st=>{const sps=grouped[st.key]||[];return `<div class="stage-col" data-shoot-drop="${st.key}"><div class="stage-header"><div class="stage-title"><span class="stage-dot s-${st.alt}"></span>${st.label}</div><div class="stage-count">${sps.length}</div></div><div class="stage-cards">${sps.length?sps.map(shootCard).join(''):'<div class="stage-empty">No shoots</div>'}</div></div>`}).join('')}</div>`;
  }
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Shoot Pipeline</div><div class="page-sub">Kanban + weekly shoot calendar</div></div></div>${tabs}${body}`;
  $('#pageContent').querySelectorAll('[data-sview]').forEach(b=>b.onclick=()=>{SHOOT_VIEW=b.dataset.sview;renderShootPipeline()});
  $('#pageContent').onclick=async e=>{
    const cp=e.target.closest('[data-cal-prev]'),cn=e.target.closest('[data-cal-next]');
    if(cp){SHOOT_CAL=new Date(SHOOT_CAL.getFullYear(),SHOOT_CAL.getMonth()-1,1);renderShootPipeline();return}
    if(cn){SHOOT_CAL=new Date(SHOOT_CAL.getFullYear(),SHOOT_CAL.getMonth()+1,1);renderShootPipeline();return}
    const ed=e.target.closest('[data-edit-shoot]'); if(ed){openShootForm(parseInt(ed.dataset.editShoot));return}
    const dl=e.target.closest('[data-del-shoot]'); if(dl){deleteShoot(parseInt(dl.dataset.delShoot));return}
  };
  // Drag-to-move: writes ONLY the stage field (narrow write to limit CC collision)
  let dragId=null;
  $('#pageContent').querySelectorAll('.shoot-card').forEach(c=>{
    c.addEventListener('dragstart',()=>{dragId=parseInt(c.dataset.shootId);c.classList.add('dragging')});
    c.addEventListener('dragend',()=>{dragId=null;c.classList.remove('dragging')});
  });
  $('#pageContent').querySelectorAll('[data-shoot-drop]').forEach(col=>{
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drop-hot')});
    col.addEventListener('dragleave',()=>col.classList.remove('drop-hot'));
    col.addEventListener('drop',async e=>{e.preventDefault();col.classList.remove('drop-hot');if(dragId==null)return;const newKey=col.dataset.shootDrop;const sh=DATA.shoots.find(x=>Number(x.id)===Number(dragId));if(!sh)return;if(stageResolve(sh.stage)===newKey)return;await writeShootStage(sh,newKey)});
  });
}
function shootCalendarHtml(){
  const y=SHOOT_CAL.getFullYear(),m=SHOOT_CAL.getMonth();
  const monthName=SHOOT_CAL.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const first=new Date(y,m,1),startDow=first.getDay(),days=new Date(y,m+1,0).getDate();
  const inMonth=DATA.shoots.filter(s=>{if(!s.shoot_date)return false;const d=new Date(s.shoot_date);return d.getFullYear()===y&&d.getMonth()===m});
  const byDay={}; inMonth.forEach(s=>{const d=new Date(s.shoot_date).getDate();(byDay[d]=byDay[d]||[]).push(s)});
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div class="cal-cell cal-empty"></div>';
  for(let d=1;d<=days;d++){
    const list=byDay[d]||[];
    cells+=`<div class="cal-cell${list.length?' cal-has':''}"><div class="cal-daynum">${d}${list.length?`<span class="cal-badge">${list.length}</span>`:''}</div>${list.map(s=>{const cl=getClient(s.client_id);return `<div class="cal-event" data-edit-shoot="${s.id}"><div class="cal-event-client">${esc(cl?.name||'—')}</div><div class="cal-event-title">${esc(s.title||'Shoot')}</div></div>`}).join('')}</div>`;
  }
  return `<div class="cal-head"><button class="btn btn-secondary btn-sm" data-cal-prev>← Prev</button><div class="cal-month">${monthName}</div><button class="btn btn-secondary btn-sm" data-cal-next>Next →</button></div><div class="cal-sub text-3 fs-11">${inMonth.length} shoots this month</div><div class="cal-grid"><div class="cal-dow">SUN</div><div class="cal-dow">MON</div><div class="cal-dow">TUE</div><div class="cal-dow">WED</div><div class="cal-dow">THU</div><div class="cal-dow">FRI</div><div class="cal-dow">SAT</div>${cells}</div>`;
}
async function writeShootStage(sh,newKey){
  // Gate: can't mark a shoot as Shot without recording how many videos it produced.
  // Prompt inline rather than just rejecting — more helpful, fewer steps.
  if(newKey==='Shot' && (!sh.video_count || sh.video_count<=0)){
    const raw=prompt(`How many videos did this shoot produce?\n\nShoot: ${sh.title||'(untitled)'}\n\nEnter a number greater than 0:`);
    if(raw===null)return; // cancelled
    const n=parseInt(raw);
    if(isNaN(n)||n<=0){toast('Video count must be a number greater than 0 to mark a shoot as Shot','error');return}
    try{
      const {error}=await sb.from('smm_shoots').update({stage:newKey,video_count:n,updated_at:new Date().toISOString()}).eq('id',sh.id);
      if(error)throw error;
      sh.stage=newKey;sh.video_count=n;
      toast(`Shoot marked Shot · ${n} video${n===1?'':'s'} recorded`,'success');
      renderShootPipeline();fetchAll(true);
    }catch(err){toast('Move failed: '+(err.message||''),'error')}
    return;
  }
  try{
    const {error}=await sb.from('smm_shoots').update({stage:newKey,updated_at:new Date().toISOString()}).eq('id',sh.id);
    if(error)throw error;
    sh.stage=newKey;
    toast('Shoot moved','success');
    renderShootPipeline();
    fetchAll(true);
  }catch(err){toast('Move failed: '+(err.message||''),'error')}
}
async function deleteShoot(id){
  const sh=DATA.shoots.find(x=>Number(x.id)===Number(id));
  if(!confirm(`Delete this shoot${sh?' ("'+(sh.title||'')+'")':''}?\n\nThis removes it from CC and the SMM Workspace too. It cannot be undone.`))return;
  try{
    const {error}=await sb.from('smm_shoots').delete().eq('id',id);
    if(error)throw error;
    DATA.shoots=DATA.shoots.filter(x=>Number(x.id)!==Number(id));
    toast('Shoot deleted','success');
    renderShootPipeline();
    fetchAll(true);
  }catch(err){toast('Delete failed: '+(err.message||''),'error')}
}
