<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>BB Video System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--surface:#14141d;--surface-2:#1d1d2a;--surface-3:#262635;--border:rgba(255,255,255,0.06);--border-strong:rgba(255,255,255,0.12);--accent:#a855f7;--accent-2:#7c3aed;--accent-glow:rgba(168,85,247,0.15);--accent-soft:rgba(168,85,247,0.08);--text:#f1f5f9;--text-2:#94a3b8;--text-3:#64748b;--green:#22c55e;--green-soft:rgba(34,197,94,0.12);--amber:#f59e0b;--amber-soft:rgba(245,158,11,0.12);--red:#ef4444;--red-soft:rgba(239,68,68,0.12);--blue:#3b82f6;--blue-soft:rgba(59,130,246,0.12);--sidebar-w:240px;--topbar-h:64px}
html,body{height:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:100;padding:20px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:56px 48px 40px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,0.5)}
.bb-wordmark{text-align:center;line-height:0.88;margin-bottom:10px;display:flex;flex-direction:column;align-items:center;gap:2px}
.bb-wm-row{font-family:'Inter',sans-serif;font-size:48px;font-weight:900;letter-spacing:-0.04em;color:var(--text);text-transform:uppercase;display:flex;align-items:center;justify-content:center;line-height:0.95}
.bb-wm-row.with-arrow{padding-left:8px}
.bb-arrow{display:inline-block;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:14px solid var(--text);margin-right:-4px;margin-top:-22px;align-self:flex-start;position:relative;top:6px}
.bb-inf{display:inline-block;font-size:0.95em;font-weight:900;letter-spacing:-0.18em;margin:0 -0.08em;transform:translateY(0.04em);font-family:'Inter',sans-serif}
.login-subtitle{text-align:center;font-size:11px;font-weight:700;letter-spacing:0.32em;color:var(--accent);text-transform:uppercase;margin-top:12px;margin-bottom:24px}
.login-date{text-align:center;color:var(--text-3);font-size:13px;margin-bottom:28px}
.login-input-big{width:100%;background:var(--surface-2);border:1px solid transparent;border-radius:10px;padding:18px 20px;color:var(--text);font-size:13px;font-weight:600;text-align:center;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:12px;transition:all 0.15s;display:block}
.login-input-big::placeholder{color:var(--text-3);letter-spacing:0.24em;font-weight:500}
.login-input-big:focus{outline:none;border-color:var(--accent);background:var(--surface-3)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:white;font-weight:800;padding:18px 20px;border-radius:10px;margin-top:4px;font-size:14px;letter-spacing:0.24em;text-transform:uppercase;transition:all 0.15s;box-shadow:0 8px 24px rgba(168,85,247,0.3)}
.login-btn:hover{transform:translateY(-1px)}
.login-error{color:var(--red);font-size:12px;margin-top:14px;text-align:center;min-height:16px;font-weight:500}
.version-marker{position:fixed;bottom:10px;right:14px;font-size:9px;color:var(--text-3);letter-spacing:0.1em;font-weight:500;opacity:0.5;z-index:1000}
.app{display:flex;height:100vh;position:relative}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:20px 18px 14px;display:flex;flex-direction:column;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-brand{display:flex;flex-direction:column;align-items:center;gap:4px}
.sidebar-bb-wm{font-family:'Inter',sans-serif;font-weight:900;line-height:0.9;letter-spacing:-0.04em;color:var(--text);text-transform:uppercase;text-align:center}
.sidebar-bb-wm .sb-row{font-size:22px;display:flex;align-items:center;justify-content:center;line-height:0.95}
.sidebar-bb-wm .sb-arrow{display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-bottom:7px solid var(--text);margin-right:-3px;margin-top:-12px;align-self:flex-start;position:relative;top:4px}
.sidebar-bb-wm .sb-inf{font-size:0.95em;letter-spacing:-0.18em;margin:0 -0.08em;transform:translateY(0.05em);display:inline-block}
.sidebar-subtitle{font-size:9px;font-weight:700;letter-spacing:0.28em;color:var(--accent);text-transform:uppercase;text-align:center;margin-top:2px}
.sidebar-clock{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center;margin-top:4px}
.sidebar-clock-time{font-size:22px;font-weight:800;color:var(--text);letter-spacing:0.04em;font-variant-numeric:tabular-nums;line-height:1}
.sidebar-clock-date{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;margin-top:6px}
.sidebar-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);display:grid;place-items:center;font-weight:800;font-size:14px;color:white;box-shadow:0 2px 12px var(--accent-glow)}
.sidebar-title{font-size:11px;font-weight:700;letter-spacing:0.12em;color:var(--text);text-transform:uppercase}
.sidebar-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;padding:12px 12px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:8px;color:var(--text-2);font-size:13px;font-weight:500;transition:all 0.12s;text-align:left;width:100%;cursor:pointer}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;background:var(--surface-3);color:var(--text-2);padding:1px 7px;border-radius:10px;font-weight:600}
.nav-badge.alert{background:var(--red-soft);color:var(--red)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surface-2);margin-bottom:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);display:grid;place-items:center;font-weight:700;font-size:11px;color:white;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-role{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em}
.logout-btn{width:100%;padding:8px;border-radius:6px;color:var(--text-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;transition:all 0.15s}
.logout-btn:hover{background:var(--surface-2);color:var(--text-2)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topbar-h);padding:0 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--surface);flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:var(--text)}
.topbar-subtitle{font-size:12px;color:var(--text-3);margin-top:2px}
.topbar-actions{display:flex;gap:10px;align-items:center}
.page{flex:1;overflow:auto;padding:24px 28px 40px}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:white;box-shadow:0 2px 12px rgba(168,85,247,0.25)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border-strong)}
.btn-secondary:hover{background:var(--surface-3);border-color:var(--accent)}
.btn-ghost{color:var(--text-2);padding:8px 12px;font-size:12px}
.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-danger{color:var(--red)}
.btn-danger:hover{background:var(--red-soft)}
.btn-sm{padding:6px 12px;font-size:12px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-title{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.01em}
.page-sub{font-size:13px;color:var(--text-3);margin-top:4px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.stat-card-label{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.stat-card-value{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.stat-card-sub{font-size:11px;color:var(--text-3);margin-top:6px}
.stat-card-sub.red{color:var(--red)}
.stat-card-sub.green{color:var(--green)}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:22px}
.pillar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;border-left:3px solid var(--text-3)}
.pillar.green{border-left-color:var(--green)}
.pillar.amber{border-left-color:var(--amber)}
.pillar.red{border-left-color:var(--red)}
.pillar-title{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.pillar-status{font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text)}
.pillar.green .pillar-status{color:var(--green)}
.pillar.amber .pillar-status{color:var(--amber)}
.pillar.red .pillar-status{color:var(--red)}
.pillar-note{font-size:11px;color:var(--text-3);line-height:1.4}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden}
.panel-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.06em}
.panel-body{padding:14px 18px}
.panel-row{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-bottom:1px solid var(--border);font-size:13px}
.panel-row:last-child{border-bottom:none}
.panel-row:hover{background:var(--surface-2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three-col{display:grid;grid-template-columns:2fr 1fr;gap:14px}
@media(max-width:1100px){.two-col,.three-col{grid-template-columns:1fr}}
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-input,.filter-select{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;min-width:160px}
.filter-input{flex:1;min-width:200px}
.filter-input:focus,.filter-select:focus{outline:none;border-color:var(--accent)}
.tbl{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;border-collapse:collapse}
.tbl th{text-align:left;padding:12px 16px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;background:var(--surface-2);border-bottom:1px solid var(--border)}
.tbl td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.clickable{cursor:pointer;transition:background 0.12s}
.tbl tr.clickable:hover{background:var(--surface-2)}
.tbl .muted{color:var(--text-3);font-size:12px}
.tag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;background:var(--surface-2);color:var(--text-2)}
.tag.green{background:var(--green-soft);color:var(--green)}
.tag.amber{background:var(--amber-soft);color:var(--amber)}
.tag.red{background:var(--red-soft);color:var(--red)}
.tag.blue{background:var(--blue-soft);color:var(--blue)}
.tag.purple{background:var(--accent-soft);color:var(--accent)}
.pipeline-board{display:flex;gap:14px;min-height:calc(100vh - 230px)}
.stage-col{width:286px;flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;max-height:calc(100vh - 230px)}
.stage-header{padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border)}
.stage-title{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:0.1em;flex:1;display:flex;align-items:center;gap:8px}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.stage-dot.s-video_shot{background:#3b82f6}
.stage-dot.s-cutting_color_grading{background:#06b6d4}
.stage-dot.s-rendering{background:#8b5cf6}
.stage-dot.s-editing{background:#f59e0b}
.stage-dot.s-team_review{background:#a855f7}
.stage-dot.s-changes{background:#ef4444}
.stage-dot.s-coo_check{background:#ec4899}
.stage-dot.s-sent_to_client{background:#22c55e}
.stage-dot.s-client_changes{background:#f97316}
.stage-dot.s-add_to_drive{background:#14b8a6}
.stage-dot.s-posted{background:#64748b}
.stage-count{background:var(--surface-2);color:var(--text-2);font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;min-width:26px;text-align:center}
.stage-cards{padding:10px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1}
.stage-cards.drop-target{background:var(--accent-soft)}
.stage-empty{padding:20px 10px;text-align:center;color:var(--text-3);font-size:11px;font-style:italic}
.card{background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:grab;transition:all 0.18s;border-left:3px solid var(--text-3);position:relative}
.card.pr-urgent{border-left-color:var(--red)}
.card.pr-high{border-left-color:var(--amber)}
.card.pr-medium{border-left-color:var(--blue)}
.card.pr-low{border-left-color:var(--text-3)}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.25)}
.card.dragging{opacity:0.4;cursor:grabbing}
.card-title{font-size:13.5px;font-weight:700;color:var(--text);margin-bottom:5px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;letter-spacing:-0.01em}
.card-client{font-size:10px;color:var(--text-3);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--border)}
.card-meta-left{display:flex;align-items:center;gap:6px}
.priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.priority-urgent{background:var(--red);box-shadow:0 0 8px var(--red)}
.priority-high{background:var(--amber)}
.priority-medium{background:var(--blue)}
.priority-low{background:var(--text-3)}
.card-deadline{font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.card-deadline.overdue{color:var(--red);font-weight:700}
.card-avatar{width:24px;height:24px;border-radius:50%;background:var(--surface-3);display:grid;place-items:center;font-size:9px;font-weight:700;color:var(--text)}
.card-avatar.assigned{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:white}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.15s}
.modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:14px;width:100%;max-width:600px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:slideUp 0.2s}
.modal-large{max-width:820px}
.modal-xl{max-width:1100px}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-sub{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-top:4px}
.modal-close{color:var(--text-3);font-size:22px;width:32px;height:32px;border-radius:6px;display:grid;place-items:center;transition:all 0.15s;flex-shrink:0}
.modal-close:hover{background:var(--surface-2);color:var(--text)}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
.form-grid{display:grid;gap:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.field-input,.field-select,.field-textarea{width:100%;background:var(--surface-2);border:1px solid var(--border-strong);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;transition:all 0.15s}
.field-input:focus,.field-select:focus,.field-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field-textarea{resize:vertical;min-height:70px;font-family:inherit}
.detail-section{margin-bottom:22px}
.detail-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.08em}
.detail-meta-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.detail-meta-item{background:var(--surface-2);padding:10px 12px;border-radius:8px}
.detail-meta-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.detail-meta-value{font-size:13px;color:var(--text);font-weight:500}
.detail-description{font-size:13px;color:var(--text-2);line-height:1.6;white-space:pre-wrap}
.link-list{display:flex;flex-direction:column;gap:6px}
.link-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border-radius:8px;border:1px solid var(--border)}
.link-row:hover{border-color:var(--accent)}
.link-icon{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;background:var(--surface-3);flex-shrink:0;font-size:11px}
.link-info{flex:1;min-width:0}
.link-title{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.link-meta{font-size:10px;color:var(--text-3);margin-top:2px}
.link-empty{padding:18px;text-align:center;color:var(--text-3);font-size:12px;font-style:italic;background:var(--surface-2);border-radius:8px}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;max-height:340px;overflow-y:auto;padding-right:4px}
.comment{background:var(--surface-2);border-radius:8px;padding:10px 12px}
.comment-head{display:flex;justify-content:space-between;margin-bottom:4px}
.comment-author{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.04em}
.comment-time{font-size:10px;color:var(--text-3)}
.comment-body{font-size:13px;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
.comment-img{margin-top:8px;max-width:100%;max-height:280px;border-radius:6px;border:1px solid var(--border);cursor:zoom-in}
.comment-empty{text-align:center;color:var(--text-3);font-size:12px;padding:18px;font-style:italic}

function clientVideoCount(clientId){
  const monthStart=startOfMonth();
  const posted=(DATA.projects||[]).filter(p=>p.client_id===clientId&&p.current_stage==='posted'&&p.completed_at&&new Date(p.completed_at)>=monthStart).length;
  const cl=getClient(clientId);
  // Try common column names — gracefully fall back
  const target=cl?.videos_per_month||cl?.monthly_videos||cl?.video_target||null;
  let progressClass='';
  if(target){
    if(posted>=target)progressClass='complete';
    if(posted>target)progressClass='over';
  }
  return {posted,target,progressClass};
}
function videoCountHtml(clientId){
  const {posted,target,progressClass}=clientVideoCount(clientId);
  if(!target)return `<span class="muted">${posted} this month</span>`;
  const pct=Math.min(100,(posted/target)*100);
  return `<span class="videos-progress ${progressClass}">${posted}/${target}<span class="videos-progress-bar"><span class="videos-progress-fill" style="width:${pct}%"></span></span></span>`;
}

// === TIME BREAKDOWN (from video_stage_history) ===
async function getProjectTimeBreakdown(pid){
  try{
    const {data}=await sb.from('video_stage_history').select('stage,duration_seconds,entered_at,exited_at').eq('video_project_id',pid);
    if(!data||!data.length)return {editing:0,changes:0,total:0,hasOpen:false};
    let editing=0,changes=0,total=0,hasOpen=false;
    data.forEach(r=>{
      let secs=r.duration_seconds;
      if(!secs&&r.entered_at&&!r.exited_at){
        secs=Math.floor((Date.now()-new Date(r.entered_at).getTime())/1000);
        hasOpen=true;
      }
      if(!secs)return;
      total+=secs;
      if(r.stage==='editing'||r.stage==='cutting_color_grading')editing+=secs;
      if(r.stage==='changes'||r.stage==='client_changes')changes+=secs;
    });
    return {editing,changes,total,hasOpen};
  }catch(_){return {editing:0,changes:0,total:0,hasOpen:false}}
}
// Returns the team_members.id for current user (used to filter editor visibility). null if not in team_members.
function currentEditorId(){if(!isEditor()||!DATA.teamMembers)return null;const m=DATA.teamMembers.find(x=>x.name&&x.name.toUpperCase()===currentUser.name.toUpperCase());return m?m.id:null}
// Filter projects: editors only see projects assigned to them. Everyone else sees all.
function visibleProjects(){if(!isEditor())return DATA.projects||[];const eid=currentEditorId();if(!eid)return [];return (DATA.projects||[]).filter(p=>p.assigned_editor_id===eid)}
// Returns the monthly video target for a client. Tries multiple column names then falls back to summing smm_shoots.vids for current month.
function videoTarget(client){
  if(!client)return 0;
  const cols=['videos_per_month','monthly_videos','video_count','videos_mo','monthly_video_target','vids_per_month'];
  for(const c of cols){if(client[c]!=null&&!isNaN(parseInt(client[c])))return parseInt(client[c])}
  // Fallback: sum smm_shoots.vids for this client this month
  if(DATA.shoots){
    const mStart=startOfMonth();
    const mEnd=new Date(mStart.getFullYear(),mStart.getMonth()+1,1);
    const sh=DATA.shoots.filter(s=>s.client_id===client.id&&s.shoot_date&&new Date(s.shoot_date)>=mStart&&new Date(s.shoot_date)<mEnd);
    return sh.reduce((sum,s)=>sum+(parseInt(s.vids)||0),0);
  }
  return 0;
}
// Returns count of projects posted this month for a client
function videosPostedThisMonth(clientId){
  const mStart=startOfMonth();
  return (DATA.projects||[]).filter(p=>p.client_id===clientId&&p.current_stage==='posted'&&p.completed_at&&new Date(p.completed_at)>=mStart).length;
}
// Returns total seconds spent in given stages for a project (from video_stage_history)
function stageDurationSecs(projectId,stageKeys){
  if(!DATA.stageHistory)return 0;
  const stages=Array.isArray(stageKeys)?stageKeys:[stageKeys];
  return DATA.stageHistory
    .filter(h=>h.video_project_id===projectId&&stages.includes(h.stage)&&h.duration_seconds)
    .reduce((sum,h)=>sum+(h.duration_seconds||0),0);
}
// Format seconds as "Xh Ym" or "Xm" or "—"
function fmtDuration(secs){if(!secs||secs<0)return '—';const h=Math.floor(secs/3600);const m=Math.floor((secs%3600)/60);if(h>0)return `${h}h ${m}m`;return `${m}m`;}
function getClient(id){return DATA.clients.find(c=>c.id===id)}
function getMember(id){return DATA.teamMembers.find(m=>m.id===id)}
function getProject(id){return DATA.projects.find(p=>p.id===id)}
function startOfMonth(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1)}
function startOfWeek(){const d=new Date();const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff))}

function updateClock(){
  const now=new Date();
  const h=now.getHours();const m=String(now.getMinutes()).padStart(2,'0');
  const hr12=h%12||12;const ampm=h>=12?'PM':'AM';
  const tEl=$('#sbClockTime');if(tEl)tEl.textContent=`${String(hr12).padStart(2,'0')}:${m} ${ampm}`;
  const dEl=$('#sbClockDate');if(dEl)dEl.textContent=now.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

// returns base64 data URI for inserting into image_url column, OR null
// Used by both project comments and team chat. Bound to elements by hostId.
const PENDING_IMG = {}; // hostId -> base64
function imageAttachHtml(hostId){
  return `<div class="image-attach">
    <button type="button" class="image-attach-btn" data-attach-host="${hostId}">📎 Attach image</button>
    <input type="file" accept="image/*" hidden id="${hostId}-file">
    <span class="image-attach-hint">or paste from clipboard (Cmd+V / Ctrl+V)</span>
  </div>
  <div id="${hostId}-preview"></div>`;
}
function wireImageAttach(hostId,hostTextarea){
  // file pick
  const btn=document.querySelector(`[data-attach-host="${hostId}"]`);
  const file=$(`#${hostId}-file`);
  if(btn&&file){btn.addEventListener('click',()=>file.click());file.addEventListener('change',e=>{const f=e.target.files[0];if(f)readImageFile(f,hostId)});}
  // paste handler attached to the textarea
  const ta=hostTextarea?$(hostTextarea):null;
  if(ta){ta.addEventListener('paste',e=>{const items=(e.clipboardData||window.clipboardData).items;for(const it of items){if(it.type.indexOf('image')===0){const f=it.getAsFile();if(f){e.preventDefault();readImageFile(f,hostId)}break}}});}
}
function readImageFile(file,hostId){
  if(file.size>3*1024*1024){toast('Image too large (max 3MB)','error');return}
  const r=new FileReader();
  r.onload=ev=>{
    PENDING_IMG[hostId]=ev.target.result;
    const pv=$(`#${hostId}-preview`);
    if(pv){pv.innerHTML=`<div class="image-preview-wrap"><img class="image-preview" src="${ev.target.result}"><div class="image-preview-remove" data-clear-img="${hostId}">×</div></div>`;}
  };
  r.readAsDataURL(file);
}
function clearPendingImg(hostId){delete PENDING_IMG[hostId];const pv=$(`#${hostId}-preview`);if(pv)pv.innerHTML='';const f=$(`#${hostId}-file`);if(f)f.value='';}

// === PAGE: MY DASHBOARD (editor personal view) ===
function renderMyDashboard(){
  const meId=(DATA.teamMembers.find(m=>m.name.toLowerCase()===currentUser.name.toLowerCase())||{}).id;
  const mine=DATA.projects.filter(p=>p.assigned_editor_id===meId);
  const now=Date.now();
  const todayStr=new Date().toISOString().slice(0,10);
  const thisMonthStart=startOfMonth();
  const lastMonthStart=new Date(thisMonthStart);lastMonthStart.setMonth(lastMonthStart.getMonth()-1);
  const lastMonthEnd=new Date(thisMonthStart);
  const weekStart=startOfWeek();
  // Counts
  const active=mine.filter(p=>p.current_stage!=='posted');
  const doneThisMonth=mine.filter(p=>p.completed_at&&new Date(p.completed_at)>=thisMonthStart);
  const doneLastMonth=mine.filter(p=>p.completed_at&&new Date(p.completed_at)>=lastMonthStart&&new Date(p.completed_at)<lastMonthEnd);
  const doneThisWeek=mine.filter(p=>p.completed_at&&new Date(p.completed_at)>=weekStart);
  // Turnaround
  const turns=doneThisMonth.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000).filter(n=>n>=0);
  const avgTurn=turns.length?(turns.reduce((s,t)=>s+t,0)/turns.length).toFixed(1):null;
  const turnsLast=doneLastMonth.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000).filter(n=>n>=0);
  const avgTurnLast=turnsLast.length?(turnsLast.reduce((s,t)=>s+t,0)/turnsLast.length).toFixed(1):null;
  // Month-over-month trajectory
  const moDelta=doneThisMonth.length-doneLastMonth.length;
  const moTrend=doneLastMonth.length>0?(moDelta>=0?`<span style="color:var(--green)">▲ ${moDelta} vs last month</span>`:`<span style="color:var(--red)">▼ ${Math.abs(moDelta)} vs last month</span>`):(doneThisMonth.length>0?`<span style="color:var(--green)">first month tracked</span>`:'no history');
  const turnTrend=(avgTurn&&avgTurnLast)?(parseFloat(avgTurn)<=parseFloat(avgTurnLast)?`<span style="color:var(--green)">▲ faster than last month</span>`:`<span style="color:var(--red)">▼ slower than last month</span>`):'';
  // Needs-attention scoped to this editor — honest, not punitive
  const overdueMine=active.filter(p=>p.deadline&&new Date(p.deadline)<new Date(todayStr)).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const dueTodayMine=active.filter(p=>p.deadline&&p.deadline.slice(0,10)===todayStr);
  const dueSoonMine=active.filter(p=>{if(!p.deadline)return false;const d=(new Date(p.deadline)-new Date(todayStr))/86400000;return d>0&&d<=3}).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const attnCount=overdueMine.length+dueTodayMine.length;
  // Simple streak: consecutive days (looking back) where >=1 video completed. Cap at 30.
  let streak=0;
  const completedDays=new Set(mine.filter(p=>p.completed_at).map(p=>p.completed_at.slice(0,10)));
  for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);if(completedDays.has(ds))streak++;else if(i>0)break;}
  // Best month (max completed in any calendar month from their history)
  const byMonth={};mine.filter(p=>p.completed_at).forEach(p=>{const k=p.completed_at.slice(0,7);byMonth[k]=(byMonth[k]||0)+1});
  const bestMonth=Math.max(0,...Object.values(byMonth));
  const onPaceForBest=bestMonth>0&&doneThisMonth.length>=bestMonth;

  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻ Refresh</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};
  function row(p,tag,cls){const cl=getClient(p.client_id);return `<div class="attn-row clickable" data-pid="${p.id}"><div class="attn-row-main"><div class="attn-row-title">${esc(p.title)}</div><div class="attn-row-sub">${esc(cl?.name||'No client')} · ${STAGES.find(s=>s.key===p.current_stage)?.label||''}</div></div><div class="attn-tag ${cls}">${tag}</div></div>`}
  function queueRow(p){const cl=getClient(p.client_id);const ov=p.deadline&&new Date(p.deadline)<new Date(todayStr);return `<div class="panel-row clickable" data-pid="${p.id}"><div><div style="font-size:13px;font-weight:600">${esc(p.title)}</div><div class="muted">${esc(cl?.name||'No client')} · ${STAGES.find(s=>s.key===p.current_stage)?.label||''}</div></div><div class="${ov?'tag red':'tag'}">${p.deadline?(ov?'OVERDUE · ':'')+fmtDate(p.deadline):'no deadline'}</div></div>`}

  $('#pageContent').innerHTML=`
    <div class="page-head"><div><div class="page-title">${esc(currentUser.name)}'s Dashboard</div><div class="page-sub">Your work, your numbers — ${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div></div></div>

    <div class="stat-grid">
      ${statCard('Done This Month',doneThisMonth.length,moTrend)}
      ${statCard('Avg Turnaround',avgTurn?avgTurn+'d':'—',turnTrend||(avgTurn?'this month':'no completions yet'))}
      ${statCard('Active Now',active.length,active.length?'in your queue':'queue empty')}
      ${statCard('Done This Week',doneThisWeek.length,'since Monday')}
      ${statCard('Streak',streak+(streak===1?' day':' days'),streak>0?'keep it going':'complete one today')}
    </div>

    ${onPaceForBest&&doneThisMonth.length>0?`<div class="attn-panel all-clear" style="margin-bottom:18px"><div class="attn-panel-title" style="color:var(--green)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>You're matching or beating your best month (${bestMonth}) — strong work</div></div>`:''}

    ${attnCount>0?`<div class="attn-panel" style="margin-bottom:18px">
      <div class="attn-panel-head"><div class="attn-panel-title"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Needs Your Attention</div><span class="attn-panel-count">${attnCount}</span></div>
      <div class="attn-grid">
        ${overdueMine.length?`<div class="attn-block red"><div class="attn-block-label">Overdue (${overdueMine.length})</div>${overdueMine.slice(0,6).map(p=>row(p,fmtDate(p.deadline),'red')).join('')}</div>`:''}

// === PAGE: DASHBOARD ===
function renderDashboard(){
  const ps=DATA.projects;
  const active=ps.filter(p=>p.current_stage!=='posted').length;
  const overdue=ps.filter(p=>p.deadline&&isOverdue(p.deadline)&&p.current_stage!=='posted').length;
  const weekStart=startOfWeek();
  const doneThisWeek=ps.filter(p=>p.completed_at&&new Date(p.completed_at)>=weekStart).length;
  const inEditing=ps.filter(p=>p.current_stage==='editing').length;
  const sentToClient=ps.filter(p=>p.current_stage==='sent_to_client').length;
  const inReview=ps.filter(p=>['team_review','coo_check'].includes(p.current_stage)).length;
  // 5 pillars based on real data
  const stuckCount=ps.filter(p=>{if(p.current_stage==='posted')return false;const upd=new Date(p.updated_at||p.created_at);return(Date.now()-upd.getTime())>3*86400000}).length;
  const pillarPipeline=stuckCount===0?'green':(stuckCount<=2?'amber':'red');
  const pillarQuality=inReview>=0?'green':'amber';
  const pillarTeam=overdue===0?'green':(overdue<=2?'amber':'red');
  const stale=ps.filter(p=>p.current_stage==='sent_to_client'&&p.updated_at&&(Date.now()-new Date(p.updated_at).getTime())>5*86400000).length;
  const pillarComm=stale===0?'green':(stale<=1?'amber':'red');
  const editorLoad={};
  DATA.teamMembers.forEach(m=>{editorLoad[m.id]=ps.filter(p=>p.assigned_editor_id===m.id&&p.current_stage!=='posted').length});
  const loads=Object.values(editorLoad);
  const maxLoad=Math.max(...loads,0),minLoad=Math.min(...loads,0);
  const pillarCap=(maxLoad-minLoad)<=2?'green':((maxLoad-minLoad)<=4?'amber':'red');
  // Stage distribution
  const stageDist=STAGES.map(s=>({label:s.label,count:ps.filter(p=>p.current_stage===s.key).length}));
  const maxStage=Math.max(...stageDist.map(s=>s.count),1);
  // Upcoming deadlines
  const upcoming=ps.filter(p=>p.deadline&&p.current_stage!=='posted').sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,8);
  // Workload bars
  const editors=DATA.teamMembers.filter(m=>m.role==='editor'||m.role==='video_editor'||(m.role||'').toLowerCase().includes('editor'));
  const editorBars=editors.map(m=>({name:m.name,count:ps.filter(p=>p.assigned_editor_id===m.id&&p.current_stage!=='posted').length}));
  editorBars.sort((a,b)=>b.count-a.count);
  const maxEd=Math.max(...editorBars.map(e=>e.count),1);
  // Recent activity
  const recent=[...ps].sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at)).slice(0,8);

  // === NEEDS ATTENTION — video head command center ===
  const now=Date.now();
  const todayStr=new Date().toISOString().slice(0,10);
  const overdueList=ps.filter(p=>p.deadline&&p.current_stage!=='posted'&&new Date(p.deadline)<new Date(todayStr)).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const dueTodayList=ps.filter(p=>p.deadline&&p.current_stage!=='posted'&&p.deadline.slice(0,10)===todayStr);
  const dueSoonList=ps.filter(p=>{if(!p.deadline||p.current_stage==='posted')return false;const d=new Date(p.deadline);const days=(d-new Date(todayStr))/86400000;return days>0&&days<=2}).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  const stuckList=ps.filter(p=>{if(p.current_stage==='posted')return false;const upd=new Date(p.updated_at||p.created_at);return(now-upd.getTime())>7*86400000}).sort((a,b)=>new Date(a.updated_at||a.created_at)-new Date(b.updated_at||b.created_at));
  const clientWaitList=ps.filter(p=>p.current_stage==='sent_to_client'&&p.updated_at&&(now-new Date(p.updated_at).getTime())>5*86400000).sort((a,b)=>new Date(a.updated_at)-new Date(b.updated_at));
  const unassignedList=ps.filter(p=>!p.assigned_editor_id&&p.current_stage!=='posted');
  const attnTotal=overdueList.length+dueTodayList.length+stuckList.length+clientWaitList.length+unassignedList.length;
  function attnRow(p,tagText,tagCls){const cl=getClient(p.client_id);const ed=getMember(p.assigned_editor_id);return `<div class="attn-row clickable" data-pid="${p.id}"><div class="attn-row-main"><div class="attn-row-title">${esc(p.title)}</div><div class="attn-row-sub">${esc(cl?.name||'No client')} · ${STAGES.find(s=>s.key===p.current_stage)?.label||''} · ${ed?esc(ed.name):'<span style="color:var(--red)">Unassigned</span>'}</div></div><div class="attn-tag ${tagCls}">${tagText}</div></div>`}
  // Editor overload detection
  const editorOverload=editorBars.filter(e=>e.count>=6);

  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻ Refresh</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};
  $('#pageContent').innerHTML=`
    <div class="page-head"><div><div class="page-title">Welcome back, ${esc(currentUser.name)}</div><div class="page-sub">Here's where the video team stands today</div></div></div>
    ${attnTotal>0?`<div class="attn-panel">
      <div class="attn-panel-head"><div class="attn-panel-title"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Needs Attention</div><span class="attn-panel-count">${attnTotal} item${attnTotal>1?'s':''}</span></div>
      <div class="attn-grid">
        ${overdueList.length?`<div class="attn-block red"><div class="attn-block-label">⚠ Overdue (${overdueList.length})</div>${overdueList.slice(0,5).map(p=>attnRow(p,fmtDate(p.deadline),'red')).join('')}${overdueList.length>5?`<div class="attn-more">+${overdueList.length-5} more</div>`:''}</div>`:''}
        ${dueTodayList.length?`<div class="attn-block amber"><div class="attn-block-label">📅 Due Today (${dueTodayList.length})</div>${dueTodayList.map(p=>attnRow(p,'TODAY','amber')).join('')}</div>`:''}
        ${dueSoonList.length?`<div class="attn-block amber"><div class="attn-block-label">⏳ Due in 48h (${dueSoonList.length})</div>${dueSoonList.slice(0,4).map(p=>attnRow(p,fmtDate(p.deadline),'amber')).join('')}</div>`:''}
        ${stuckList.length?`<div class="attn-block red"><div class="attn-block-label">🐌 Stuck >7 days (${stuckList.length})</div>${stuckList.slice(0,5).map(p=>attnRow(p,timeAgo(p.updated_at||p.created_at),'red')).join('')}${stuckList.length>5?`<div class="attn-more">+${stuckList.length-5} more</div>`:''}</div>`:''}
        ${clientWaitList.length?`<div class="attn-block amber"><div class="attn-block-label">📤 Client silent >5d (${clientWaitList.length})</div>${clientWaitList.slice(0,4).map(p=>attnRow(p,timeAgo(p.updated_at),'amber')).join('')}</div>`:''}
        ${unassignedList.length?`<div class="attn-block red"><div class="attn-block-label">👤 No editor assigned (${unassignedList.length})</div>${unassignedList.slice(0,4).map(p=>attnRow(p,'ASSIGN','red')).join('')}</div>`:''}
      </div>
      ${editorOverload.length?`<div class="attn-overload">⚡ Workload imbalance: ${editorOverload.map(e=>`<strong>${esc(e.name)}</strong> (${e.count})`).join(', ')} carrying heavy load — consider redistributing</div>`:''}
    </div>`:`<div class="attn-panel all-clear"><div class="attn-panel-title" style="color:var(--green)"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>All clear — nothing needs attention right now</div></div>`}
    <div class="stat-grid">
      ${statCard('Active Projects',active,ps.length+' total')}
      ${statCard('Overdue',overdue,overdue>0?'past deadline':'all on track',overdue>0?'red':'green')}
      ${statCard('Done This Week',doneThisWeek,'completed since Monday')}
      ${statCard('In Editing',inEditing,'currently being cut')}
      ${statCard('Sent to Client',sentToClient,sentToClient>0?'awaiting feedback':'—')}
    </div>
    ${isAdmin()?ushaneDailyPillarsHtml():''}
    <div class="pillars">
      ${pillar('Pipeline Health',pillarPipeline,stuckCount===0?'No stuck projects':stuckCount+' stuck >3 days')}
      ${pillar('Quality Review','green',inReview+' in review')}
      ${pillar('Team Performance',pillarTeam,overdue===0?'No overdue':overdue+' overdue')}
      ${pillar('Client Comms',pillarComm,stale===0?'All fresh':stale+' awaiting client >5d')}
      ${pillar('Team Capacity',pillarCap,'Spread: '+minLoad+'–'+maxLoad+' per editor')}
    </div>
    <div class="three-col">
      <div>
        <div class="panel">
          <div class="panel-head"><div class="panel-title">Upcoming Deadlines</div><span class="text-3 fs-11">${upcoming.length} projects</span></div>
          ${upcoming.length?upcoming.map(p=>{const cl=getClient(p.client_id);const ov=isOverdue(p.deadline);return `<div class="panel-row clickable" data-pid="${p.id}"><div><div style="font-size:13px;font-weight:600">${esc(p.title)}</div><div class="muted">${esc(cl?.name||'No client')} · ${STAGES.find(s=>s.key===p.current_stage)?.label||''}</div></div><div class="${ov?'tag red':'tag'}">${ov?'OVERDUE · ':''}${fmtDate(p.deadline)}</div></div>`}).join(''):'<div class="panel-body text-3" style="text-align:center;font-style:italic">No deadlines set</div>'}
        </div>
        <div class="panel">
          <div class="panel-head"><div class="panel-title">Stage Distribution</div></div>
          <div class="panel-body">
            ${stageDist.map(s=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px"><span>${esc(s.label)}</span><span class="text-3">${s.count}</span></div><div class="spark-bar"><div class="spark-fill" style="width:${(s.count/maxStage)*100}%"></div></div></div>`).join('')}
          </div>
        </div>
      </div>
      <div>
        <div class="panel">
          <div class="panel-head"><div class="panel-title">Team Workload</div></div>
          <div class="panel-body">
            ${editorBars.length?editorBars.map(e=>{const heavy=e.count>=6;return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${esc(e.name)}${heavy?' <span style="color:var(--red);font-size:10px">⚡ HEAVY</span>':''}</span><span class="text-3">${e.count} active</span></div><div class="spark-bar"><div class="spark-fill" style="width:${maxEd?(e.count/maxEd)*100:0}%;${heavy?'background:var(--red)':''}"></div></div></div>`}).join(''):'<div class="text-3 fs-12" style="text-align:center;font-style:italic">No editors found</div>'}
          </div>
        </div>
        <div class="panel">
          <div class="panel-head"><div class="panel-title">Recent Activity</div></div>
          ${recent.length?recent.map(p=>{const cl=getClient(p.client_id);return `<div class="panel-row clickable" data-pid="${p.id}"><div><div style="font-size:12px;font-weight:600">${esc(p.title)}</div><div class="muted">${esc(cl?.name||'')} · ${STAGES.find(s=>s.key===p.current_stage)?.label||''}</div></div><div class="muted">${timeAgo(p.updated_at||p.created_at)}</div></div>`}).join(''):'<div class="panel-body text-3" style="text-align:center;font-style:italic">No projects yet</div>'}
        </div>
      </div>
    </div>
  `;
  $('#pageContent').onclick=e=>{
    const r=e.target.closest('[data-pid]');if(r){openProjectDetail(parseInt(r.dataset.pid));return}
    const pb=e.target.closest('[data-ushane-pillar]');if(pb){const k=pb.dataset.ushanePillar;toggleUshanePillar(k);return}
    if(e.target.closest('[data-ushane-reset]')){resetUshanePillars();return}
  };
}
function statCard(label,value,sub='',cls=''){return `<div class="stat-card"><div class="stat-card-label">${esc(label)}</div><div class="stat-card-value">${value}</div>${sub?`<div class="stat-card-sub ${cls}">${esc(sub)}</div>`:''}</div>`}
function pillar(title,status,note){const txt=status==='green'?'On track':status==='amber'?'Watch':status==='red'?'Needs attention':'—';return `<div class="pillar ${status}"><div class="pillar-title">${esc(title)}</div><div class="pillar-status">${txt}</div><div class="pillar-note">${esc(note)}</div></div>`}

// === USHANE DAILY PILLARS ===
const USHANE_PILLARS=[
  {key:'system_update',label:'System Update',sub:'Check all BB systems are running'},
  {key:'team_check',label:'Team Check',sub:'Touch base with each editor'},
  {key:'shiara_brief',label:'Shiara Brief',sub:'Brief Shiara on the day'},
  {key:'shoot_check',label:'Shoot Check',sub:'Confirm today\'s shoots are on track'},
  {key:'folder_update',label:'Folder Update',sub:'Update Drive folders + raw footage links'},
  {key:'close_day',label:'Close Day',sub:'Review system + log any issues'},
];
function ushanePillarKey(){const today=new Date().toISOString().slice(0,10);return `bb_video_ushane_pillars_${today}`}
function getUshanePillarState(){try{return JSON.parse(localStorage.getItem(ushanePillarKey())||'{}')}catch{return {}}}
function setUshanePillarState(s){localStorage.setItem(ushanePillarKey(),JSON.stringify(s))}
function toggleUshanePillar(k){const s=getUshanePillarState();s[k]=!s[k];setUshanePillarState(s);renderDashboard()}
function resetUshanePillars(){localStorage.removeItem(ushanePillarKey());renderDashboard()}
function ushaneDailyPillarsHtml(){
  const s=getUshanePillarState();
  const done=USHANE_PILLARS.filter(p=>s[p.key]).length;
  return `<div class="panel" style="margin-bottom:22px;border:1px solid var(--accent);background:linear-gradient(180deg,var(--accent-soft) 0%,var(--surface) 50%)">
    <div class="panel-head"><div class="panel-title" style="display:flex;align-items:center;gap:10px"><svg class="daily-pillars-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22V4"/><path d="M4 4h13l-2 4 2 4H4"/></svg>Daily Pillars — Ushane</div><div style="display:flex;align-items:center;gap:10px"><span class="text-3 fs-11">${done}/${USHANE_PILLARS.length} done today</span><button class="btn btn-ghost btn-sm" data-ushane-reset>Reset</button></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;padding:14px">
      ${USHANE_PILLARS.map(p=>{const checked=!!s[p.key];return `<div class="up-card ${checked?'up-done':''}" data-ushane-pillar="${p.key}" style="display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all 0.15s;${checked?'opacity:0.55':''}"><div style="width:22px;height:22px;border-radius:50%;border:2px solid ${checked?'var(--accent)':'var(--border-strong)'};background:${checked?'var(--accent)':'transparent'};display:grid;place-items:center;flex-shrink:0;color:white;font-size:13px;font-weight:700">${checked?'✓':''}</div><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--text);${checked?'text-decoration:line-through':''}">${esc(p.label)}</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">${esc(p.sub)}</div></div></div>`}).join('')}
    </div>
  </div>`;
}

// === PAGE: PIPELINE ===
const PIPELINE_STATE = { bulkMode: false, selected: new Set() };
function renderPipeline(){
  const f=FILTERS.pipeline;
  let ps=DATA.projects.slice();
  if(f.search){const q=f.search.toLowerCase();ps=ps.filter(p=>(p.title||'').toLowerCase().includes(q)||(getClient(p.client_id)?.name||'').toLowerCase().includes(q))}
  if(f.client)ps=ps.filter(p=>p.client_id===parseInt(f.client));
  if(f.editor)ps=ps.filter(p=>p.assigned_editor_id===parseInt(f.editor));
  if(f.priority)ps=ps.filter(p=>(p.priority||'medium')===f.priority);
  const editors=DATA.teamMembers;
  const bulkBtn=isAdmin()?`<button class="bulk-toggle-btn ${PIPELINE_STATE.bulkMode?'active':''}" data-action="bulk-toggle">${PIPELINE_STATE.bulkMode?'✓ Bulk Mode ON':'☐ Bulk Select'}</button>`:'';
  $('#pageActions').innerHTML=`<button class="btn btn-ghost" data-action="refresh">↻</button>${bulkBtn}${isAdmin()?'<button class="btn btn-primary" data-action="new">+ New Project</button>':''}`;
  $('#pageActions').onclick=e=>{
    if(e.target.closest('[data-action="refresh"]'))fetchAll();
    if(e.target.closest('[data-action="new"]'))openProjectForm();
    if(e.target.closest('[data-action="bulk-toggle"]')){PIPELINE_STATE.bulkMode=!PIPELINE_STATE.bulkMode;PIPELINE_STATE.selected.clear();renderPipeline()}
  };
  $('#pageSub').textContent=`${ps.length} of ${DATA.projects.length} project${DATA.projects.length===1?'':'s'}`;
  const filtersHtml=`<div class="filters">
    <input class="filter-input" placeholder="Search project or client..." id="fSearch" value="${esc(f.search)}">
    <select class="filter-select" id="fClient"><option value="">All clients</option>${DATA.clients.map(c=>`<option value="${c.id}" ${f.client==c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
    <select class="filter-select" id="fEditor"><option value="">All editors</option>${editors.map(m=>`<option value="${m.id}" ${f.editor==m.id?'selected':''}>${esc(m.name)}</option>`).join('')}</select>
    <select class="filter-select" id="fPriority"><option value="">All priorities</option>${['urgent','high','medium','low'].map(p=>`<option value="${p}" ${f.priority===p?'selected':''}>${p[0].toUpperCase()+p.slice(1)}</option>`).join('')}</select>
    ${(f.search||f.client||f.editor||f.priority)?'<button class="btn btn-ghost btn-sm" data-action="clear-filters">Clear filters</button>':''}
  </div>`;
  const boardHtml=`<div class="pipeline-board">${STAGES.map(st=>{const sp=ps.filter(p=>p.current_stage===st.key);return `<div class="stage-col"><div class="stage-header"><div class="stage-title"><span class="stage-dot s-${st.key}"></span>${st.label}</div><div class="stage-count">${sp.length}</div></div><div class="stage-cards" data-drop-stage="${st.key}">${sp.length?sp.map(p=>cardHtml(p)).join(''):'<div class="stage-empty">No projects</div>'}</div></div>`}).join('')}</div>`;
  // Bulk action floating bar
  const bulkBarHtml=PIPELINE_STATE.bulkMode&&PIPELINE_STATE.selected.size?`<div class="bulk-action-bar">
    <span class="bulk-action-count">${PIPELINE_STATE.selected.size} selected</span>
    <select class="bulk-action-select" id="bulkMoveTo"><option value="">Move to stage…</option>${STAGES.map(s=>`<option value="${s.key}">${esc(s.label)}</option>`).join('')}</select>
    <button class="bulk-action-btn" data-action="bulk-duplicate">Duplicate</button>
    <button class="bulk-action-btn ghost" data-action="bulk-cancel">Cancel</button>
  </div>`:'';
  $('#pageContent').innerHTML=filtersHtml+boardHtml+bulkBarHtml;
  $('#fSearch').oninput=e=>{FILTERS.pipeline.search=e.target.value;renderPipeline()};
  $('#fClient').onchange=e=>{FILTERS.pipeline.client=e.target.value;renderPipeline()};
  $('#fEditor').onchange=e=>{FILTERS.pipeline.editor=e.target.value;renderPipeline()};
  $('#fPriority').onchange=e=>{FILTERS.pipeline.priority=e.target.value;renderPipeline()};
  $('#pageContent').addEventListener('click',async e=>{
    if(e.target.closest('[data-action="clear-filters"]')){FILTERS.pipeline={search:'',client:'',editor:'',priority:''};renderPipeline();return}
    if(e.target.closest('[data-action="bulk-cancel"]')){PIPELINE_STATE.selected.clear();PIPELINE_STATE.bulkMode=false;renderPipeline();return}
    if(e.target.closest('[data-action="bulk-duplicate"]')){await bulkDuplicateProjects();return}
  });
  const bulkMove=$('#bulkMoveTo');
  if(bulkMove)bulkMove.onchange=async e=>{const ns=e.target.value;if(!ns)return;await bulkMoveProjects(ns)};
  attachCardListeners();attachDropListeners();
}
function cardHtml(p){
  const cl=getClient(p.client_id),ed=getMember(p.assigned_editor_id);
  const ov=p.deadline&&isOverdue(p.deadline)&&p.current_stage!=='posted';
  const dr=(isAdmin()&&!PIPELINE_STATE.bulkMode)?'draggable="true"':'';
  const pr=p.priority||'medium';
  const sel=PIPELINE_STATE.selected.has(p.id);
  const bulkClass=PIPELINE_STATE.bulkMode?'selectable':'';
  const selClass=sel?'selected':'';
  const checkbox=PIPELINE_STATE.bulkMode?'<div class="card-checkbox"></div>':'';

function attachCardListeners(){
  $$('.card[data-pid]').forEach(c=>{
    c.addEventListener('click',e=>{
      if(c.classList.contains('dragging'))return;
      const pid=parseInt(c.dataset.pid);
      if(PIPELINE_STATE.bulkMode){
        if(PIPELINE_STATE.selected.has(pid))PIPELINE_STATE.selected.delete(pid);
        else PIPELINE_STATE.selected.add(pid);
        renderPipeline();
        return;
      }
      openProjectDetail(pid);
    });
    if(isAdmin()&&!PIPELINE_STATE.bulkMode){
      c.addEventListener('dragstart',e=>{c.classList.add('dragging');e.dataTransfer.setData('text/pid',c.dataset.pid)});
      c.addEventListener('dragend',()=>c.classList.remove('dragging'));

async function bulkMoveProjects(newStage){
  const ids=Array.from(PIPELINE_STATE.selected);
  if(!ids.length)return;
  toast(`Moving ${ids.length} project${ids.length>1?'s':''}…`);
  let ok=0,fail=0;
  for(const pid of ids){
    const p=getProject(pid);
    if(!p||p.current_stage===newStage){ok++;continue}
    try{await moveProject(p,newStage);ok++}catch(_){fail++}
  }
  PIPELINE_STATE.selected.clear();
  await fetchAll();
  toast(`Moved ${ok} project${ok>1?'s':''}${fail?` · ${fail} failed`:''}`,fail?'error':'success');
  renderPipeline();
}
async function bulkDuplicateProjects(){
  const ids=Array.from(PIPELINE_STATE.selected);
  if(!ids.length)return;
  toast(`Duplicating ${ids.length} project${ids.length>1?'s':''}…`);
  let ok=0,fail=0;
  for(const pid of ids){
    try{await duplicateProject(pid);ok++}catch(_){fail++}
  }
  PIPELINE_STATE.selected.clear();
  await fetchAll();
  toast(`Duplicated ${ok} project${ok>1?'s':''}${fail?` · ${fail} failed`:''}`,fail?'error':'success');
  renderPipeline();
}
async function duplicateProject(pid){
  const orig=getProject(pid);
  if(!orig)throw new Error('not found');
  const copy={
    title:orig.title+' (Copy)',
    description:orig.description||null,
    client_id:orig.client_id,
    shoot_id:null,
    assigned_editor_id:orig.assigned_editor_id,
    priority:orig.priority||'medium',
    deadline:orig.deadline||null,
    type:orig.type||null,
    formula:orig.formula||null,
    duration_secs:orig.duration_secs||null,
    notes:orig.notes||null,
    current_stage:'video_shot',
    is_archived:false,
    completed_at:null,
    created_by:currentUser.name,
  };
  const {data:ins,error}=await sb.from('video_projects').insert(copy).select().single();
  if(error)throw error;
  await sb.from('video_stage_history').insert({video_project_id:ins.id,stage:ins.current_stage,moved_by:currentUser.name});
  return ins;
}
function attachDropListeners(){
  if(!isAdmin())return;
  $$('.stage-cards').forEach(z=>{
    z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drop-target')});
    z.addEventListener('dragleave',()=>z.classList.remove('drop-target'));
    z.addEventListener('drop',async e=>{
      e.preventDefault();z.classList.remove('drop-target');
      const pid=parseInt(e.dataTransfer.getData('text/pid'));const ns=z.dataset.dropStage;
      const p=getProject(pid);if(!p||p.current_stage===ns)return;
      await moveProject(p,ns);
    });
  });
}
async function moveProject(project,newStage){
  const old=project.current_stage;project.current_stage=newStage;
  if(newStage==='posted')project.completed_at=new Date().toISOString();
  renderPage();
  try{
    const {data:open}=await sb.from('video_stage_history').select('*').eq('video_project_id',project.id).is('exited_at',null);
    if(open&&open.length){const o=open[0];const ex=new Date();const en=new Date(o.entered_at);await sb.from('video_stage_history').update({exited_at:ex.toISOString(),duration_seconds:Math.floor((ex-en)/1000)}).eq('id',o.id)}
    await sb.from('video_stage_history').insert({video_project_id:project.id,stage:newStage,moved_by:currentUser.name});
    const up={current_stage:newStage,updated_at:new Date().toISOString()};
    if(newStage==='posted')up.completed_at=new Date().toISOString();
    const {error}=await sb.from('video_projects').update(up).eq('id',project.id);
    if(error)throw error;
    toast(`Moved to ${STAGES.find(s=>s.key===newStage)?.label}`,'success');
  }catch(err){console.error(err);toast('Move failed','error');project.current_stage=old;renderPage()}
}

// Builds the time tracking section showing how long the project spent in editing / changes stages
function stageTimingSection(projectId){
  if(!DATA.stageHistory)return '';
  const hist=DATA.stageHistory.filter(h=>h.video_project_id===projectId);
  if(!hist.length)return '<div class="detail-section"><div class="detail-section-title">Time Tracking</div><div class="link-empty">No stage history yet — timing starts tracking once the project moves between stages</div></div>';
  const editingSecs=stageDurationSecs(projectId,'editing');
  const teamChangesSecs=stageDurationSecs(projectId,'changes');
  const clientChangesSecs=stageDurationSecs(projectId,'client_changes');
  const cuttingSecs=stageDurationSecs(projectId,'cutting_color_grading');
  const renderingSecs=stageDurationSecs(projectId,'rendering');
  const reviewSecs=stageDurationSecs(projectId,['team_review','coo_check']);
  // Build a per-stage list showing entered/exited timestamps
  const histRows=hist.map(h=>{
    const lbl=STAGES.find(s=>s.key===h.stage)?.label||h.stage;
    const dur=h.duration_seconds?fmtDuration(h.duration_seconds):(h.exited_at?fmtDuration((new Date(h.exited_at)-new Date(h.entered_at))/1000):'in progress');
    return `<tr><td>${esc(lbl)}</td><td class="muted">${fmtDateTime(h.entered_at)}</td><td class="muted">${h.exited_at?fmtDateTime(h.exited_at):'<span style="color:var(--accent)">currently here</span>'}</td><td><strong>${dur}</strong></td></tr>`;
  }).join('');
  return `<div class="detail-section"><div class="detail-section-title">Time Tracking</div>
    <div class="detail-meta-grid" style="margin-bottom:14px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
      <div class="detail-meta-item"><div class="detail-meta-label">Cutting/Color</div><div class="detail-meta-value">${fmtDuration(cuttingSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Rendering</div><div class="detail-meta-value">${fmtDuration(renderingSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Editing</div><div class="detail-meta-value">${fmtDuration(editingSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Team Changes</div><div class="detail-meta-value">${fmtDuration(teamChangesSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Client Changes</div><div class="detail-meta-value">${fmtDuration(clientChangesSecs)}</div></div>
      <div class="detail-meta-item"><div class="detail-meta-label">Review</div><div class="detail-meta-value">${fmtDuration(reviewSecs)}</div></div>
    </div>
    <details><summary style="cursor:pointer;font-size:12px;color:var(--text-3);padding:6px 0">Show full stage history (${hist.length})</summary>
    <table class="tbl" style="margin-top:8px"><thead><tr><th>Stage</th><th>Entered</th><th>Exited</th><th>Duration</th></tr></thead><tbody>${histRows}</tbody></table>
    </details>
  </div>`;
}

function renderTasks(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button><button class="btn btn-primary" data-action="new">+ New Task</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll();if(e.target.closest('[data-action="new"]'))openTaskForm()};
  // Editors: only their own tasks. Admins/video head: all video tasks.
  let tasks;
  if(isEditor()){
    const me=currentUser.name.toLowerCase();
    tasks=DATA.tasks.filter(t=>{const a=(t.assign||t.assigned_to||'').toLowerCase();return a===me});
  }else{
    tasks=DATA.tasks.filter(t=>{const a=(t.assign||t.assigned_to||'').toLowerCase();return a==='video'||a==='video_head'||a==='ushane'||a===currentUser.name.toLowerCase()||t.video_project_id});
  }
  $('#pageSub').textContent=`${tasks.length} task${tasks.length===1?'':'s'}`;
  const todo=tasks.filter(t=>!t.completed&&t.status!=='done'&&t.status!=='completed');
  const done=tasks.filter(t=>t.completed||t.status==='done'||t.status==='completed');
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Tasks</div><div class="page-sub">Personal task list · ${todo.length} to do · ${done.length} done</div></div></div>
    <div class="panel"><div class="panel-head"><div class="panel-title">To Do</div></div>
      ${todo.length?`<table class="tbl"><thead><tr><th></th><th>Task</th><th>Client</th><th>Priority</th><th>Due</th><th></th></tr></thead><tbody>${todo.map(t=>{const cl=getClient(t.client_id);const due=t.deadline||t.due_date;const ov=due&&isOverdue(due);return `<tr><td><input type="checkbox" data-toggle-task="${t.id}"></td><td>${esc(t.title||t.text||'')}</td><td class="muted">${esc(cl?.name||'—')}</td><td><span class="tag ${t.priority==='urgent'?'red':t.priority==='high'?'amber':'blue'}">${t.priority||'medium'}</span></td><td class="${ov?'':'muted'}" style="${ov?'color:var(--red)':''}">${due?fmtDate(due):'—'}</td><td><button class="btn btn-ghost btn-sm" data-edit-task="${t.id}">Edit</button></td></tr>`}).join('')}</tbody></table>`:'<div class="panel-body text-3" style="text-align:center;font-style:italic">All caught up</div>'}
    </div>
    ${done.length?`<div class="panel"><div class="panel-head"><div class="panel-title">Done</div></div>${done.slice(0,20).map(t=>{const cl=getClient(t.client_id);return `<div class="panel-row"><div style="text-decoration:line-through;color:var(--text-3)">${esc(t.title||t.text)}</div><div class="muted">${esc(cl?.name||'')}</div></div>`}).join('')}</div>`:''}
  `;
  $('#pageContent').onclick=async e=>{
    const tg=e.target.closest('[data-toggle-task]');if(tg){const id=parseInt(tg.dataset.toggleTask);try{await sb.from('tasks').update({completed:true,status:'done'}).eq('id',id);await fetchAll()}catch(_){toast('Failed','error')}}
    const ed=e.target.closest('[data-edit-task]');if(ed){const id=parseInt(ed.dataset.editTask);openTaskForm(DATA.tasks.find(t=>t.id===id))}
  };
}
function openTaskForm(existing=null){
  const ie=!!existing;
  const html=`<div class="modal-backdrop" id="modal"><div class="modal"><div class="modal-header"><div class="modal-title">${ie?'Edit Task':'New Task'}</div><button class="modal-close" data-close>&times;</button></div><form id="taskForm" class="modal-body"><div class="form-grid">
    <div><label class="field-label">Title</label><input class="field-input" name="title" required value="${esc(existing?.title||existing?.text||'')}" autofocus></div>
    <div class="form-row"><div><label class="field-label">Client</label><select class="field-select" name="client_id"><option value="">— None —</option>${DATA.clients.map(c=>`<option value="${c.id}" ${existing?.client_id===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div><div><label class="field-label">Priority</label><select class="field-select" name="priority">${['low','medium','high','urgent'].map(p=>`<option value="${p}" ${(existing?.priority||'medium')===p?'selected':''}>${p[0].toUpperCase()+p.slice(1)}</option>`).join('')}</select></div></div>
    <div><label class="field-label">Due Date</label><input class="field-input" type="date" name="deadline" value="${existing?.deadline||existing?.due_date||''}"></div>
    <div><label class="field-label">Notes</label><textarea class="field-textarea" name="notes">${esc(existing?.notes||existing?.description||'')}</textarea></div>
  </div></form><div class="modal-footer">${ie?`<button class="btn btn-ghost btn-danger" data-del-task="${existing.id}">Delete</button>`:''}<button class="btn btn-secondary" data-close>Cancel</button><button class="btn btn-primary" data-save-task="${ie?existing.id:''}">Save</button></div></div></div>`;
  $('#modalRoot').innerHTML=html;
  $('#modalRoot').onclick=async e=>{
    if(e.target.closest('[data-close]'))closeModal();
    if(e.target.closest('[data-del-task]')){const id=parseInt(e.target.closest('[data-del-task]').dataset.delTask);if(!confirm('Delete task?'))return;try{await sb.from('tasks').delete().eq('id',id);toast('Deleted','success');closeModal();await fetchAll()}catch(_){toast('Failed','error')}}
    if(e.target.closest('[data-save-task]')){
      const id=e.target.closest('[data-save-task]').dataset.saveTask;
      const f=$('#taskForm');const fd=new FormData(f);
      const d={title:fd.get('title').trim(),client_id:fd.get('client_id')?parseInt(fd.get('client_id')):null,priority:fd.get('priority'),deadline:fd.get('deadline')||null,notes:fd.get('notes').trim()||null,assign:isEditor()?currentUser.name.toLowerCase():'video'};
      if(!d.title){toast('Title required','error');return}
      try{if(id){await sb.from('tasks').update(d).eq('id',parseInt(id))}else{d.created_by=currentUser.name;await sb.from('tasks').insert(d)}toast('Saved','success');closeModal();await fetchAll()}catch(err){toast('Save failed: '+(err.message||''),'error')}
    }
  };
}

// === PAGE: TIME TRACKER ===
function renderTimeTracker(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button><button class="btn btn-primary" data-action="log">+ Log Time</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll();if(e.target.closest('[data-action="log"]'))openTimeForm()};
  fetchTimeLogs();
}
async function fetchTimeLogs(){
  try{const {data}=await sb.from('video_time_logs').select('*').order('started_at',{ascending:false}).limit(500);DATA.timeLogs=data||[];drawTimeTracker()}catch(_){drawTimeTracker()}
}
function drawTimeTracker(){
  let logs=DATA.timeLogs;
  if(isEditor()){const me=DATA.teamMembers.find(m=>m.name?.toUpperCase()===currentUser.name.toUpperCase());logs=me?logs.filter(l=>l.team_member_id===me.id):[]}
  const monthStart=startOfMonth();
  const thisMonth=logs.filter(l=>new Date(l.started_at)>=monthStart);
  const totalSec=thisMonth.reduce((s,l)=>s+(l.duration_seconds||0),0);
  const perEditor={};
  thisMonth.forEach(l=>{const k=l.team_member_id;if(!perEditor[k])perEditor[k]={sec:0,count:0};perEditor[k].sec+=l.duration_seconds||0;perEditor[k].count++});
  $('#pageSub').textContent=`${thisMonth.length} logs this month · ${secsToHrs(totalSec)} total`;
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Time Tracker</div><div class="page-sub">Editing hours logged per video</div></div></div>
    <div class="stat-grid">${statCard('This Month',secsToHrs(totalSec))}${statCard('Logs',thisMonth.length+'')}${statCard('Avg/Log',thisMonth.length?secsToHrs(totalSec/thisMonth.length):'0')}</div>
    ${Object.keys(perEditor).length?`<div class="panel"><div class="panel-head"><div class="panel-title">By Editor (this month)</div></div><table class="tbl"><thead><tr><th>Editor</th><th>Logs</th><th>Total</th><th>Avg/log</th></tr></thead><tbody>${Object.entries(perEditor).sort((a,b)=>b[1].sec-a[1].sec).map(([id,v])=>{const m=getMember(parseInt(id));return `<tr><td>${esc(m?.name||'Unknown')}</td><td>${v.count}</td><td>${secsToHrs(v.sec)}</td><td>${secsToHrs(v.sec/v.count)}</td></tr>`}).join('')}</tbody></table></div>`:''}
    <div class="panel"><div class="panel-head"><div class="panel-title">Recent Logs</div></div>${logs.length?`<table class="tbl"><thead><tr><th>Project</th><th>Editor</th><th>Stage</th><th>Started</th><th>Duration</th><th>Notes</th></tr></thead><tbody>${logs.slice(0,50).map(l=>{const p=getProject(l.video_project_id);const m=getMember(l.team_member_id);return `<tr><td>${esc(p?.title||'—')}</td><td>${esc(m?.name||'—')}</td><td class="muted">${esc(STAGES.find(s=>s.key===l.stage)?.label||l.stage||'')}</td><td class="muted">${fmtDateTime(l.started_at)}</td><td>${secsToHrs(l.duration_seconds||0)}</td><td class="muted">${esc(l.notes||'')}</td></tr>`}).join('')}</tbody></table>`:'<div class="panel-body text-3" style="text-align:center;font-style:italic">No time logged yet — click "+ Log Time" to start</div>'}</div>
  `;
}
function openTimeForm(){
  const html=`<div class="modal-backdrop" id="modal"><div class="modal"><div class="modal-header"><div class="modal-title">Log Time</div><button class="modal-close" data-close>&times;</button></div><form id="timeForm" class="modal-body"><div class="form-grid">
    <div><label class="field-label">Project</label><select class="field-select" name="video_project_id" required><option value="">Select project...</option>${DATA.projects.map(p=>`<option value="${p.id}">${esc(p.title)}</option>`).join('')}</select></div>
    <div><label class="field-label">Editor</label><select class="field-select" name="team_member_id" required><option value="">Select editor...</option>${DATA.teamMembers.map(m=>`<option value="${m.id}" ${m.name?.toUpperCase()===currentUser.name.toUpperCase()?'selected':''}>${esc(m.name)}</option>`).join('')}</select></div>
    <div><label class="field-label">Stage</label><select class="field-select" name="stage">${STAGES.map(s=>`<option value="${s.key}">${s.label}</option>`).join('')}</select></div>
    <div class="form-row"><div><label class="field-label">Hours</label><input class="field-input" type="number" name="hours" min="0" step="0.25" value="1"></div><div><label class="field-label">Minutes</label><input class="field-input" type="number" name="mins" min="0" max="59" step="5" value="0"></div></div>
    <div><label class="field-label">Started At</label><input class="field-input" type="datetime-local" name="started_at" value="${new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,16)}"></div>
    <div><label class="field-label">Notes</label><textarea class="field-textarea" name="notes"></textarea></div>
  </div></form><div class="modal-footer"><button class="btn btn-secondary" data-close>Cancel</button><button class="btn btn-primary" data-save-time>Log</button></div></div></div>`;
  $('#modalRoot').innerHTML=html;
  $('#modalRoot').onclick=async e=>{
    if(e.target.closest('[data-close]'))closeModal();
    if(e.target.closest('[data-save-time]')){
      const fd=new FormData($('#timeForm'));
      const h=parseFloat(fd.get('hours'))||0,mi=parseInt(fd.get('mins'))||0;
      const dur=Math.round(h*3600+mi*60);
      const started=new Date(fd.get('started_at'));
      const d={video_project_id:parseInt(fd.get('video_project_id')),team_member_id:parseInt(fd.get('team_member_id')),stage:fd.get('stage'),started_at:started.toISOString(),ended_at:new Date(started.getTime()+dur*1000).toISOString(),duration_seconds:dur,notes:fd.get('notes').trim()||null};
      if(!d.video_project_id||!d.team_member_id){toast('Project and editor required','error');return}
      try{const {error}=await sb.from('video_time_logs').insert(d);if(error)throw error;toast('Time logged','success');closeModal();await fetchTimeLogs()}catch(err){toast('Failed: '+(err.message||''),'error')}
    }
  };
}

// === PAGE: CLIENTS ===
function renderClients(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};
  // Selected month from filter (YYYY-MM)
  const selMonth=FILTERS.clientsMonth||new Date().toISOString().slice(0,7);
  const [selY,selM]=selMonth.split('-').map(Number);
  const monthStart=new Date(selY,selM-1,1);
  const monthEnd=new Date(selY,selM,1);
  const monthLabel=monthStart.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  // Build last 12 months options
  const monthOpts=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()-i);const v=d.toISOString().slice(0,7);const lbl=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});monthOpts.push({v,lbl})}
  const rows=DATA.clients.map(c=>{
    const proj=DATA.projects.filter(p=>p.client_id===c.id);
    const active=proj.filter(p=>p.current_stage!=='posted').length;
    const postedThisMonth=proj.filter(p=>p.current_stage==='posted'&&p.completed_at&&new Date(p.completed_at)>=monthStart&&new Date(p.completed_at)<monthEnd).length;
    const target=videoTarget(c);
    const lastAct=proj.map(p=>p.updated_at||p.created_at).sort().pop();
    return {client:c,active,postedThisMonth,target,total:proj.length,lastAct};
  }).sort((a,b)=>b.active-a.active);
  // Summary: how many clients hit target this month
  const withTarget=rows.filter(r=>r.target>0);
  const hitTarget=withTarget.filter(r=>r.postedThisMonth>=r.target).length;
  $('#pageSub').textContent=`${rows.length} client${rows.length===1?'':'s'} · ${monthLabel}`;
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Clients</div><div class="page-sub">Video delivery per client · click a row to drill in</div></div>
    <select class="filter-select" id="clientsMonthPick" style="min-width:180px">${monthOpts.map(o=>`<option value="${o.v}" ${o.v===selMonth?'selected':''}>${o.lbl}</option>`).join('')}</select></div>
    ${withTarget.length?`<div class="stat-grid" style="margin-bottom:18px">
      ${statCard('On Target',hitTarget+'/'+withTarget.length,'clients hit monthly goal',hitTarget===withTarget.length?'green':(hitTarget>=withTarget.length/2?'amber':'red'))}
      ${statCard('Videos Posted',rows.reduce((s,r)=>s+r.postedThisMonth,0),'across all clients in '+monthStart.toLocaleDateString('en-GB',{month:'short'}))}
      ${statCard('Behind Target',withTarget.filter(r=>r.postedThisMonth<r.target).length,'clients below goal','red')}
      ${statCard('Active Projects',rows.reduce((s,r)=>s+r.active,0),'in pipeline now')}
    </div>`:''}
    <table class="tbl"><thead><tr><th>Client</th><th>Active</th><th>${monthStart.toLocaleDateString('en-GB',{month:'short'})} Progress</th><th>Total Projects</th><th>Last Activity</th></tr></thead><tbody>
    ${rows.map(r=>{
      const tgt=r.target||0;
      const posted=r.postedThisMonth;
      const pct=tgt>0?Math.min(100,(posted/tgt)*100):0;
      const barColor=tgt===0?'var(--text-3)':(pct>=100?'var(--green)':(pct>=50?'var(--accent)':'var(--amber)'));
      const progressHtml=tgt>0
        ? `<div style="display:flex;align-items:center;gap:10px;min-width:140px"><div style="font-size:13px;font-weight:700;color:var(--text);min-width:40px"><span style="color:${barColor}">${posted}</span><span style="color:var(--text-3)">/${tgt}</span></div><div style="flex:1;height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;min-width:60px"><div style="height:100%;width:${pct}%;background:${barColor};transition:width 0.3s"></div></div></div>`
        : `<span class="muted">${posted} posted · no target set</span>`;
      return `<tr class="clickable" data-cid="${r.client.id}"><td><strong>${esc(r.client.name)}</strong></td><td>${r.active}</td><td>${progressHtml}</td><td class="muted">${r.total}</td><td class="muted">${r.lastAct?timeAgo(r.lastAct):'—'}</td></tr>`;
    }).join('')}
    </tbody></table>`;
  const mp=$('#clientsMonthPick');
  if(mp)mp.onchange=e=>{FILTERS.clientsMonth=e.target.value;renderClients()};
  $('#pageContent').onclick=e=>{const r=e.target.closest('[data-cid]');if(r)openClientDetail(parseInt(r.dataset.cid))};
}
function openClientDetail(cid){
  const c=DATA.clients.find(x=>x.id===cid);if(!c)return;
  const proj=DATA.projects.filter(p=>p.client_id===cid).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const active=proj.filter(p=>p.current_stage!=='posted');
  const done=proj.filter(p=>p.current_stage==='posted');
  const html=`<div class="modal-backdrop" id="modal"><div class="modal modal-large"><div class="modal-header"><div><div class="modal-title">${esc(c.name)}</div><div class="modal-sub">${proj.length} total · ${active.length} active · ${done.length} completed</div></div><button class="modal-close" data-close>&times;</button></div><div class="modal-body">
    <div class="detail-section"><div class="detail-section-title">Active Projects (${active.length})</div>
      ${active.length?`<table class="tbl"><thead><tr><th>Title</th><th>Stage</th><th>Editor</th><th>Deadline</th></tr></thead><tbody>${active.map(p=>{const ed=getMember(p.assigned_editor_id);const ov=p.deadline&&isOverdue(p.deadline);return `<tr class="clickable" data-pid="${p.id}"><td>${esc(p.title)}</td><td><span class="tag">${esc(STAGES.find(s=>s.key===p.current_stage)?.label||'')}</span></td><td class="muted">${esc(ed?.name||'Unassigned')}</td><td class="${ov?'':'muted'}" style="${ov?'color:var(--red)':''}">${p.deadline?fmtDate(p.deadline):'—'}</td></tr>`}).join('')}</tbody></table>`:'<div class="link-empty">No active projects</div>'}
    </div>
    ${done.length?`<div class="detail-section"><div class="detail-section-title">Recent Completed (${done.length})</div><table class="tbl"><thead><tr><th>Title</th><th>Editor</th><th>Completed</th></tr></thead><tbody>${done.slice(0,15).map(p=>{const ed=getMember(p.assigned_editor_id);return `<tr class="clickable" data-pid="${p.id}"><td>${esc(p.title)}</td><td class="muted">${esc(ed?.name||'—')}</td><td class="muted">${p.completed_at?fmtDate(p.completed_at):'—'}</td></tr>`}).join('')}</tbody></table></div>`:''}
  </div><div class="modal-footer"><button class="btn btn-primary" data-close>Close</button></div></div></div>`;
  $('#modalRoot').innerHTML=html;
  $('#modalRoot').onclick=e=>{if(e.target.closest('[data-close]'))closeModal();const r=e.target.closest('[data-pid]');if(r){closeModal();setTimeout(()=>openProjectDetail(parseInt(r.dataset.pid)),100)}};
}
