<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #14141d; --surface-2: #1d1d2a; --surface-3: #262635;
    --border: rgba(255, 255, 255, 0.06); --border-strong: rgba(255, 255, 255, 0.12);

  html, body { height: 100%; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow: hidden; }

  .login-subtitle { text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 0.32em; color: var(--accent); text-transform: uppercase; margin-top: 10px; margin-bottom: 24px; }
  .login-date { text-align: center; color: var(--text-3); font-size: 13px; margin-bottom: 28px; font-weight: 400; }
  .login-input-big { width: 100%; background: var(--surface-2); border: 1px solid transparent; border-radius: 10px; padding: 18px 20px; color: var(--text); font-size: 13px; font-weight: 600; text-align: center; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 12px; transition: all 0.15s ease; display: block; }

  .login-btn { width: 100%; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%); color: white; font-weight: 800; padding: 18px 20px; border-radius: 10px; margin-top: 4px; font-size: 14px; letter-spacing: 0.24em; text-transform: uppercase; transition: all 0.15s ease; box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3); cursor: pointer; }
  .login-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(168, 85, 247, 0.45); }
  .login-btn:active { transform: translateY(0); }
  .login-error { color: var(--red); font-size: 12px; margin-top: 14px; text-align: center; min-height: 16px; font-weight: 500; }
  .version-marker { position: fixed; bottom: 10px; right: 14px; font-size: 9px; color: var(--text-3); letter-spacing: 0.1em; font-weight: 500; opacity: 0.5; }

  .sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }

  .sidebar-logo { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%); display: grid; place-items: center; font-weight: 800; font-size: 14px; box-shadow: 0 2px 12px var(--accent-glow); }

  .stage-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; }
  .stage-cards.drop-target { background: var(--accent-soft); }
  .stage-empty { padding: 20px 10px; text-align: center; color: var(--text-3); font-size: 11px; font-style: italic; }
  .card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: grab; transition: all 0.15s ease; }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3); }
  .card.dragging { opacity: 0.4; cursor: grabbing; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-client { font-size: 11px; color: var(--text-3); margin-bottom: 10px; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: 8px; }
  .card-meta-left { display: flex; align-items: center; gap: 6px; }
  .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .priority-urgent { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .priority-high { background: var(--amber); }
  .priority-medium { background: var(--blue); }
  .priority-low { background: var(--text-3); }
  .card-deadline { font-size: 10px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-deadline.overdue { color: var(--red); font-weight: 600; }
  .card-avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--surface-3); display: grid; place-items: center; font-size: 9px; font-weight: 700; color: var(--text); }
  .card-avatar.assigned { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%); }
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); z-index: 90; display: flex; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.15s ease; }
  .modal { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 14px; width: 100%; max-width: 540px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); animation: slideUp 0.2s ease; }
  .modal-large { max-width: 720px; }
  .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .modal-close { color: var(--text-3); font-size: 20px; width: 32px; height: 32px; border-radius: 6px; display: grid; place-items: center; transition: all 0.15s ease; }
  .modal-close:hover { background: var(--surface-2); color: var(--text); }
  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  .form-grid { display: grid; gap: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .field-input, .field-select, .field-textarea { width: 100%; background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 13px; transition: all 0.15s ease; }
  .field-input:focus, .field-select:focus, .field-textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .field-textarea { resize: vertical; min-height: 70px; font-family: inherit; }
  .toasts { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
  .toast { background: var(--surface); border: 1px solid var(--border-strong); border-left: 3px solid var(--accent); color: var(--text); padding: 12px 16px; border-radius: 8px; font-size: 13px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4); animation: slideInRight 0.2s ease; max-width: 360px; }
  .toast.error { border-left-color: var(--red); }
  .toast.success { border-left-color: var(--green); }
  .detail-section { margin-bottom: 22px; }
  .detail-section-title { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
  .detail-meta-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .detail-meta-item { background: var(--surface-2); padding: 10px 12px; border-radius: 8px; }
  .detail-meta-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .detail-meta-value { font-size: 13px; color: var(--text); font-weight: 500; }
  .detail-description { font-size: 13px; color: var(--text-2); line-height: 1.6; white-space: pre-wrap; }
  .comment-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .comment { background: var(--surface-2); border-radius: 8px; padding: 10px 12px; }
  .comment-head { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .comment-author { font-size: 11px; font-weight: 600; color: var(--accent); letter-spacing: 0.04em; }
  .comment-time { font-size: 10px; color: var(--text-3); }
  .comment-body { font-size: 13px; color: var(--text); white-space: pre-wrap; }
  .comment-empty { text-align: center; color: var(--text-3); font-size: 12px; padding: 12px; font-style: italic; }
  .comment-form { display: flex; gap: 8px; }
  .comment-form .field-textarea { min-height: 40px; }
  [hidden] { display: none !important; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
</style>
</head>

function canDeleteProject() { return currentUser && currentUser.role === 'admin'; }
function initSupabase() { if (!window.supabase) { console.error('Supabase SDK not loaded'); return; } sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
function setupLogin() { const dateEl = $('#loginDate'); if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }); $('#loginBtn').onclick = doLogin; ['#loginName', '#loginPin'].forEach(s => { const el = $(s); if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }); }); const saved = sessionStorage.getItem('bb_video_user'); if (saved) { try { const u = JSON.parse(saved); const ex = USERS.find(x => x.name === u.name); if (ex) { onLoginSuccess(ex); return; } } catch (_) {} } setTimeout(() => $('#loginName')?.focus(), 100); }
function doLogin() { const n = $('#loginName').value.trim().toUpperCase(); const p = $('#loginPin').value.trim(); const e = $('#loginError'); if (!n) { e.textContent = 'Enter your name'; return; } if (!p) { e.textContent = 'Enter your PIN'; return; } const u = USERS.find(x => x.name === n); if (!u) { e.textContent = `User "${n}" not found`; return; } if (u.pin !== p) { e.textContent = 'Wrong PIN'; $('#loginPin').value = ''; return; } e.textContent = ''; onLoginSuccess(u); }
function onLoginSuccess(user) { currentUser = user; sessionStorage.setItem('bb_video_user', JSON.stringify({ name: user.name })); $('#loginScreen').hidden = true; $('#app').hidden = false; $('#userName').textContent = user.name; $('#userRole').textContent = user.role.replace('_', ' '); $('#userAvatar').textContent = getInitials(user.name); if (!canEditProjects()) $('#newProjectBtn').style.display = 'none'; bootApp(); }
function logout() { sessionStorage.removeItem('bb_video_user'); if (refreshTimer) clearInterval(refreshTimer); currentUser = null; $('#app').hidden = true; $('#loginScreen').hidden = false; $('#loginPin').value = ''; }
async function fetchAll() { try { const [pr, cr, tr] = await Promise.all([ sb.from('video_projects').select('*').eq('is_archived', false).order('created_at', { ascending: false }), sb.from('clients').select('id, name'), sb.from('team_members').select('id, name, role') ]); if (pr.error) throw pr.error; if (cr.error) throw cr.error; if (tr.error) throw tr.error; projects = pr.data || []; clients = cr.data || []; teamMembers = tr.data || []; if (currentUser.role === 'editor') { const me = teamMembers.find(m => m.name && m.name.toUpperCase() === currentUser.name.toUpperCase()); projects = me ? projects.filter(p => p.assigned_editor_id === me.id) : []; } renderPipeline(); updateSubtitle(); } catch (err) { console.error(err); toast('Failed to load data: ' + (err.message || ''), 'error'); } }
function updateSubtitle() { const t = projects.length; const o = projects.filter(p => p.deadline && isOverdue(p.deadline) && p.current_stage !== 'posted').length; let s = `${t} active project${t === 1 ? '' : 's'}`; if (o) s += ` · ${o} overdue`; $('#pipelineSubtitle').textContent = s; }
function renderPipeline() { const b = $('#pipelineBoard'); b.innerHTML = STAGES.map(st => { const sp = projects.filter(p => p.current_stage === st.key); const h = sp.length ? sp.map(p => projectCardHtml(p)).join('') : `<div class="stage-empty">No projects</div>`; return `<div class="stage-col" data-stage="${st.key}"><div class="stage-header"><div class="stage-title">${st.label}</div><div class="stage-count">${sp.length}</div></div><div class="stage-cards" data-drop-stage="${st.key}">${h}</div></div>`; }).join(''); attachCardListeners(); attachDropListeners(); }
function projectCardHtml(p) { const cl = clients.find(c => c.id === p.client_id); const ed = teamMembers.find(m => m.id === p.assigned_editor_id); const ov = p.deadline && isOverdue(p.deadline) && p.current_stage !== 'posted'; const dr = canMoveStages() ? 'draggable="true"' : ''; return `<div class="card" data-project-id="${p.id}" ${dr}><div class="card-title">${escapeHtml(p.title)}</div><div class="card-client">${escapeHtml(cl?.name || '— No client —')}</div><div class="card-meta"><div class="card-meta-left"><div class="priority-dot priority-${p.priority || 'medium'}"></div>${p.deadline ? `<div class="card-deadline ${ov ? 'overdue' : ''}">${formatDate(p.deadline)}</div>` : ''}</div><div class="card-avatar ${ed ? 'assigned' : ''}">${ed ? getInitials(ed.name) : '?'}</div></div></div>`; }
function attachCardListeners() { $$('.card').forEach(c => { c.addEventListener('click', e => { if (c.classList.contains('dragging')) return; openProjectDetail(parseInt(c.dataset.projectId)); }); if (canMoveStages()) { c.addEventListener('dragstart', e => { c.classList.add('dragging'); e.dataTransfer.setData('text/project-id', c.dataset.projectId); }); c.addEventListener('dragend', () => c.classList.remove('dragging')); } }); }
function attachDropListeners() { if (!canMoveStages()) return; $$('.stage-cards').forEach(z => { z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('drop-target'); }); z.addEventListener('dragleave', () => z.classList.remove('drop-target')); z.addEventListener('drop', async e => { e.preventDefault(); z.classList.remove('drop-target'); const pid = parseInt(e.dataTransfer.getData('text/project-id')); const ns = z.dataset.dropStage; const p = projects.find(x => x.id === pid); if (!p || p.current_stage === ns) return; await moveProject(p, ns); }); }); }
async function moveProject(project, newStage) { const old = project.current_stage; project.current_stage = newStage; if (newStage === 'posted') project.completed_at = new Date().toISOString(); renderPipeline(); try { const { data: open } = await sb.from('video_stage_history').select('*').eq('video_project_id', project.id).is('exited_at', null); if (open && open.length) { const o = open[0]; const ex = new Date(); const en = new Date(o.entered_at); await sb.from('video_stage_history').update({ exited_at: ex.toISOString(), duration_seconds: Math.floor((ex - en) / 1000) }).eq('id', o.id); } await sb.from('video_stage_history').insert({ video_project_id: project.id, stage: newStage, moved_by: currentUser.name }); const up = { current_stage: newStage, updated_at: new Date().toISOString() }; if (newStage === 'posted') up.completed_at = new Date().toISOString(); const { error } = await sb.from('video_projects').update(up).eq('id', project.id); if (error) throw error; toast(`Moved to ${STAGES.find(s => s.key === newStage)?.label}`, 'success'); } catch (err) { console.error(err); toast('Move failed', 'error'); project.current_stage = old; renderPipeline(); } }
function openProjectForm(existing = null) { if (!canEditProjects()) return; const ie = !!existing; const html = `<div class="modal-backdrop" id="modal"><div class="modal"><div class="modal-header"><div class="modal-title">${ie ? 'Edit Project' : 'New Project'}</div><button class="modal-close" onclick="closeModal()">&times;</button></div><form id="projectForm" class="modal-body"><div class="form-grid"><div><label class="field-label">Title</label><input class="field-input" name="title" required value="${escapeHtml(existing?.title || '')}" autofocus></div><div class="form-row"><div><label class="field-label">Client</label><select class="field-select" name="client_id"><option value="">— None —</option>${clients.map(c => `<option value="${c.id}" ${existing?.client_id === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}</select></div><div><label class="field-label">Assigned Editor</label><select class="field-select" name="assigned_editor_id"><option value="">— Unassigned —</option>${teamMembers.map(m => `<option value="${m.id}" ${existing?.assigned_editor_id === m.id ? 'selected' : ''}>${escapeHtml(m.name)}</option>`).join('')}</select></div></div><div class="form-row"><div><label class="field-label">Priority</label><select class="field-select" name="priority">${['low','medium','high','urgent'].map(p => `<option value="${p}" ${(existing?.priority || 'medium') === p ? 'selected' : ''}>${p[0].toUpperCase() + p.slice(1)}</option>`).join('')}</select></div><div><label class="field-label">Type</label><select class="field-select" name="type">${['reel','ad','testimonial','product','educational'].map(t => `<option value="${t}" ${(existing?.type || 'reel') === t ? 'selected' : ''}>${t[0].toUpperCase() + t.slice(1)}</option>`).join('')}</select></div></div><div class="form-row"><div><label class="field-label">Stage</label><select class="field-select" name="current_stage">${STAGES.map(s => `<option value="${s.key}" ${(existing?.current_stage || 'video_shot') === s.key ? 'selected' : ''}>${s.label}</option>`).join('')}</select></div><div><label class="field-label">Deadline</label><input class="field-input" type="date" name="deadline" value="${existing?.deadline || ''}"></div></div><div><label class="field-label">Formula (optional)</label><input class="field-input" name="formula" value="${escapeHtml(existing?.formula || '')}"></div><div><label class="field-label">Description</label><textarea class="field-textarea" name="description" rows="3">${escapeHtml(existing?.description || '')}</textarea></div></div></form><div class="modal-footer">${ie && canDeleteProject() ? `<button class="btn btn-ghost btn-danger" onclick="deleteProject(${existing.id})">Delete</button>` : ''}<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveProject(${ie ? existing.id : 'null'})">${ie ? 'Save' : 'Create'}</button></div></div></div>`; $('#modalRoot').innerHTML = html; }
async function saveProject(id) { const f = $('#projectForm'); const fd = new FormData(f); const d = { title: fd.get('title').trim(), client_id: fd.get('client_id') ? parseInt(fd.get('client_id')) : null, assigned_editor_id: fd.get('assigned_editor_id') ? parseInt(fd.get('assigned_editor_id')) : null, priority: fd.get('priority'), type: fd.get('type'), current_stage: fd.get('current_stage'), deadline: fd.get('deadline') || null, formula: fd.get('formula').trim() || null, description: fd.get('description').trim() || null }; if (!d.title) { toast('Title required', 'error'); return; } try { if (id) { const o = projects.find(p => p.id === id); if (o && o.current_stage !== d.current_stage) await moveProject(o, d.current_stage); d.updated_at = new Date().toISOString(); const { error } = await sb.from('video_projects').update(d).eq('id', id); if (error) throw error; toast('Project updated', 'success'); } else { d.created_by = currentUser.name; const { data: ins, error } = await sb.from('video_projects').insert(d).select().single(); if (error) throw error; await sb.from('video_stage_history').insert({ video_project_id: ins.id, stage: ins.current_stage, moved_by: currentUser.name }); toast('Project created', 'success'); } closeModal(); await fetchAll(); } catch (err) { console.error(err); toast('Save failed: ' + (err.message || ''), 'error'); } }
async function deleteProject(id) { if (!confirm('Delete this project?')) return; try { const { error } = await sb.from('video_projects').delete().eq('id', id); if (error) throw error; toast('Project deleted', 'success'); closeModal(); await fetchAll(); } catch (err) { toast('Delete failed', 'error'); } }
function closeModal() { $('#modalRoot').innerHTML = ''; }
async function openProjectDetail(id) { const p = projects.find(x => x.id === id); if (!p) return; const cl = clients.find(c => c.id === p.client_id); const ed = teamMembers.find(m => m.id === p.assigned_editor_id); const st = STAGES.find(s => s.key === p.current_stage); let comments = []; try { const { data } = await sb.from('video_project_comments').select('*').eq('video_project_id', id).order('created_at', { ascending: true }); comments = data || []; } catch (_) {} const ov = p.deadline && isOverdue(p.deadline) && p.current_stage !== 'posted'; const html = `<div class="modal-backdrop" id="modal"><div class="modal modal-large"><div class="modal-header"><div><div class="modal-title">${escapeHtml(p.title)}</div><div style="font-size:11px;color:var(--text-3);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em">${escapeHtml(cl?.name || 'No client')} · ${st?.label || p.current_stage}</div></div><button class="modal-close" onclick="closeModal()">&times;</button></div><div class="modal-body"><div class="detail-section"><div class="detail-section-title">Overview</div><div class="detail-meta-grid"><div class="detail-meta-item"><div class="detail-meta-label">Priority</div><div class="detail-meta-value" style="text-transform:capitalize"><span class="priority-dot priority-${p.priority || 'medium'}" style="display:inline-block;margin-right:6px"></span>${p.priority || 'medium'}</div></div><div class="detail-meta-item"><div class="detail-meta-label">Type</div><div class="detail-meta-value" style="text-transform:capitalize">${p.type || '—'}</div></div><div class="detail-meta-item"><div class="detail-meta-label">Editor</div><div class="detail-meta-value">${escapeHtml(ed?.name || 'Unassigned')}</div></div><div class="detail-meta-item"><div class="detail-meta-label">Deadline</div><div class="detail-meta-value" style="${ov ? 'color:var(--red)' : ''}">${p.deadline ? formatDate(p.deadline) : '—'}${ov ? ' (overdue)' : ''}</div></div>${p.formula ? `<div class="detail-meta-item" style="grid-column:1/-1"><div class="detail-meta-label">Formula</div><div class="detail-meta-value">${escapeHtml(p.formula)}</div></div>` : ''}</div></div>${p.description ? `<div class="detail-section"><div class="detail-section-title">Description</div><div class="detail-description">${escapeHtml(p.description)}</div></div>` : ''}<div class="detail-section"><div class="detail-section-title">Team Discussion</div><div class="comment-list">${comments.length ? comments.map(c => `<div class="comment"><div class="comment-head"><div class="comment-author">${escapeHtml(c.author)}</div><div class="comment-time">${timeAgo(c.created_at)}</div></div><div class="comment-body">${escapeHtml(c.body)}</div></div>`).join('') : `<div class="comment-empty">No comments yet</div>`}</div><div class="comment-form"><textarea id="newComment" class="field-textarea" placeholder="Add a comment…" rows="2"></textarea><button class="btn btn-primary" onclick="postComment(${id})">Post</button></div></div></div><div class="modal-footer">${canEditProjects() ? `<button class="btn btn-secondary" onclick="closeModal(); openProjectForm(projects.find(p => p.id === ${id}))">Edit</button>` : ''}<button class="btn btn-primary" onclick="closeModal()">Close</button></div></div></div>`; $('#modalRoot').innerHTML = html; }
async function postComment(pid) { const b = $('#newComment').value.trim(); if (!b) return; try { const { error } = await sb.from('video_project_comments').insert({ video_project_id: pid, body: b, author: currentUser.name }); if (error) throw error; await openProjectDetail(pid); } catch (err) { toast('Comment failed', 'error'); } }
function bootApp() { $('#newProjectBtn').onclick = () => openProjectForm(); $('#refreshBtn').onclick = () => fetchAll(); $('#logoutBtn').onclick = logout; fetchAll(); if (refreshTimer) clearInterval(refreshTimer); refreshTimer = setInterval(fetchAll, REFRESH_MS); document.addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); }); document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); }); }
window.addEventListener('DOMContentLoaded', () => { initSupabase(); setupLogin(); });
window.openProjectForm = openProjectForm; window.saveProject = saveProject; window.deleteProject = deleteProject; window.closeModal = closeModal; window.postComment = postComment;
</script>
</body>
