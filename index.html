// === PAGE: CLIENTS ===
function renderClients(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};
  // Selected month from filter (YYYY-MM)
  const selMonth=FILTERS.clientsMonth||new Date().toISOString().slice(0,7);
  const [selY,selM]=selMonth.split('-').map(Number);
  const monthStart=new Date(selY,selM-1,1);
  const monthEnd=new Date(selY,selM,1);
  const monthLabel=monthStart.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  // Build last 12 months options
  const monthOpts=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()-i);const v=d.toISOString().slice(0,7);const lbl=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});monthOpts.push({v,lbl})}
  const rows=DATA.clients.map(c=>{
    const proj=DATA.projects.filter(p=>p.client_id===c.id);
    const active=proj.filter(p=>p.current_stage!=='posted').length;
    const postedThisMonth=proj.filter(p=>p.current_stage==='posted'&&p.completed_at&&new Date(p.completed_at)>=monthStart&&new Date(p.completed_at)<monthEnd).length;
    const target=videoTarget(c);
    const lastAct=proj.map(p=>p.updated_at||p.created_at).sort().pop();
    return {client:c,active,postedThisMonth,target,total:proj.length,lastAct};
  }).sort((a,b)=>b.active-a.active);
  // Summary: how many clients hit target this month
  const withTarget=rows.filter(r=>r.target>0);
  const hitTarget=withTarget.filter(r=>r.postedThisMonth>=r.target).length;
  $('#pageSub').textContent=`${rows.length} client${rows.length===1?'':'s'} · ${monthLabel}`;
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Clients</div><div class="page-sub">Video delivery per client · click a row to drill in</div></div>
    <select class="filter-select" id="clientsMonthPick" style="min-width:180px">${monthOpts.map(o=>`<option value="${o.v}" ${o.v===selMonth?'selected':''}>${o.lbl}</option>`).join('')}</select></div>
    ${withTarget.length?`<div class="stat-grid" style="margin-bottom:18px">
      ${statCard('On Target',hitTarget+'/'+withTarget.length,'clients hit monthly goal',hitTarget===withTarget.length?'green':(hitTarget>=withTarget.length/2?'amber':'red'))}
      ${statCard('Videos Posted',rows.reduce((s,r)=>s+r.postedThisMonth,0),'across all clients in '+monthStart.toLocaleDateString('en-GB',{month:'short'}))}
      ${statCard('Behind Target',withTarget.filter(r=>r.postedThisMonth<r.target).length,'clients below goal','red')}
      ${statCard('Active Projects',rows.reduce((s,r)=>s+r.active,0),'in pipeline now')}
    </div>`:''}
    <table class="tbl"><thead><tr><th>Client</th><th>Active</th><th>${monthStart.toLocaleDateString('en-GB',{month:'short'})} Progress</th><th>Total Projects</th><th>Last Activity</th></tr></thead><tbody>
    ${rows.map(r=>{
      const tgt=r.target||0;
      const posted=r.postedThisMonth;
      const pct=tgt>0?Math.min(100,(posted/tgt)*100):0;
      const barColor=tgt===0?'var(--text-3)':(pct>=100?'var(--green)':(pct>=50?'var(--accent)':'var(--amber)'));
      const progressHtml=tgt>0
        ? `<div style="display:flex;align-items:center;gap:10px;min-width:140px"><div style="font-size:13px;font-weight:700;color:var(--text);min-width:40px"><span style="color:${barColor}">${posted}</span><span style="color:var(--text-3)">/${tgt}</span></div><div style="flex:1;height:6px;background:var(--surface-3);border-radius:3px;overflow:hidden;min-width:60px"><div style="height:100%;width:${pct}%;background:${barColor};transition:width 0.3s"></div></div></div>`
        : `<span class="muted">${posted} posted · no target set</span>`;
      return `<tr class="clickable" data-cid="${r.client.id}"><td><strong>${esc(r.client.name)}</strong></td><td>${r.active}</td><td>${progressHtml}</td><td class="muted">${r.total}</td><td class="muted">${r.lastAct?timeAgo(r.lastAct):'—'}</td></tr>`;
    }).join('')}
    </tbody></table>`;
  const mp=$('#clientsMonthPick');
  if(mp)mp.onchange=e=>{FILTERS.clientsMonth=e.target.value;renderClients()};
  $('#pageContent').onclick=e=>{const r=e.target.closest('[data-cid]');if(r)openClientDetail(parseInt(r.dataset.cid))};
}
function openClientDetail(cid){

    <div class="detail-section"><div class="detail-section-title">Active Projects (${active.length})</div>
      ${active.length?`<table class="tbl"><thead><tr><th>Title</th><th>Stage</th><th>Editor</th><th>Deadline</th></tr></thead><tbody>${active.map(p=>{const ed=getMember(p.assigned_editor_id);const ov=p.deadline&&isOverdue(p.deadline);return `<tr class="clickable" data-pid="${p.id}"><td>${esc(p.title)}</td><td><span class="tag">${esc(STAGES.find(s=>s.key===p.current_stage)?.label||'')}</span></td><td class="muted">${esc(ed?.name||'Unassigned')}</td><td class="${ov?'':'muted'}" style="${ov?'color:var(--red)':''}">${p.deadline?fmtDate(p.deadline):'—'}</td></tr>`}).join('')}</tbody></table>`:'<div class="link-empty">No active projects</div>'}

    ${done.length?`<div class="detail-section"><div class="detail-section-title">Recent Completed (${done.length})</div><table class="tbl"><thead><tr><th>Title</th><th>Editor</th><th>Completed</th></tr></thead><tbody>${done.slice(0,15).map(p=>{const ed=getMember(p.assigned_editor_id);return `<tr class="clickable" data-pid="${p.id}"><td>${esc(p.title)}</td><td class="muted">${esc(ed?.name||'—')}</td><td class="muted">${p.completed_at?fmtDate(p.completed_at):'—'}</td></tr>`}).join('')}</tbody></table></div>`:''}
  </div><div class="modal-footer"><button class="btn btn-primary" data-close>Close</button></div></div></div>`;

      ${members.map(m=>{const ps=DATA.projects.filter(p=>p.assigned_editor_id===m.id);const active=ps.filter(p=>p.current_stage!=='posted').length;const monthStart=startOfMonth();const doneMonth=ps.filter(p=>p.completed_at&&new Date(p.completed_at)>=monthStart).length;return `<div class="team-card" data-mid="${m.id}"><div class="team-card-avatar">${initials(m.name)}</div><div class="team-card-name">${esc(m.name)}</div><div class="team-card-role">${esc(m.role||'team')}</div><div class="team-card-stats"><div class="team-card-stat"><div class="team-card-stat-value">${active}</div><div class="team-card-stat-label">Active</div></div><div class="team-card-stat"><div class="team-card-stat-value">${doneMonth}</div><div class="team-card-stat-label">Done · Month</div></div></div></div>`}).join('')}
    </div>`;
  $('#pageContent').onclick=e=>{const c=e.target.closest('[data-mid]');if(c)openMemberDetail(parseInt(c.dataset.mid))};
}
async function openMemberDetail(mid){
  const m=getMember(mid);if(!m)return;
  const ps=DATA.projects.filter(p=>p.assigned_editor_id===mid);
  const active=ps.filter(p=>p.current_stage!=='posted');
  const monthStart=startOfMonth();
  const doneMonth=ps.filter(p=>p.completed_at&&new Date(p.completed_at)>=monthStart);
  // Avg time: from stage_history
  let avgSec=0;
  try{const {data}=await sb.from('video_stage_history').select('duration_seconds').eq('moved_by',m.name).not('duration_seconds','is',null).limit(500);if(data&&data.length){avgSec=data.reduce((s,r)=>s+(r.duration_seconds||0),0)/data.length}}catch(_){}
  // Time logs for this editor
  let myLogs=[];
  try{const {data}=await sb.from('video_time_logs').select('*').eq('team_member_id',mid).order('started_at',{ascending:false}).limit(20);myLogs=data||[]}catch(_){}
  const monthLogTotal=myLogs.filter(l=>new Date(l.started_at)>=monthStart).reduce((s,l)=>s+(l.duration_seconds||0),0);
  const html=`<div class="modal-backdrop" id="modal"><div class="modal modal-large"><div class="modal-header"><div><div class="modal-title">${esc(m.name)}</div><div class="modal-sub">${esc(m.role||'team')}</div></div><button class="modal-close" data-close>&times;</button></div><div class="modal-body">
    <div class="stat-grid">${statCard('Active Now',active.length)}${statCard('Done This Month',doneMonth.length)}${statCard('Hours This Month',secsToHrs(monthLogTotal))}${statCard('Avg Editing Time',avgSec?secsToHrs(avgSec):'—',avgSec?'per stage':'no data')}</div>
    <div class="detail-section"><div class="detail-section-title">Current Work (${active.length})</div>${active.length?`<table class="tbl"><thead><tr><th>Project</th><th>Client</th><th>Stage</th><th>Deadline</th></tr></thead><tbody>${active.map(p=>{const cl=getClient(p.client_id);const ov=p.deadline&&isOverdue(p.deadline);return `<tr class="clickable" data-pid="${p.id}"><td>${esc(p.title)}</td><td class="muted">${esc(cl?.name||'—')}</td><td><span class="tag">${esc(STAGES.find(s=>s.key===p.current_stage)?.label||'')}</span></td><td class="${ov?'':'muted'}" style="${ov?'color:var(--red)':''}">${p.deadline?fmtDate(p.deadline):'—'}</td></tr>`}).join('')}</tbody></table>`:'<div class="link-empty">No active work</div>'}</div>
    ${doneMonth.length?`<div class="detail-section"><div class="detail-section-title">Completed This Month (${doneMonth.length})</div><table class="tbl"><thead><tr><th>Project</th><th>Client</th><th>Completed</th></tr></thead><tbody>${doneMonth.slice(0,15).map(p=>{const cl=getClient(p.client_id);return `<tr class="clickable" data-pid="${p.id}"><td>${esc(p.title)}</td><td class="muted">${esc(cl?.name||'—')}</td><td class="muted">${fmtDate(p.completed_at)}</td></tr>`}).join('')}</tbody></table></div>`:''}
    ${myLogs.length?`<div class="detail-section"><div class="detail-section-title">Recent Time Logs</div><table class="tbl"><thead><tr><th>Project</th><th>Stage</th><th>Started</th><th>Duration</th></tr></thead><tbody>${myLogs.slice(0,10).map(l=>{const p=getProject(l.video_project_id);return `<tr><td>${esc(p?.title||'—')}</td><td class="muted">${esc(STAGES.find(s=>s.key===l.stage)?.label||'')}</td><td class="muted">${fmtDateTime(l.started_at)}</td><td>${secsToHrs(l.duration_seconds||0)}</td></tr>`}).join('')}</tbody></table></div>`:''}
  </div><div class="modal-footer"><button class="btn btn-primary" data-close>Close</button></div></div></div>`;
  $('#modalRoot').innerHTML=html;
  $('#modalRoot').onclick=e=>{if(e.target.closest('[data-close]'))closeModal();const r=e.target.closest('[data-pid]');if(r){closeModal();setTimeout(()=>openProjectDetail(parseInt(r.dataset.pid)),100)}};
}

// === PAGE: ANALYTICS ===
async function renderAnalytics(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};
  const monthStart=startOfMonth();
  const lastMonthStart=new Date(monthStart);lastMonthStart.setMonth(lastMonthStart.getMonth()-1);
  const lastMonthEnd=new Date(monthStart);
  const ps=DATA.projects;
  const completed=ps.filter(p=>p.completed_at&&new Date(p.completed_at)>=monthStart);
  const completedLastMonth=ps.filter(p=>p.completed_at&&new Date(p.completed_at)>=lastMonthStart&&new Date(p.completed_at)<lastMonthEnd);
  const active=ps.filter(p=>p.current_stage!=='posted').length;
  const turn=completed.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000);
  const avgTurn=turn.length?(turn.reduce((s,t)=>s+t,0)/turn.length).toFixed(1):'—';
  const turnLast=completedLastMonth.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000);
  const avgTurnLast=turnLast.length?(turnLast.reduce((s,t)=>s+t,0)/turnLast.length).toFixed(1):null;
  const trendArrow=avgTurnLast?(parseFloat(avgTurn)<parseFloat(avgTurnLast)?`<span style="color:var(--green)">↓ ${(avgTurnLast-avgTurn).toFixed(1)}d faster</span>`:`<span style="color:var(--red)">↑ ${(avgTurn-avgTurnLast).toFixed(1)}d slower</span>`):'';
  const monthlyDelta=completedLastMonth.length?`vs ${completedLastMonth.length} last month`:'';
  // Per editor
  const editorStats={};
  DATA.teamMembers.forEach(m=>{editorStats[m.id]={name:m.name,active:0,doneMonth:0,doneLastMonth:0,sumDays:0,countDays:0}});
  ps.forEach(p=>{if(!p.assigned_editor_id)return;const s=editorStats[p.assigned_editor_id];if(!s)return;if(p.current_stage!=='posted')s.active++;if(p.completed_at){const d=new Date(p.completed_at);if(d>=monthStart){s.doneMonth++;s.sumDays+=(d-new Date(p.created_at))/86400000;s.countDays++}else if(d>=lastMonthStart&&d<lastMonthEnd){s.doneLastMonth++}}});
  // Per client
  const clientStats={};
  DATA.clients.forEach(c=>{clientStats[c.id]={name:c.name,active:0,doneMonth:0,target:c.videos_per_month||c.monthly_videos||c.video_target||null}});
  ps.forEach(p=>{if(!p.client_id||!clientStats[p.client_id])return;if(p.current_stage!=='posted')clientStats[p.client_id].active++;if(p.completed_at&&new Date(p.completed_at)>=monthStart)clientStats[p.client_id].doneMonth++});
  // Stage time analysis — from video_stage_history
  let stageAvgs={};
  try{
    const {data:history}=await sb.from('video_stage_history').select('stage,duration_seconds').not('duration_seconds','is',null).gte('entered_at',lastMonthStart.toISOString());
    if(history){STAGES.forEach(s=>{const rows=history.filter(r=>r.stage===s.key);if(rows.length){stageAvgs[s.key]={avg:rows.reduce((sum,r)=>sum+(r.duration_seconds||0),0)/rows.length,count:rows.length,label:s.label}}})}
  }catch(_){}
  // Pipeline bottleneck — which stage has most stuck projects (oldest)
  const stuckByStage={};
  ps.filter(p=>p.current_stage!=='posted').forEach(p=>{
    const stage=p.current_stage;
    if(!stuckByStage[stage])stuckByStage[stage]={count:0,oldest:null,label:STAGES.find(s=>s.key===stage)?.label||stage};
    stuckByStage[stage].count++;
    const updated=new Date(p.updated_at||p.created_at);
    if(!stuckByStage[stage].oldest||updated<stuckByStage[stage].oldest)stuckByStage[stage].oldest=updated;
  });
  const bottleneck=Object.entries(stuckByStage).sort((a,b)=>b[1].count-a[1].count)[0];
  // Top performer
  const topEditor=Object.values(editorStats).sort((a,b)=>b.doneMonth-a.doneMonth)[0];
  // Slowest stage
  const slowestStage=Object.entries(stageAvgs).sort((a,b)=>b[1].avg-a[1].avg)[0];
  $('#pageSub').textContent='This month performance';
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Analytics</div><div class="page-sub">Monthly performance · ${new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</div></div></div>
    <div class="stat-grid">
      ${statCard('Active Projects',active)}
      ${statCard('Completed This Month',completed.length,monthlyDelta)}
      ${statCard('Avg Turnaround',avgTurn==='—'?'—':avgTurn+'d',trendArrow||'no comparison')}
      ${statCard('Total Projects',ps.length)}
    </div>
    ${bottleneck||topEditor?.doneMonth||slowestStage?`<div class="detail-section"><div class="detail-section-title">🎯 Insights</div><div class="time-breakdown">
      ${bottleneck?`<div class="time-breakdown-item changes"><div class="time-breakdown-label">Pipeline Bottleneck</div><div class="time-breakdown-value">${bottleneck[1].label}</div><div class="muted" style="font-size:11px;margin-top:4px">${bottleneck[1].count} project${bottleneck[1].count>1?'s':''} stuck</div></div>`:''}
      ${topEditor?.doneMonth?`<div class="time-breakdown-item editing"><div class="time-breakdown-label">Top Performer</div><div class="time-breakdown-value">${esc(topEditor.name)}</div><div class="muted" style="font-size:11px;margin-top:4px">${topEditor.doneMonth} videos done</div></div>`:''}
      ${slowestStage?`<div class="time-breakdown-item total"><div class="time-breakdown-label">Slowest Stage</div><div class="time-breakdown-value">${esc(slowestStage[1].label)}</div><div class="muted" style="font-size:11px;margin-top:4px">${secsToHrs(slowestStage[1].avg)} avg</div></div>`:''}
    </div></div>`:''}
    <div class="two-col">
      <div class="panel"><div class="panel-head"><div class="panel-title">Per Editor (this month)</div></div><table class="tbl"><thead><tr><th>Editor</th><th>Active</th><th>Done</th><th>Last Mo</th><th>Avg Turn</th></tr></thead><tbody>${Object.values(editorStats).filter(s=>s.active||s.doneMonth||s.doneLastMonth).sort((a,b)=>b.doneMonth-a.doneMonth).map(s=>{const delta=s.doneLastMonth?(s.doneMonth>=s.doneLastMonth?`<span style="color:var(--green);font-size:10px">↑</span>`:`<span style="color:var(--red);font-size:10px">↓</span>`):'';return `<tr><td>${esc(s.name)}</td><td>${s.active}</td><td>${s.doneMonth} ${delta}</td><td class="muted">${s.doneLastMonth}</td><td class="muted">${s.countDays?(s.sumDays/s.countDays).toFixed(1)+'d':'—'}</td></tr>`}).join('')||'<tr><td colspan="5" class="muted" style="text-align:center">No data</td></tr>'}</tbody></table></div>
      <div class="panel"><div class="panel-head"><div class="panel-title">Per Client (this month)</div></div><table class="tbl"><thead><tr><th>Client</th><th>Progress</th><th>Active</th></tr></thead><tbody>${Object.values(clientStats).filter(s=>s.active||s.doneMonth).sort((a,b)=>b.doneMonth-a.doneMonth).slice(0,15).map(s=>{const prog=s.target?`${s.doneMonth}/${s.target}`:`${s.doneMonth}`;const cls=s.target&&s.doneMonth>=s.target?'color:var(--green);font-weight:700':(s.target&&s.doneMonth<s.target/2?'color:var(--red)':'');return `<tr><td>${esc(s.name)}</td><td style="${cls}">${prog}</td><td>${s.active}</td></tr>`}).join('')||'<tr><td colspan="3" class="muted" style="text-align:center">No data</td></tr>'}</tbody></table></div>
    </div>
    ${Object.keys(stageAvgs).length?`<div class="panel" style="margin-top:18px"><div class="panel-head"><div class="panel-title">Average Time Per Stage</div><div class="muted" style="font-size:11px">Based on last 60 days · ${Object.values(stageAvgs).reduce((s,x)=>s+x.count,0)} data points</div></div><table class="tbl"><thead><tr><th>Stage</th><th>Avg Duration</th><th>Sample Size</th></tr></thead><tbody>${Object.entries(stageAvgs).sort((a,b)=>b[1].avg-a[1].avg).map(([k,v])=>`<tr><td><span class="stage-dot s-${k}"></span> ${esc(v.label)}</td><td>${secsToHrs(v.avg)}</td><td class="muted">${v.count}</td></tr>`).join('')}</tbody></table></div>`:''}
  `;
}

// === PAGE: TEAM CHAT ===
function renderTeamChat(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};
  if(!FILTERS.chatClient&&DATA.clients.length)FILTERS.chatClient=DATA.clients[0].id;
  // Direct chat messages for this client
  const chatMsgs=(DATA.chats||[]).filter(m=>m.client_id===FILTERS.chatClient).map(m=>({...m,_kind:'chat'}));
  // Project comments from projects belonging to this client
  const clientProjectIds=new Set((DATA.projects||[]).filter(p=>p.client_id===FILTERS.chatClient).map(p=>p.id));
  const projComments=(DATA.projectComments||[]).filter(c=>clientProjectIds.has(c.video_project_id)).map(c=>({...c,_kind:'comment'}));
  // Merge + sort chronologically
  const merged=[...chatMsgs,...projComments].sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  const cl=getClient(FILTERS.chatClient);
  $('#pageSub').textContent=cl?`Chat for ${cl.name} · includes project discussions`:'Select a client';
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Team Chat</div><div class="page-sub">One chat per client · merged with project comments chronologically</div></div></div>
    <div class="filters">
      <select class="filter-select" id="chatClientPick" style="min-width:240px">${DATA.clients.map(c=>`<option value="${c.id}" ${FILTERS.chatClient===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>
    </div>
    <div class="panel"><div class="panel-head"><div class="panel-title">${esc(cl?.name||'')}</div><span class="text-3 fs-11">${chatMsgs.length} chat · ${projComments.length} project comment${projComments.length===1?'':'s'}</span></div>
      <div class="panel-body">
        <div class="comment-list" style="max-height:55vh">${merged.length?merged.map(m=>{
          const isProj=m._kind==='comment';
          const proj=isProj?getProject(m.video_project_id):null;
          const tagHtml=isProj?`<span class="tag" style="font-size:9px;background:var(--accent-soft);color:var(--accent);margin-left:8px;cursor:pointer" data-jump-pid="${m.video_project_id}">↗ ${esc(proj?.title||'project')}</span>`:'';
          return `<div class="comment" style="${isProj?'border-left:3px solid var(--accent)':''}"><div class="comment-head"><div class="comment-author">${esc(m.author||'')}${tagHtml}</div><div class="comment-time">${timeAgo(m.created_at)}</div></div>${m.body?`<div class="comment-body">${esc(m.body)}</div>`:''}${m.image_url?`<img class="comment-img" src="${esc(m.image_url)}" onerror="this.style.display='none'">`:''}</div>`;
        }).join(''):'<div class="comment-empty">Nothing yet — start the conversation. Project comments will also appear here.</div>'}</div>
        <div class="comment-form">
          <textarea id="chatBody" class="field-textarea" placeholder="Type a message… (you can paste an image with Cmd+V)" rows="2"></textarea>
          ${imageAttachHtml('chat')}
          <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" data-send-chat>Send Message</button></div>
        </div>
      </div>
    </div>`;
  $('#chatClientPick').onchange=e=>{FILTERS.chatClient=parseInt(e.target.value);renderTeamChat()};
  wireImageAttach('chat','#chatBody');
  $('#pageContent').onclick=async e=>{
    const ci=e.target.closest('[data-clear-img]');if(ci){clearPendingImg(ci.dataset.clearImg);return}
    const jp=e.target.closest('[data-jump-pid]');if(jp){openProjectDetail(parseInt(jp.dataset.jumpPid));return}
    if(e.target.closest('[data-send-chat]')){
      const body=$('#chatBody').value.trim();
      const img=PENDING_IMG['chat']||null;
      if(!body&&!img)return;
      try{const {error}=await sb.from('video_chat_messages').insert({client_id:FILTERS.chatClient,body:body||'',image_url:img,author:currentUser.name});if(error)throw error;$('#chatBody').value='';clearPendingImg('chat');await fetchAll();renderTeamChat()}catch(err){toast('Failed: '+(err.message||''),'error')}
    }
  };
}

// === PAGE: INSPO HUB ===
function renderInspoHub(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button><button class="btn btn-primary" data-action="new">+ Add Inspo</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll();if(e.target.closest('[data-action="new"]'))openInspoForm()};
  const items=DATA.inspo||[];
  $('#pageSub').textContent=`${items.length} inspiration${items.length===1?'':'s'}`;
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Inspo Hub</div><div class="page-sub">References, trends, concepts the team can pull from</div></div></div>
    ${items.length?`<div class="inspo-grid">${items.map(i=>`<div class="inspo-card" data-iid="${i.id}"><div class="inspo-thumb" style="${i.thumbnail?`background-image:url('${esc(i.thumbnail)}')`:''}">${!i.thumbnail?'✦':''}</div><div class="inspo-body"><div class="inspo-title">${esc(i.title)}</div><div class="inspo-meta"><span class="tag purple">${esc(i.category||'reference')}</span><span>${timeAgo(i.created_at)}</span></div></div></div>`).join('')}</div>`:'<div class="empty-page"><div class="empty-page-icon">✦</div><div class="empty-page-text">No inspirations yet — start collecting references</div><button class="btn btn-primary" data-action="new">+ Add First Inspo</button></div>'}
  `;
  $('#pageContent').onclick=e=>{
    if(e.target.closest('[data-action="new"]'))openInspoForm();
    const c=e.target.closest('[data-iid]');if(c)openInspoDetail(parseInt(c.dataset.iid));
  };
}
function openInspoForm(existing=null){
  const ie=!!existing;
  const html=`<div class="modal-backdrop" id="modal"><div class="modal"><div class="modal-header"><div class="modal-title">${ie?'Edit Inspo':'Add Inspo'}</div><button class="modal-close" data-close>&times;</button></div><form id="inspoForm" class="modal-body"><div class="form-grid">
    <div><label class="field-label">Title</label><input class="field-input" name="title" required value="${esc(existing?.title||'')}" autofocus></div>
    <div><label class="field-label">URL</label><input class="field-input" name="url" placeholder="https://..." value="${esc(existing?.url||'')}"></div>
    <div class="form-row"><div><label class="field-label">Category</label><select class="field-select" name="category">${['reference','hook','concept','trend','other'].map(c=>`<option value="${c}" ${(existing?.category||'reference')===c?'selected':''}>${c[0].toUpperCase()+c.slice(1)}</option>`).join('')}</select></div><div><label class="field-label">Thumbnail URL (optional)</label><input class="field-input" name="thumbnail" value="${esc(existing?.thumbnail||'')}"></div></div>
    <div><label class="field-label">Notes</label><textarea class="field-textarea" name="notes">${esc(existing?.notes||'')}</textarea></div>
  </div></form><div class="modal-footer">${ie?`<button class="btn btn-ghost btn-danger" data-del-inspo="${existing.id}">Delete</button>`:''}<button class="btn btn-secondary" data-close>Cancel</button><button class="btn btn-primary" data-save-inspo="${ie?existing.id:''}">Save</button></div></div></div>`;
  $('#modalRoot').innerHTML=html;
  $('#modalRoot').onclick=async e=>{
    if(e.target.closest('[data-close]'))closeModal();
    if(e.target.closest('[data-del-inspo]')){const id=parseInt(e.target.closest('[data-del-inspo]').dataset.delInspo);if(!confirm('Delete?'))return;try{await sb.from('video_inspo').delete().eq('id',id);closeModal();await fetchAll()}catch(_){toast('Failed','error')}}
    if(e.target.closest('[data-save-inspo]')){
      const id=e.target.closest('[data-save-inspo]').dataset.saveInspo;
      const fd=new FormData($('#inspoForm'));
      const d={title:fd.get('title').trim(),url:fd.get('url').trim()||null,category:fd.get('category'),thumbnail:fd.get('thumbnail').trim()||null,notes:fd.get('notes').trim()||null};
      if(!d.title){toast('Title required','error');return}
      try{if(id){await sb.from('video_inspo').update(d).eq('id',parseInt(id))}else{d.added_by=currentUser.name;await sb.from('video_inspo').insert(d)}toast('Saved','success');closeModal();await fetchAll()}catch(err){toast('Failed: '+(err.message||''),'error')}
    }
  };
}
function openInspoDetail(iid){
  const i=DATA.inspo.find(x=>x.id===iid);if(!i)return;
  const html=`<div class="modal-backdrop" id="modal"><div class="modal"><div class="modal-header"><div><div class="modal-title">${esc(i.title)}</div><div class="modal-sub">${esc(i.category||'reference')} · ${esc(i.added_by||'')} · ${timeAgo(i.created_at)}</div></div><button class="modal-close" data-close>&times;</button></div><div class="modal-body">
    ${i.thumbnail?`<img src="${esc(i.thumbnail)}" style="width:100%;border-radius:8px;margin-bottom:14px" onerror="this.style.display='none'">`:''}
    ${i.url?`<div class="detail-section"><div class="detail-section-title">Link</div><a href="${esc(i.url)}" target="_blank">${esc(i.url)}</a></div>`:''}
    ${i.notes?`<div class="detail-section"><div class="detail-section-title">Notes</div><div class="detail-description">${esc(i.notes)}</div></div>`:''}
  </div><div class="modal-footer"><button class="btn btn-secondary" data-edit-inspo="${i.id}">Edit</button><button class="btn btn-primary" data-close>Close</button></div></div></div>`;
  $('#modalRoot').innerHTML=html;
  $('#modalRoot').onclick=e=>{if(e.target.closest('[data-close]'))closeModal();const ed=e.target.closest('[data-edit-inspo]');if(ed){closeModal();setTimeout(()=>openInspoForm(DATA.inspo.find(x=>x.id===parseInt(ed.dataset.editInspo))),50)}};
}
