async function fetchTimeLogs(){
  try{const {data}=await sb.from('video_time_logs').select('*').order('started_at',{ascending:false}).limit(500);DATA.timeLogs=data||[];drawTimeTracker()}catch(_){drawTimeTracker()}
}
function drawTimeTracker(){
  let logs=DATA.timeLogs;
  if(isEditor()){const me=DATA.teamMembers.find(m=>m.name?.toUpperCase()===currentUser.name.toUpperCase());logs=me?logs.filter(l=>l.team_member_id===me.id):[]}
  const monthStart=startOfMonth();
  const thisMonth=logs.filter(l=>new Date(l.started_at)>=monthStart);
  const totalSec=thisMonth.reduce((s,l)=>s+(l.duration_seconds||0),0);
  const perEditor={};
  thisMonth.forEach(l=>{const k=l.team_member_id;if(!perEditor[k])perEditor[k]={sec:0,count:0};perEditor[k].sec+=l.duration_seconds||0;perEditor[k].count++});
  // ===== WEEKLY AUTO REPORT (Mon-Sun, from video_stage_history, attributed to assigned_editor_id) =====
  const weeklyReport=(()=>{
    const now=new Date();
    const dow=now.getDay();const offsetToMon=dow===0?-6:1-dow;
    const wkStart=new Date(now.getFullYear(),now.getMonth(),now.getDate()+offsetToMon,0,0,0,0);
    const wkEnd=new Date(wkStart.getTime()+7*24*3600*1000);
    const hist=DATA.stageHistory||[];
    const projectsById={}; (DATA.projects||[]).forEach(p=>{projectsById[p.id]=p});
    const byEditor={};
    hist.forEach(h=>{
      const p=projectsById[h.video_project_id]; if(!p||!p.assigned_editor_id)return;
      const enter=h.entered_at?new Date(h.entered_at):null; if(!enter)return;
      const exit=h.exited_at?new Date(h.exited_at):new Date();
      const overlapStart=enter>wkStart?enter:wkStart;
      const overlapEnd=exit<wkEnd?exit:wkEnd;
      const secs=Math.floor((overlapEnd-overlapStart)/1000);
      if(secs<=0)return;
      const eid=Number(p.assigned_editor_id);
      if(!byEditor[eid])byEditor[eid]={total:0,stages:{},bounces:{}};
      byEditor[eid].total+=secs;
      byEditor[eid].stages[h.stage]=(byEditor[eid].stages[h.stage]||0)+secs;
      const bk=p.id+'|'+h.stage;
      byEditor[eid].bounces[bk]=(byEditor[eid].bounces[bk]||0)+1;
    });
    const rows=Object.entries(byEditor).map(([eid,v])=>{
      const m=getMember(Number(eid));
      const topStages=Object.entries(v.stages).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([s,sec])=>`${STAGES.find(x=>x.key===s)?.label||s}: ${secsToHrs(sec)}`).join(' · ');
      const bounceTotal=Object.values(v.bounces).reduce((s,n)=>s+(n>1?n-1:0),0);
      return {name:m?.name||'Unknown',total:v.total,topStages,bounces:bounceTotal};
    }).filter(r=>r.total>0).sort((a,b)=>b.total-a.total);
    const wkLabel=`${wkStart.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${new Date(wkEnd.getTime()-1).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}`;
    return {rows,wkLabel,grandTotal:rows.reduce((s,r)=>s+r.total,0)};
  })();
  const weeklyReportHtml=`<div class="panel"><div class="panel-head"><div class="panel-title">Weekly Editor Report · ${esc(weeklyReport.wkLabel)}</div><div class="text-3 fs-11">Auto from stage moves · ${secsToHrs(weeklyReport.grandTotal)} this week</div></div>${weeklyReport.rows.length?`<table class="tbl"><thead><tr><th>Editor</th><th>Total this week</th><th>Top stages</th><th>Bounces</th></tr></thead><tbody>${weeklyReport.rows.map(r=>`<tr><td><strong>${esc(r.name)}</strong></td><td>${secsToHrs(r.total)}</td><td class="muted fs-11">${esc(r.topStages||'—')}</td><td class="${r.bounces>0?'':'muted'}">${r.bounces||'—'}</td></tr>`).join('')}</tbody></table>`:'<div class="panel-body text-3" style="text-align:center;font-style:italic">No stage activity attributed to editors this week yet</div>'}</div>
  `;
  $('#pageSub').textContent=`Workflow time tracked from stage moves · ${weeklyReport.rows.length} editors active this week`;
  // Month-level workflow time per editor (same math as weekly, monthly window)
  const monthStartTs=monthStart.getTime(),now=Date.now();
  const monthlyByEditor={};
  const projectsByIdM={};(DATA.projects||[]).forEach(p=>{projectsByIdM[p.id]=p});
  (DATA.stageHistory||[]).forEach(h=>{
    const p=projectsByIdM[h.video_project_id]; if(!p||!p.assigned_editor_id)return;
    const enter=h.entered_at?new Date(h.entered_at).getTime():0; if(!enter)return;
    const exit=h.exited_at?new Date(h.exited_at).getTime():now;
    const overlapStart=Math.max(enter,monthStartTs),overlapEnd=Math.min(exit,now);
    const secs=Math.floor((overlapEnd-overlapStart)/1000); if(secs<=0)return;
    const eid=Number(p.assigned_editor_id);
    if(!monthlyByEditor[eid])monthlyByEditor[eid]={sec:0,projects:new Set()};
    monthlyByEditor[eid].sec+=secs;
    monthlyByEditor[eid].projects.add(p.id);
  });
  const monthlyTotalSec=Object.values(monthlyByEditor).reduce((s,v)=>s+v.sec,0);
  const monthlyActiveEditors=Object.keys(monthlyByEditor).length;
  const monthlyAvgPerEditor=monthlyActiveEditors?monthlyTotalSec/monthlyActiveEditors:0;
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Time Tracker</div><div class="page-sub">Workflow time = how long projects sit in stages, attributed to assigned editor. Not the same as effort hours.</div></div></div>
    <div class="stat-grid">${statCard('Workflow time this month',secsToHrs(monthlyTotalSec))}${statCard('Active editors',monthlyActiveEditors+'')}${statCard('Avg per editor',secsToHrs(monthlyAvgPerEditor))}</div>
    ${weeklyReportHtml}
    ${Object.keys(perEditor).length?`<div class="panel"><div class="panel-head"><div class="panel-title">Manual logs (this month)</div><div class="text-3 fs-11">From editors who use the + Log Time button</div></div><table class="tbl"><thead><tr><th>Editor</th><th>Logs</th><th>Total</th><th>Avg/log</th></tr></thead><tbody>${Object.entries(perEditor).sort((a,b)=>b[1].sec-a[1].sec).map(([id,v])=>{const m=getMember(parseInt(id));return `<tr><td>${esc(m?.name||'Unknown')}</td><td>${v.count}</td><td>${secsToHrs(v.sec)}</td><td>${secsToHrs(v.sec/v.count)}</td></tr>`}).join('')}</tbody></table></div>`:''}
    <div class="panel"><div class="panel-head"><div class="panel-title">Recent Logs</div><div class="text-3 fs-11">Manual log entries · ${thisMonth.length} this month</div></div>${logs.length?`<table class="tbl"><thead><tr><th>Project</th><th>Editor</th><th>Stage</th><th>Started</th><th>Duration</th><th>Notes</th></tr></thead><tbody>${logs.slice(0,50).map(l=>{const p=getProject(l.video_project_id);const m=getMember(l.team_member_id);return `<tr><td>${esc(p?.title||'—')}</td><td>${esc(m?.name||'—')}</td><td class="muted">${esc(STAGES.find(s=>s.key===l.stage)?.label||l.stage||'')}</td><td class="muted">${fmtDateTime(l.started_at)}</td><td>${secsToHrs(l.duration_seconds||0)}</td><td class="muted">${esc(l.notes||'')}</td></tr>`}).join('')}</tbody></table>`:'<div class="panel-body text-3" style="text-align:center;font-style:italic">No manual time logs yet — click "+ Log Time" to add one</div>'}</div>
  `;
}
function openTimeForm(){
  const html=`<div class="modal-backdrop" id="modal"><div class="modal"><div class="modal-header"><div class="modal-title">Log Time</div><button class="modal-close" data-close>&times;</button></div><form id="timeForm" class="modal-body"><div class="form-grid">

function renderClients(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};
  // Selected month from filter (YYYY-MM)
  const selMonth=FILTERS.clientsMonth||new Date().toISOString().slice(0,7);
  const [selY,selM]=selMonth.split('-').map(Number);
  const monthStart=new Date(selY,selM-1,1);
  const monthEnd=new Date(selY,selM,1);
  const monthLabel=monthStart.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  // Build last 12 months options
  const monthOpts=[];
  for(let i=0;i<12;i++){const d=new Date();d.setMonth(d.getMonth()-i);const v=d.toISOString().slice(0,7);const lbl=d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});monthOpts.push({v,lbl})}
  const rows=DATA.clients.map(c=>{
    const proj=DATA.projects.filter(p=>p.client_id===c.id);
    const active=proj.filter(p=>!COMPLETED_STAGES.includes(p.current_stage)).length;
    const postedThisMonth=proj.filter(p=>p.current_stage==='posted'&&p.completed_at&&new Date(p.completed_at)>=monthStart&&new Date(p.completed_at)<monthEnd).length;
    const target=videoTarget(c);
    const lastAct=proj.map(p=>p.updated_at||p.created_at).sort().pop();
    return {client:c,active,postedThisMonth,target,total:proj.length,lastAct};
  }).sort((a,b)=>b.active-a.active);
  // Summary: how many clients hit target this month
  const withTarget=rows.filter(r=>r.target>0);
  const hitTarget=withTarget.filter(r=>r.postedThisMonth>=r.target).length;
  $('#pageSub').textContent=`${rows.length} client${rows.length===1?'':'s'} · ${monthLabel}`;

    <select class="filter-select" id="clientsMonthPick" style="min-width:180px">${monthOpts.map(o=>`<option value="${o.v}" ${o.v===selMonth?'selected':''}>${o.lbl}</option>`).join('')}</select></div>
    ${withTarget.length?`<div class="stat-grid" style="margin-bottom:18px">
      ${statCard('On Target',hitTarget+'/'+withTarget.length,'clients hit monthly goal',hitTarget===withTarget.length?'green':(hitTarget>=withTarget.length/2?'amber':'red'))}
      ${statCard('Videos Posted',rows.reduce((s,r)=>s+r.postedThisMonth,0),'across all clients in '+monthStart.toLocaleDateString('en-GB',{month:'short'}))}
      ${statCard('Behind Target',withTarget.filter(r=>r.postedThisMonth<r.target).length,'clients below goal','red')}
      ${statCard('Active Projects',rows.reduce((s,r)=>s+r.active,0),'in pipeline now')}
    </div>`:''}
    <table class="tbl"><thead><tr><th>Client</th><th>Active</th><th>${monthStart.toLocaleDateString('en-GB',{month:'short'})} Progress</th><th>Total Projects</th><th>Last Activity</th></tr></thead><tbody>
    ${rows.map(r=>{
      const tgt=r.target||0;
      const posted=r.postedThisMonth;
      const pct=tgt>0?Math.min(100,(posted/tgt)*100):0;

        : `<span class="muted">${posted} posted · no target set</span>`;
      return `<tr class="clickable" data-cid="${r.client.id}"><td><strong>${esc(r.client.name)}</strong></td><td>${r.active}</td><td>${progressHtml}</td><td class="muted">${r.total}</td><td class="muted">${r.lastAct?timeAgo(r.lastAct):'—'}</td></tr>`;

}
// === QUARTERLY PLAN PER CLIENT ===
// Computes contract / published / pipeline / remaining / shoot target with next-month buffer.
// Uses target_month + target_year on video_projects to decide which month a video belongs to.
// "Published" = current_stage in (posted, add_to_drive, sent_to_client) — anything past editing/review.
function getClientMonthlyContract(clientId,year,month,defaultMonthly){
  const override=(DATA.clientTargets||[]).find(t=>Number(t.client_id)===Number(clientId)&&Number(t.year)===Number(year)&&Number(t.month)===Number(month));
  if(override&&override.contracted_count!=null)return {value:override.contracted_count,source:'override'};
  if(defaultMonthly!=null)return {value:defaultMonthly,source:'default'};
  return {value:0,source:'none'};
}
function computeMonthStats(clientProjects,year,month,contracted,nextMonthContracted){
  const inMonth=clientProjects.filter(p=>Number(p.target_year)===Number(year)&&Number(p.target_month)===Number(month));
  const PUBLISHED=['posted','add_to_drive','sent_to_client'];
  const published=inMonth.filter(p=>PUBLISHED.includes(p.current_stage)).length;
  const inPipeline=inMonth.filter(p=>!PUBLISHED.includes(p.current_stage)).length;
  const remaining=Math.max(0,contracted-published);
  const carryFromPipeline=Math.min(inPipeline,remaining);
  const needNewShoots=Math.max(0,remaining-carryFromPipeline);
  // Buffer: shoot enough this month to cover next month's contract too.
  // Falls back to this month's contracted count if next-month data missing (e.g. quarter boundary).
  const buffer=(nextMonthContracted!=null?nextMonthContracted:contracted);
  const shootTargetWithBuffer=needNewShoots+buffer;
  return {contracted,published,inPipeline,remaining,carryFromPipeline,needNewShoots,buffer,shootTargetWithBuffer,tagged:inMonth.length};
}
function quarterlyPlanSection(client,clientProjects){
  const now=new Date();
  // Q2 fixed for now per user's notebook: April / May / June of current year
  const year=now.getFullYear();
  const months=[{m:4,name:'April'},{m:5,name:'May'},{m:6,name:'June'}];
  const defaultMonthly=client.monthly_videos;
  // Pass 1: resolve contracted count per month
  const contracts=months.map(({m,name})=>{
    const ct=getClientMonthlyContract(client.id,year,m,defaultMonthly);
    return {m,name,year,contracted:ct.value,contractSource:ct.source};
  });
  // Pass 2: compute stats — feed next month's contract in for buffer math
  const monthData=contracts.map((c,i)=>{
    const next=contracts[i+1];
    const st=computeMonthStats(clientProjects,c.year,c.m,c.contracted,next?next.contracted:null);
    return {...c,...st};
  });
  const totalShootNeed=monthData.reduce((s,d)=>s+d.needNewShoots,0);
  // Situation summary (plain English)
  const summary=buildSituationSummary(client.name,monthData);
  // Chart data — stacked bar per month
  const chart=monthChartSvg(monthData);
  // Inputs for setting contracts per month
  const inputs=months.map(({m,name})=>{
    const d=monthData.find(x=>x.m===m);
    return `<div class="qp-input-cell">
      <label class="qp-input-label">${name}</label>
      <input type="number" min="0" class="qp-input" data-month="${m}" value="${d.contracted}">
      <div class="qp-input-source">${d.contractSource==='override'?'<span style="color:var(--accent)">override</span>':d.contractSource==='default'?'<span class="muted">from monthly_videos</span>':'<span class="muted">not set</span>'}</div>
    </div>`;
  }).join('');
  // Metric grid
  const grid=monthData.map(d=>`<div class="qp-month">
    <div class="qp-month-name">${d.name} ${d.year}</div>
    <div class="qp-big">${d.published}<span class="qp-big-sub">/${d.contracted}</span></div>
    <div class="qp-row"><span>In pipeline</span><strong>${d.inPipeline}</strong></div>
    <div class="qp-row"><span>Remaining</span><strong>${d.remaining}</strong></div>
    <div class="qp-row qp-row-accent"><span>Need to shoot</span><strong>${d.needNewShoots}</strong></div>
    <div class="qp-row qp-row-accent"><span>Shoot target +buffer</span><strong>${d.shootTargetWithBuffer}</strong></div>
    ${d.tagged===0?'<div class="qp-warn">No videos tagged this month yet</div>':''}
  </div>`).join('');
  // === SHOOT STATS PER MONTH ===
  // Read from DATA.shoots, filter by this client, group by month of shoot_date.
  // Three numbers per month: planned (any stage with a date in that month),
  // done (stage='Shot'), videos shot (sum of video_count where stage='Shot').
  const clientShootsAll=(DATA.shoots||[]).filter(s=>Number(s.client_id)===Number(client.id)&&s.shoot_date);
  const shootStats=months.map(({m,name})=>{
    const inMonth=clientShootsAll.filter(s=>{
      const dt=new Date(s.shoot_date);
      return dt.getFullYear()===year && (dt.getMonth()+1)===m;
    });
    const done=inMonth.filter(s=>s.stage==='Shot');
    const videosShot=done.reduce((sum,s)=>sum+(parseInt(s.video_count)||0),0);
    return {name,planned:inMonth.length,done:done.length,videosShot};
  });
  const shootStrip=`<div class="qp-shoot-strip">
    <div class="qp-shoot-strip-title">Shoot activity <span class="muted fs-11" style="font-weight:400">· from Shoot Pipeline</span></div>
    <div class="qp-shoot-cells">${shootStats.map(s=>`
      <div class="qp-shoot-cell">
        <div class="qp-shoot-month">${s.name}</div>
        <div class="qp-shoot-nums">
          <span title="Shoots planned this month"><strong>${s.planned}</strong> planned</span>
          <span title="Shoots completed (stage = Shot)"><strong>${s.done}</strong> done</span>
          <span title="Total videos produced by shoots this month"><strong>${s.videosShot}</strong> videos shot</span>
        </div>
      </div>`).join('')}</div>
  </div>`;
  return `<div class="detail-section qp-section"><div class="detail-section-title">Q2 Video Plan — ${year}</div>
    <div class="qp-grid">${grid}</div>
    ${shootStrip}
    <div class="qp-chart-wrap">${chart}</div>
    <div class="qp-summary"><div class="qp-summary-label">Situation</div><div class="qp-summary-body">${summary}</div></div>
    <div class="qp-edit"><div class="qp-edit-title">Contracted count per month <span class="muted fs-11">(blank = use client default ${defaultMonthly||'unset'})</span></div>
      <div class="qp-inputs">${inputs}</div>
      <button class="btn btn-primary btn-sm" data-save-qp="${client.id}">Save contracts</button>
    </div>
  </div>`;
}
function buildSituationSummary(clientName,monthData){
  const bits=[];
  const now=new Date(),thisMonth=now.getMonth()+1,thisYear=now.getFullYear();
  monthData.forEach(d=>{
    const past=(d.year<thisYear)||(d.year===thisYear&&d.m<thisMonth);
    if(d.contracted===0&&d.tagged===0){bits.push(`<strong>${d.name}</strong>: no contract set, nothing tagged.`);return}
    if(d.published>=d.contracted&&d.contracted>0){bits.push(`<strong>${d.name}</strong>: done (${d.published}/${d.contracted}).`);return}
    // Past month: distinguish "missed" (videos exist but didn't publish) from "untagged" (no data — can't tell)
    if(past&&d.remaining>0){
      if(d.tagged===0){bits.push(`<strong>${d.name}</strong>: no videos tagged for this month — can't tell if work was done. ${d.published}/${d.contracted} published.`);return}
      bits.push(`<strong>${d.name}</strong>: missed by ${d.remaining} (${d.published}/${d.contracted} published, ${d.inPipeline} still in pipeline).`);return;
    }
    const parts=[`${d.published}/${d.contracted} published`];
    if(d.inPipeline>0)parts.push(`${d.inPipeline} in pipeline`);
    if(d.needNewShoots>0)parts.push(`needs ${d.needNewShoots} new shot${d.needNewShoots>1?'s':''}`);
    if(d.tagged===0&&d.contracted>0)parts.push(`<em class="muted">no videos tagged yet</em>`);
    bits.push(`<strong>${d.name}</strong>: ${parts.join(', ')}.`);
  });
  return bits.join(' ');
}
function monthChartSvg(monthData){
  const w=480,h=180,padTop=30,padBottom=28,padX=28,bw=80,gap=60;
  const max=Math.max(...monthData.map(d=>Math.max(d.contracted,d.published+d.inPipeline)),1);
  const bars=monthData.map((d,i)=>{
    const x=padX+i*(bw+gap);
    const baseY=h-padBottom;
    const scale=(h-padTop-padBottom)/max;
    const targetH=d.contracted*scale;
    const pubH=d.published*scale;
    const pipeH=d.inPipeline*scale;
    return `
      <rect x="${x}" y="${baseY-targetH}" width="${bw}" height="${targetH}" fill="none" stroke="var(--border-strong)" stroke-dasharray="4 3" rx="3"/>
      <rect x="${x}" y="${baseY-pubH}" width="${bw}" height="${pubH}" fill="var(--accent)" rx="3"/>
      <rect x="${x}" y="${baseY-pubH-pipeH}" width="${bw}" height="${pipeH}" fill="var(--accent)" opacity="0.35" rx="3"/>
      <text x="${x+bw/2}" y="${h-8}" text-anchor="middle" font-size="11" fill="var(--text-3)" font-weight="600">${d.name}</text>
      <text x="${x+bw/2}" y="${baseY-targetH-8}" text-anchor="middle" font-size="11" fill="var(--text-2)" font-weight="700">${d.published}/${d.contracted}</text>
    `;
  }).join('');
  const legend=`<div class="qp-chart-legend">
    <span><i class="qp-leg-sw" style="background:var(--accent)"></i>Published</span>
    <span><i class="qp-leg-sw" style="background:var(--accent);opacity:.35"></i>In pipeline</span>
    <span><i class="qp-leg-sw qp-leg-dash"></i>Contracted</span>
  </div>`;
  return `<svg viewBox="0 0 ${w} ${h}" class="qp-chart" preserveAspectRatio="xMidYMid meet">${bars}</svg>${legend}`;
}
async function saveQuarterlyTargets(clientId,inputs){
  const year=new Date().getFullYear();
  const c=DATA.clients.find(x=>x.id===clientId);
  const def=c?.monthly_videos;
  const upserts=[];
  inputs.forEach(({month,value})=>{
    const num=parseInt(value);
    if(isNaN(num)||num<0)return;
    // Only upsert if value differs from default (keeps override table sparse)
    if(def!=null&&num===def){
      // delete existing override if any — value matches default, no override needed
      sb.from('client_monthly_targets').delete().match({client_id:clientId,year,month}).then(()=>{});
      return;
    }
    upserts.push({client_id:clientId,year,month,contracted_count:num,updated_by:currentUser.name,updated_at:new Date().toISOString()});
  });
  try{
    if(upserts.length){const {error}=await sb.from('client_monthly_targets').upsert(upserts,{onConflict:'client_id,year,month'});if(error)throw error}
    toast('Contracts saved','success');
    await fetchAll(true);
    openClientDetail(clientId);
  }catch(err){toast('Save failed: '+(err.message||''),'error')}
}

async function renderAnalytics(){
  $('#pageActions').innerHTML='<button class="btn btn-ghost" data-action="refresh">↻</button>';
  $('#pageActions').onclick=e=>{if(e.target.closest('[data-action="refresh"]'))fetchAll()};

  const lastMonthStart=new Date(monthStart);lastMonthStart.setMonth(lastMonthStart.getMonth()-1);
  const lastMonthEnd=new Date(monthStart);
  const ps=DATA.projects;
  const completed=ps.filter(p=>p.completed_at&&new Date(p.completed_at)>=monthStart);
  const completedLastMonth=ps.filter(p=>p.completed_at&&new Date(p.completed_at)>=lastMonthStart&&new Date(p.completed_at)<lastMonthEnd);
  const active=ps.filter(p=>!COMPLETED_STAGES.includes(p.current_stage)).length;
  const turn=completed.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000);
  const avgTurn=turn.length?(turn.reduce((s,t)=>s+t,0)/turn.length).toFixed(1):'—';
  const turnLast=completedLastMonth.map(p=>(new Date(p.completed_at)-new Date(p.created_at))/86400000);
  const avgTurnLast=turnLast.length?(turnLast.reduce((s,t)=>s+t,0)/turnLast.length).toFixed(1):null;
  const trendArrow=avgTurnLast?(parseFloat(avgTurn)<parseFloat(avgTurnLast)?`<span style="color:var(--green)">↓ ${(avgTurnLast-avgTurn).toFixed(1)}d faster</span>`:`<span style="color:var(--red)">↑ ${(avgTurn-avgTurnLast).toFixed(1)}d slower</span>`):'';
  const monthlyDelta=completedLastMonth.length?`vs ${completedLastMonth.length} last month`:'';
  // Per editor
  const editorStats={};
  DATA.teamMembers.forEach(m=>{editorStats[m.id]={name:m.name,active:0,doneMonth:0,doneLastMonth:0,sumDays:0,countDays:0}});
  ps.forEach(p=>{if(!p.assigned_editor_id)return;const s=editorStats[p.assigned_editor_id];if(!s)return;if(!COMPLETED_STAGES.includes(p.current_stage))s.active++;if(p.completed_at){const d=new Date(p.completed_at);if(d>=monthStart){s.doneMonth++;s.sumDays+=(d-new Date(p.created_at))/86400000;s.countDays++}else if(d>=lastMonthStart&&d<lastMonthEnd){s.doneLastMonth++}}});
  // Per client
  const clientStats={};
  DATA.clients.forEach(c=>{clientStats[c.id]={name:c.name,active:0,doneMonth:0,target:c.videos_per_month||c.monthly_videos||c.video_target||null}});
  ps.forEach(p=>{if(!p.client_id||!clientStats[p.client_id])return;if(!COMPLETED_STAGES.includes(p.current_stage))clientStats[p.client_id].active++;if(p.completed_at&&new Date(p.completed_at)>=monthStart)clientStats[p.client_id].doneMonth++});
  // Stage time analysis — from video_stage_history
  let stageAvgs={};
  try{
    const {data:history}=await sb.from('video_stage_history').select('stage,duration_seconds').not('duration_seconds','is',null).gte('entered_at',lastMonthStart.toISOString());
    if(history){STAGES.forEach(s=>{const rows=history.filter(r=>r.stage===s.key);if(rows.length){stageAvgs[s.key]={avg:rows.reduce((sum,r)=>sum+(r.duration_seconds||0),0)/rows.length,count:rows.length,label:s.label}}})}
  }catch(_){}
  // Pipeline bottleneck — which stage has most stuck projects (oldest)
  const stuckByStage={};
  ps.filter(p=>!COMPLETED_STAGES.includes(p.current_stage)).forEach(p=>{
    const stage=p.current_stage;
    if(!stuckByStage[stage])stuckByStage[stage]={count:0,oldest:null,label:STAGES.find(s=>s.key===stage)?.label||stage};
    stuckByStage[stage].count++;
    const updated=new Date(p.updated_at||p.created_at);
    if(!stuckByStage[stage].oldest||updated<stuckByStage[stage].oldest)stuckByStage[stage].oldest=updated;
  });
  const bottleneck=Object.entries(stuckByStage).sort((a,b)=>b[1].count-a[1].count)[0];
  // Top performer
  const topEditor=Object.values(editorStats).sort((a,b)=>b.doneMonth-a.doneMonth)[0];
  // Slowest stage
  const slowestStage=Object.entries(stageAvgs).sort((a,b)=>b[1].avg-a[1].avg)[0];
  $('#pageSub').textContent='This month performance';
  $('#pageContent').innerHTML=`<div class="page-head"><div><div class="page-title">Analytics</div><div class="page-sub">Monthly performance · ${new Date().toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</div></div></div>
    <div class="stat-grid">
      ${statCard('Active Projects',active)}
      ${statCard('Completed This Month',completed.length,monthlyDelta)}
      ${statCard('Avg Turnaround',avgTurn==='—'?'—':avgTurn+'d',trendArrow||'no comparison')}
      ${statCard('Total Projects',ps.length)}
    </div>
    ${bottleneck||topEditor?.doneMonth||slowestStage?`<div class="detail-section"><div class="detail-section-title">🎯 Insights</div><div class="time-breakdown">
      ${bottleneck?`<div class="time-breakdown-item changes"><div class="time-breakdown-label">Pipeline Bottleneck</div><div class="time-breakdown-value">${bottleneck[1].label}</div><div class="muted" style="font-size:11px;margin-top:4px">${bottleneck[1].count} project${bottleneck[1].count>1?'s':''} stuck</div></div>`:''}
      ${topEditor?.doneMonth?`<div class="time-breakdown-item editing"><div class="time-breakdown-label">Top Performer</div><div class="time-breakdown-value">${esc(topEditor.name)}</div><div class="muted" style="font-size:11px;margin-top:4px">${topEditor.doneMonth} videos done</div></div>`:''}
      ${slowestStage?`<div class="time-breakdown-item total"><div class="time-breakdown-label">Slowest Stage</div><div class="time-breakdown-value">${esc(slowestStage[1].label)}</div><div class="muted" style="font-size:11px;margin-top:4px">${secsToHrs(slowestStage[1].avg)} avg</div></div>`:''}
    </div></div>`:''}
    <div class="two-col">
      <div class="panel"><div class="panel-head"><div class="panel-title">Per Editor (this month)</div></div><table class="tbl"><thead><tr><th>Editor</th><th>Active</th><th>Done</th><th>Last Mo</th><th>Avg Turn</th></tr></thead><tbody>${Object.values(editorStats).filter(s=>s.active||s.doneMonth||s.doneLastMonth).sort((a,b)=>b.doneMonth-a.doneMonth).map(s=>{const delta=s.doneLastMonth?(s.doneMonth>=s.doneLastMonth?`<span style="color:var(--green);font-size:10px">↑</span>`:`<span style="color:var(--red);font-size:10px">↓</span>`):'';return `<tr><td>${esc(s.name)}</td><td>${s.active}</td><td>${s.doneMonth} ${delta}</td><td class="muted">${s.doneLastMonth}</td><td class="muted">${s.countDays?(s.sumDays/s.countDays).toFixed(1)+'d':'—'}</td></tr>`}).join('')||'<tr><td colspan="5" class="muted" style="text-align:center">No data</td></tr>'}</tbody></table></div>
      <div class="panel"><div class="panel-head"><div class="panel-title">Per Client (this month)</div></div><table class="tbl"><thead><tr><th>Client</th><th>Progress</th><th>Active</th></tr></thead><tbody>${Object.values(clientStats).filter(s=>s.active||s.doneMonth).sort((a,b)=>b.doneMonth-a.doneMonth).slice(0,15).map(s=>{const prog=s.target?`${s.doneMonth}/${s.target}`:`${s.doneMonth}`;const cls=s.target&&s.doneMonth>=s.target?'color:var(--green);font-weight:700':(s.target&&s.doneMonth<s.target/2?'color:var(--red)':'');return `<tr><td>${esc(s.name)}</td><td style="${cls}">${prog}</td><td>${s.active}</td></tr>`}).join('')||'<tr><td colspan="3" class="muted" style="text-align:center">No data</td></tr>'}</tbody></table></div>
    </div>
    ${Object.keys(stageAvgs).length?`<div class="panel" style="margin-top:18px"><div class="panel-head"><div class="panel-title">Average Time Per Stage</div><div class="muted" style="font-size:11px">Based on last 60 days · ${Object.values(stageAvgs).reduce((s,x)=>s+x.count,0)} data points</div></div><table class="tbl"><thead><tr><th>Stage</th><th>Avg Duration</th><th>Sample Size</th></tr></thead><tbody>${Object.entries(stageAvgs).sort((a,b)=>b[1].avg-a[1].avg).map(([k,v])=>`<tr><td><span class="stage-dot s-${k}"></span> ${esc(v.label)}</td><td>${secsToHrs(v.avg)}</td><td class="muted">${v.count}</td></tr>`).join('')}</tbody></table></div>`:''}
  `;
}

function renderTeamChat(){

    }
  };
}

async function saveChatEdit(id){
  const body=document.getElementById('chatEditBody').value.trim();
  const m=(DATA.chats||[]).find(x=>x.id===id);
  if(!body&&!(m&&m.image_url)){toast('Message cannot be empty','error');return;}
  _pendingOps++;
  try{
    const {error}=await sb.from('video_chat_messages').update({body:body,edited_at:new Date().toISOString()}).eq('id',id);
    if(error)throw error;
    closeModal();toast('Message updated','success');
    await fetchAll();
  }catch(err){toast('Edit failed: '+(err.message||''),'error');if(window.bbReportDbError)window.bbReportDbError('video_chat_messages','edit',err);}
  finally{_pendingOps--;}
}

/* ============================================================
   MOBILE JS LAYER — appended on top of v23.
   Inert on desktop: the hamburger + overlay are display:none and
   never receive taps; the card move-button is display:none so
   openStageMenu is never invoked on desktop.
   ============================================================ */
(function(){
  function appEl(){return document.getElementById('app');}
  function closeDrawer(){var a=appEl();if(a)a.classList.remove('nav-open');}
  function toggleDrawer(){var a=appEl();if(a)a.classList.toggle('nav-open');}
  var mb=document.getElementById('mMenuBtn');
  if(mb)mb.addEventListener('click',function(e){e.stopPropagation();toggleDrawer();});
  var ov=document.getElementById('mNavOverlay');
  if(ov)ov.addEventListener('click',closeDrawer);
  // Close the drawer after a nav item is chosen (added listener — does
  // not replace the existing #sidebarNav.onclick that performs navTo)
  var sn=document.getElementById('sidebarNav');
  if(sn)sn.addEventListener('click',function(e){if(e.target.closest('[data-nav]'))closeDrawer();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeDrawer();var s=document.getElementById('m-stage-sheet');if(s)s.remove();}});
})();

function openStageMenu(pid){
  if(typeof getProject!=='function')return;
  var p=getProject(pid);if(!p)return;
  var old=document.getElementById('m-stage-sheet');if(old)old.remove();
  var allowed=function(toKey){if(isAdmin()||isVideoHead())return true;if(isEditor())return toKey===p.current_stage||editorCanMove(p.current_stage,toKey);return false};
  var opts=STAGES.filter(function(s){return allowed(s.key)}).map(function(s){
    var cur=p.current_stage===s.key?' cur':'';
    return '<button class="m-stage-opt'+cur+'" data-stage="'+s.key+'"><span class="sd s-'+s.key+'" style="background:var(--accent)"></span>'+esc(s.label)+(cur?' &nbsp;·&nbsp; current':'')+'</button>';
  }).join('');
  var wrap=document.createElement('div');
  wrap.className='m-sheet';wrap.id='m-stage-sheet';
  wrap.innerHTML='<div class="m-sheet-inner"><div class="m-sheet-grip"></div><div class="m-sheet-title">'+esc(p.title)+'</div><div class="m-sheet-sub">Move to stage</div>'+opts+'</div>';
  document.body.appendChild(wrap);
  wrap.addEventListener('click',async function(e){
    if(e.target===wrap){wrap.remove();return;}
    var b=e.target.closest('[data-stage]');if(!b)return;
    var ns=b.dataset.stage;
    if(p.current_stage===ns){wrap.remove();return;}
    if(!isAdmin()&&isEditor()&&!editorCanMove(p.current_stage,ns)){
      var stLabel=(STAGES.find(function(s){return s.key===ns})||{}).label||ns;
      if(typeof toast==='function')toast('Only admins can move into '+stLabel,'error');
      wrap.remove();return;
    }
    wrap.remove();
    try{await moveProject(p,ns);}catch(err){console.error(err);}
  });
}

const WP_EDITORS = ['USHANE','RAJEEWA','RAMANI','NIDWIN','SANDUNU'];
const WP_DAYS_FULL = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const WP_DAYS_SHORT = ['MON','TUE','WED','THU','FRI'];
let wpWeekStart = null;
let _wpCells = {};
let _wpCurStatus = 'pending';

function wpCanEdit(){const r=(currentUser?.role||'').toLowerCase();return r==='admin'||r==='video_head';}
function wpVisibleEditors(){
  if(wpCanEdit())return WP_EDITORS;
  const name=(currentUser?.name||'').toUpperCase();
  return WP_EDITORS.includes(name)?[name]:[];
}
function wpCountVideos(content){
  if(!content)return 0;
  const up=content.trim().toUpperCase();
  if(!up||up==='NOTHING')return 0;
  const lines=up.split('\n').map(l=>l.trim()).filter(l=>l&&l!=='NOTHING');
  let total=0;
  lines.forEach(line=>{
    // count leading number if present, else each line with "VIDEO" in it counts as 1
    const m=line.match(/^(\d+)/);
    if(m)total+=parseInt(m[1]);
    else if(line.includes('VIDEO'))total+=1;
  });
  return total;
}

function wpGetMonday(d){
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day===0?-6:1);
  dt.setDate(diff); dt.setHours(0,0,0,0);
  return dt;
}

function wpFmtDate(d){
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}

function wpChangeWeek(dir){
  if(!wpWeekStart)wpWeekStart=wpGetMonday(new Date());
  const d=new Date(wpWeekStart);
  d.setDate(d.getDate()+dir*7);
  wpWeekStart=d;
  wpGridLoad();
}
function wpGoToday(){wpWeekStart=wpGetMonday(new Date());wpGridLoad();}

async function wpGridLoad(){
  if(!wpWeekStart)wpWeekStart=wpGetMonday(new Date());
  const ws=wpWeekStart.toISOString().slice(0,10);
  const fri=new Date(wpWeekStart);fri.setDate(fri.getDate()+4);
  const label=document.getElementById('wpWeekLabel');
  if(label)label.textContent=wpFmtDate(wpWeekStart)+' — '+wpFmtDate(fri)+', '+wpWeekStart.getFullYear();
  const board=document.getElementById('wpBoard');
  if(board)board.innerHTML='<div style="padding:32px;text-align:center;color:var(--text-3);font-size:13px">Loading…</div>';
  try{
    const resp=await fetch(`${SUPABASE_URL}/rest/v1/weekly_plan_cells?week_start=eq.${ws}&select=*`,{headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY}});
    const rows=resp.ok?await resp.json():[];
    _wpCells={};
    rows.forEach(r=>{_wpCells[r.editor_name+'-'+r.day_of_week]=r;});
  }catch(_){_wpCells={};}
  wpGridRender();
}

function wpGridRender(){
  const board=document.getElementById('wpBoard');
  if(!board)return;
  const canEdit=wpCanEdit();
  const visible=wpVisibleEditors();
  const today=new Date();today.setHours(0,0,0,0);
  // day totals
  const dayTotals=[0,0,0,0,0];
  let grandTotal=0;
  WP_EDITORS.forEach(ed=>{
    for(let d=1;d<=5;d++){
      const c=_wpCells[ed+'-'+d];
      const n=wpCountVideos(c?.content);
      dayTotals[d-1]+=n;grandTotal+=n;
    }
  });
  const sBorder={done:'#22c55e',delayed:'#ef4444',pending:'#f59e0b'};
  const sBg={done:'rgba(34,197,94,0.07)',delayed:'rgba(239,68,68,0.07)',pending:'rgba(245,158,11,0.06)'};
  const sPill={done:'wp-status-done',delayed:'wp-status-delayed',pending:'wp-status-pending'};
  const sLabel={done:'✅ DONE',delayed:'🔴 DELAYED',pending:'⏳ PENDING'};

  board.innerHTML=`<div class="wp-grid-wrap"><table class="wp-grid-table">
    <thead><tr>
      <th class="wp-grid-editor-col">EDITOR</th>
      ${WP_DAYS_SHORT.map((d,i)=>{
        const dd=new Date(wpWeekStart);dd.setDate(dd.getDate()+i);
        const isTd=dd.getTime()===today.getTime();
        return `<th class="wp-grid-day-col${isTd?' wp-today-col':''}">${d}<div class="wp-day-date">${wpFmtDate(dd)}</div></th>`;
      }).join('')}
    </tr></thead>
    <tbody>
      ${visible.map(ed=>`<tr class="wp-editor-row">
        <td class="wp-editor-name">${ed}</td>
        ${[1,2,3,4,5].map(d=>{
          const cell=_wpCells[ed+'-'+d];
          const content=cell?.content||'';
          const status=cell?.status||'pending';
          const isEmpty=!content.trim();
          const vidCount=wpCountVideos(content);
          const border=isEmpty?'':sBorder[status]||sBorder.pending;
          const bg=isEmpty?'':sBg[status]||sBg.pending;
          return `<td class="wp-grid-cell${canEdit?' wp-editable':''}"
            style="${!isEmpty?`border-left:3px solid ${border};background:${bg};`:''}"
            ${canEdit?`onclick="wpCellEdit('${ed}',${d})"`:''}>
            <div class="wp-cell-content">${isEmpty?'<span class="wp-cell-empty">—</span>':esc(content).replace(/\n/g,'<br>')}</div>
            ${!isEmpty?`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;flex-wrap:wrap;gap:4px">
              <span class="wp-status-pill ${sPill[status]||sPill.pending}">${sLabel[status]||sLabel.pending}</span>
              ${vidCount>0?`<span class="wp-cell-count">${vidCount} vid${vidCount!==1?'s':''}</span>`:''}
            </div>`:''}
          </td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
    <tfoot>
      <tr class="wp-total-row">
        <td class="wp-editor-name" style="color:var(--accent);font-size:11px">TOTAL VIDEOS</td>
        ${dayTotals.map(t=>`<td class="wp-total-cell">${t>0?`<span style="font-size:15px;font-weight:800;color:var(--accent)">${t}</span>`:'—'}</td>`).join('')}
      </tr>
      <tr class="wp-grand-total-row">
        <td colspan="6" style="text-align:right;padding:12px 20px;font-size:13px;font-weight:700;color:var(--accent)">
          TOTAL VIDEOS THIS WEEK: <span style="font-size:18px;font-weight:900">${grandTotal}</span>
        </td>
      </tr>
    </tfoot>
  </table></div>`;
}

function wpCellEdit(editor,day){
  if(!wpCanEdit())return;
  const cell=_wpCells[editor+'-'+day]||{};
  const content=cell.content||'';
  const status=cell.status||'pending';
  _wpCurStatus=status;
  const dayName=WP_DAYS_FULL[day-1];
  function btnStyle(s){
    const cols={done:'#22c55e',delayed:'#ef4444',pending:'#f59e0b'};
    const bgs={done:'rgba(34,197,94,0.13)',delayed:'rgba(239,68,68,0.12)',pending:'rgba(245,158,11,0.12)'};
    const active=_wpCurStatus===s;
    return `flex:1;padding:10px 6px;border-radius:8px;border:2px solid ${active?cols[s]:'var(--border)'};background:${active?bgs[s]:'var(--surface-2)'};color:${active?cols[s]:'var(--text-2)'};font-weight:700;font-size:11px;cursor:pointer;transition:all .15s`;
  }
  $('#modalRoot').innerHTML=`<div class="modal-backdrop" id="modal">
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <div class="modal-title" style="font-size:14px">${editor} &mdash; ${dayName}</div>
        <button class="modal-close" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:16px">
          <label class="field-label">Tasks <span style="font-size:10px;color:var(--text-3);font-weight:400">(one per line · numbers auto-counted · e.g. "3 REELS" or "NOTHING")</span></label>
          <textarea class="field-textarea" id="wpCellContent" rows="6" placeholder="e.g.&#10;3 REELS&#10;1 VIDEO EDIT&#10;SHOOT GEM">${esc(content)}</textarea>
        </div>
        <div>
          <label class="field-label" style="margin-bottom:8px;display:block">Status</label>
          <div style="display:flex;gap:8px" id="wpStatusBtns">
            <button style="${btnStyle('pending')}" onclick="wpPickStatus('pending')">⏳ PENDING</button>
            <button style="${btnStyle('done')}" onclick="wpPickStatus('done')">✅ DONE</button>
            <button style="${btnStyle('delayed')}" onclick="wpPickStatus('delayed')">🔴 DELAYED</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close>Cancel</button>
        ${cell.id?`<button class="btn btn-ghost" style="color:var(--red)" onclick="wpCellClear('${editor}',${day})">Clear</button>`:''}
        <button class="btn btn-primary" onclick="wpCellSave('${editor}',${day})">Save</button>
      </div>
    </div>
  </div>`;
  $('#modalRoot').onclick=e=>{if(e.target.closest('[data-close]'))closeModal();};
  document.getElementById('wpCellContent').focus();
}

function wpPickStatus(s){
  _wpCurStatus=s;
  const cols={done:'#22c55e',delayed:'#ef4444',pending:'#f59e0b'};
  const bgs={done:'rgba(34,197,94,0.13)',delayed:'rgba(239,68,68,0.12)',pending:'rgba(245,158,11,0.12)'};
  document.querySelectorAll('#wpStatusBtns button').forEach((btn,i)=>{
    const key=['pending','done','delayed'][i];
    const active=key===s;
    btn.style.border=`2px solid ${active?cols[key]:'var(--border)'}`;
    btn.style.background=active?bgs[key]:'var(--surface-2)';
    btn.style.color=active?cols[key]:'var(--text-2)';
  });
}

async function wpCellSave(editor,day){
  const content=document.getElementById('wpCellContent').value.trim();
  const ws=wpWeekStart.toISOString().slice(0,10);
  const existing=_wpCells[editor+'-'+day];
  const headers={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
  const data={week_start:ws,editor_name:editor,day_of_week:day,content,status:_wpCurStatus,updated_by:currentUser?.name||null,updated_at:new Date().toISOString()};
  try{
    let row;
    if(existing?.id){
      const r=await fetch(`${SUPABASE_URL}/rest/v1/weekly_plan_cells?id=eq.${existing.id}`,{method:'PATCH',headers,body:JSON.stringify(data)});
      row=(await r.json())[0]||{...existing,...data};
    }else{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/weekly_plan_cells`,{method:'POST',headers,body:JSON.stringify(data)});
      row=(await r.json())[0]||data;
    }
    _wpCells[editor+'-'+day]=row;
    closeModal();toast('Saved','success');wpGridRender();
  }catch(e){toast('Save failed','error');}
}

async function wpCellClear(editor,day){
  if(!confirm('Clear this cell?'))return;
  const existing=_wpCells[editor+'-'+day];
  if(!existing?.id){closeModal();return;}
  const headers={'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY};
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/weekly_plan_cells?id=eq.${existing.id}`,{method:'DELETE',headers});
    delete _wpCells[editor+'-'+day];
    closeModal();toast('Cleared','success');wpGridRender();
  }catch(e){toast('Clear failed','error');}
}

}

function agRenderGrid(){
  const g=document.getElementById('agCardGrid');
  if(!g)return;
  // Group alerts by agent
  const groups={};
  _agentRawAlerts.forEach(a=>{
    const k=a.agent||'system';
    if(!groups[k])groups[k]={alerts:[],unread:0,maxSev:'info'};
    groups[k].alerts.push(a);
    if(!a.read_at)groups[k].unread++;
    const sevRank={critical:3,warning:2,info:1};
    if((sevRank[a.severity]||0)>(sevRank[groups[k].maxSev]||0))groups[k].maxSev=a.severity;
  });
  // Always show known agents even if no alerts
  Object.keys(AGENT_META).forEach(k=>{if(!groups[k])groups[k]={alerts:[],unread:0,maxSev:'ok'}});
  const sevCfg={
    critical:{border:'#ef4444',bg:'rgba(239,68,68,0.06)',glow:'rgba(239,68,68,0.25)',bar:'linear-gradient(90deg,#ef4444,#b91c1c)',badge:'#ef4444',label:'ALERT'},
    warning: {border:'#f59e0b',bg:'rgba(245,158,11,0.06)',glow:'rgba(245,158,11,0.2)', bar:'linear-gradient(90deg,#f59e0b,#d97706)',badge:'#f59e0b',label:'WARNING'},
    info:    {border:'#3b82f6',bg:'rgba(59,130,246,0.05)',glow:'rgba(59,130,246,0.15)',bar:'linear-gradient(90deg,#3b82f6,#1d4ed8)',badge:'#3b82f6',label:'INFO'},
    ok:      {border:'#22c55e',bg:'rgba(34,197,94,0.04)', glow:'rgba(34,197,94,0.15)', bar:'linear-gradient(90deg,#22c55e,#15803d)',badge:'#22c55e',label:'CLEAR'},
  };
  const cards=Object.entries(groups).sort((a,b)=>{const r={critical:3,warning:2,info:1,ok:0};return (r[b[1].maxSev]||0)-(r[a[1].maxSev]||0);});
  if(cards.length===0){g.innerHTML='<div style="grid-column:1/-1;color:var(--text-2);font-size:13px;padding:32px 0;text-align:center;">✅ No alerts — everything running smoothly.</div>';return;}
  g.innerHTML=cards.map(([key,grp])=>{
    const m=_agentMeta(key);
    const cfg=sevCfg[grp.maxSev]||sevCfg.ok;
    const issueCount=grp.alerts.filter(a=>a.severity==='critical'||a.severity==='warning').length;
    return `<div class="ag-card" data-ag-key="${key}" style="border:1px solid ${cfg.border};background:${cfg.bg};border-radius:12px;cursor:pointer;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s;" onmouseenter="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 28px ${cfg.glow}'" onmouseleave="this.style.transform='';this.style.boxShadow=''">
      <div style="height:3px;background:${cfg.bar};"></div>
      <div style="padding:14px 14px 12px;">
        <div style="font-size:24px;margin-bottom:8px;">${m.icon}</div>
        <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;">${m.label}</div>
        <div style="font-size:10px;color:var(--text-2);line-height:1.4;margin-bottom:10px;">${m.desc}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:${cfg.badge};color:#fff;">${cfg.label}</span>
          ${issueCount>0?`<span style="font-size:11px;font-weight:700;color:${cfg.border};">${issueCount} issue${issueCount>1?'s':''}</span>`:`<span style="font-size:10px;color:var(--text-3);">${grp.alerts.length} log${grp.alerts.length!==1?'s':''}</span>`}
        </div>
        ${grp.unread>0?`<div style="position:absolute;top:10px;right:10px;background:#ef4444;color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;">${grp.unread}</div>`:''}
      </div>
    </div>`;
  }).join('');
  g.onclick=e=>{const c=e.target.closest('[data-ag-key]');if(c)agOpenDrawer(c.dataset.agKey);};
}

// === CTRL+K COMMAND BAR ===
var _cmdOpen=false,_cmdIdx=0,_cmdResults=[];
function cmdOpen(){
  _cmdOpen=true;_cmdIdx=0;_cmdResults=[];
  var el=document.getElementById('vsCmd');if(!el)return;
  el.style.display='flex';
  var inp=document.getElementById('vsCmdInput');if(inp){inp.value='';inp.focus();}
  cmdFilter('');
}
function cmdClose(){
  _cmdOpen=false;
  var el=document.getElementById('vsCmd');if(el)el.style.display='none';
}
function cmdFilter(q){
  q=q.toLowerCase();
  var pages=(isEditor()?PAGES_EDITOR:PAGES_FULL).filter(p=>p.key!=='inspo');
  var navItems=pages.map(p=>({type:'nav',label:p.label.replace(/[🤖⚡↗]/g,'').trim(),key:p.key,hint:'Go to page'}));
  var actions=[
    {type:'action',label:'Add Video Project',key:'add_project',icon:'🎬',hint:'Quick action'},
    {type:'action',label:'Add Task',key:'add_task',icon:'✅',hint:'Quick action'},
    {type:'action',label:'Add Drive Link',key:'add_drive',icon:'🔗',hint:'Quick action'},
  ];
  var clients=(DATA.clients||[]).map(c=>({type:'client',label:c.name,key:c.id,icon:'👥',hint:'View client'}));
  var all=[...navItems,...actions,...clients];
  if(q){all=all.filter(r=>r.label.toLowerCase().includes(q));}
  _cmdResults=all.slice(0,12);_cmdIdx=0;cmdRenderResults();
}
function cmdRenderResults(){
  var el=document.getElementById('vsCmdResults');if(!el)return;
  if(!_cmdResults.length){el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-3);font-size:13px;">No results</div>';return;}
  el.innerHTML=_cmdResults.map((r,i)=>{
    var icon=r.type==='nav'?'→':r.icon||'→';
    var active=i===_cmdIdx?'background:rgba(168,85,247,0.12);':'';
    return `<div class="vs-cmd-row" data-cmd-idx="${i}" style="${active}display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-radius:6px;transition:background .12s;">
      <span style="font-size:16px;width:22px;text-align:center;">${icon}</span>
      <div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:var(--text);">${esc(r.label)}</div><div style="font-size:10px;color:var(--text-3);">${r.hint}</div></div>
      ${r.type==='nav'?'<span style="font-size:10px;color:var(--text-3);background:var(--surface-3);padding:2px 7px;border-radius:4px;">page</span>':''}
    </div>`;
  }).join('');
  el.querySelectorAll('.vs-cmd-row').forEach(row=>{
    row.onmouseenter=()=>{_cmdIdx=parseInt(row.dataset.cmdIdx);cmdHighlight();};
    row.onclick=()=>cmdSelect(_cmdIdx);
  });
}
function cmdHighlight(){
  document.querySelectorAll('.vs-cmd-row').forEach((r,i)=>{r.style.background=i===_cmdIdx?'rgba(168,85,247,0.12)':'';});
}
function cmdSelect(i){
  var r=_cmdResults[i];if(!r)return;
  cmdClose();
  if(r.type==='nav'){navTo(r.key);}
  else if(r.type==='action'){
    if(r.key==='add_project')openProjectForm();
    else if(r.key==='add_task')openTaskForm();
    else if(r.key==='add_drive'){navTo('drive_links');}
  }
  else if(r.type==='client'){navTo('clients');setTimeout(()=>{var btn=document.querySelector('[data-client-id="'+r.key+'"]');if(btn)btn.click();},400);}
}
document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();_cmdOpen?cmdClose():cmdOpen();return;}
  if(!_cmdOpen)return;
  if(e.key==='Escape'){cmdClose();}
  else if(e.key==='ArrowDown'){e.preventDefault();_cmdIdx=Math.min(_cmdIdx+1,_cmdResults.length-1);cmdHighlight();}
  else if(e.key==='ArrowUp'){e.preventDefault();_cmdIdx=Math.max(_cmdIdx-1,0);cmdHighlight();}
  else if(e.key==='Enter'){e.preventDefault();cmdSelect(_cmdIdx);}
});

// === DAILY TASK CHECK-IN ===
function vsCheckinKey(){return 'vs-checkin-last-'+(currentUser?currentUser.name:'');}
function vsCheckinMaybeShow(){
  if(!currentUser)return;
  var today=new Date().toISOString().slice(0,10);
  if(localStorage.getItem(vsCheckinKey())===today)return;
  var todayStr=today;
  var myTasks=(DATA.tasks||[]).filter(function(t){
    if(t.completed||t.status==='done'||t.status==='completed')return false;
    var due=t.deadline||t.due_date;if(!due)return false;
    if(due.slice(0,10)>todayStr)return false;
    var assignedTo=(t.assign||'').toLowerCase();
    var me=(currentUser.name||'').toLowerCase();
    return assignedTo===me||assignedTo==='video';
  });
  if(!myTasks.length){localStorage.setItem(vsCheckinKey(),today);return;}
  vsCheckinRender(myTasks);
}
function vsCheckinRender(tasks){
  var today=new Date().toISOString().slice(0,10);
  var byClient={};
  tasks.forEach(function(t){
    var cl=getClient(t.client_id);var key=(cl?cl.name:'No Client');

      cts.map(function(t){
        var due=t.deadline||t.due_date;var ov=due&&due.slice(0,10)<today;
        return '<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface-2);border-radius:7px;margin-bottom:5px;border:1px solid var(--border);">'+
          '<input type="checkbox" data-ci-task="'+t.id+'" style="accent-color:#a855f7;width:14px;height:14px;flex-shrink:0;">'+
          '<div style="flex:1;min-width:0;"><div style="font-size:12px;font-weight:500;color:var(--text);">'+esc(t.title||t.text||'')+'</div>'+
          '<div style="font-size:10px;color:'+(ov?'#ef4444':'var(--text-3)')+';">'+fmtDate(due)+(ov?' · OVERDUE':'')+'</div></div></div>';
      }).join('')+'</div>';
  }).join('');
  var badge=tasks.length;
  var html='<div id="vsCheckinOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1200;display:flex;align-items:center;justify-content:center;">'+
    '<div style="background:var(--surface);border:1px solid rgba(168,85,247,0.25);border-radius:16px;width:420px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(168,85,247,0.08);">'+
      '<div style="background:linear-gradient(135deg,rgba(168,85,247,0.13),rgba(168,85,247,0.04));border-bottom:1px solid rgba(168,85,247,0.13);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;">'+
        '<div style="width:38px;height:38px;background:linear-gradient(135deg,#a855f7,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">✅</div>'+
        '<div><div style="font-size:14px;font-weight:700;color:#fff;">Daily Check-In</div><div style="font-size:11px;color:rgba(168,85,247,0.8);margin-top:2px;">'+badge+' overdue task'+(badge!==1?'s':'')+' need your attention</div></div>'+
        '<button onclick="vsCheckinClose(false)" style="margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.3);font-size:20px;padding:2px 6px;border-radius:4px;" title="Close">×</button>'+
      '</div>'+
      '<div style="flex:1;overflow-y:auto;padding:16px 20px;">'+rowsHtml+'</div>'+
      '<div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;">'+
        '<button onclick="vsCheckinSnooze()" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);border-radius:8px;padding:7px 16px;font-size:12px;cursor:pointer;font-weight:500;">Snooze 2h</button>'+
        '<button onclick="vsCheckinClose(true)" style="background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;color:#fff;border-radius:8px;padding:7px 16px;font-size:12px;cursor:pointer;font-weight:600;">Done for now ✓</button>'+
      '</div>'+
    '</div>'+
  '</div>';
  var div=document.createElement('div');div.id='vsCheckinWrap';div.innerHTML=html;document.body.appendChild(div);
  div.addEventListener('change',async function(e){
    var cb=e.target.closest('[data-ci-task]');if(!cb)return;
    var id=parseInt(cb.dataset.ciTask);
    if(cb.checked){
      try{
        if(sb)await sb.from('tasks').update({completed:true,status:'done'}).eq('id',id);
        var row=cb.closest('div[style*="surface-2"]');if(row){row.style.opacity='0.4';row.style.textDecoration='line-through';}
        // Update in-memory so badge count is correct without waiting for next fetchAll
        if(DATA.tasks){var t=DATA.tasks.find(function(t){return t.id===id;});if(t){t.completed=true;t.status='done';}}
        vsUpdateCheckinBadge();
      }catch(_){cb.checked=false;}
    }
  });
}
function vsCheckinClose(markDone){
  if(markDone){var today=new Date().toISOString().slice(0,10);localStorage.setItem(vsCheckinKey(),today);}
  var el=document.getElementById('vsCheckinWrap');if(el)el.remove();
  vsUpdateCheckinBadge();
}
function vsCheckinSnooze(){
  var snoozeUntil=Date.now()+2*3600000;localStorage.setItem(vsCheckinKey()+'_snooze',snoozeUntil.toString());
  var el=document.getElementById('vsCheckinWrap');if(el)el.remove();
}
function vsUpdateCheckinBadge(){
  var today=new Date().toISOString().slice(0,10);
  var done=localStorage.getItem(vsCheckinKey())===today;
  var btn=document.getElementById('vsCheckinBtn');if(!btn)return;
  if(done){btn.style.display='none';return;}
  var overdue=(DATA.tasks||[]).filter(function(t){
    if(t.completed||t.status==='done'||t.status==='completed')return false;
    var due=t.deadline||t.due_date;if(!due)return false;
    if(due.slice(0,10)>today)return false;
    var assignedTo=(t.assign||'').toLowerCase();var me=(currentUser?currentUser.name:'').toLowerCase();
    return assignedTo===me||assignedTo==='video';
  }).length;
  btn.style.display=overdue>0?'flex':'none';
  var badge=document.getElementById('vsCheckinBadge');if(badge)badge.textContent=overdue;
}

t:1.45;}#bbv-agent-alerts-section{margin:0 0 20px;padding:16px 18px;background:var(--surface-1,#0d0d1a);border:1px solid var(--border,#1e293b);border-radius:12px;}#bbv-alerts-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}#bbv-alerts-title{font-size:13px;font-weight:700;color:#a855f7;letter-spacing:.8px;text-transform:uppercase;}#bbv-alerts-run-btn{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer;font-weight:700;}#bbv-alerts-run-btn:hover{background:#7c3aed;}#bbv-alert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}.bbv-alert-card{padding:10px 12px;border-radius:8px;background:var(--surface-2,#111122);border:1px solid #1e293b;}.bbv-alert-card.alert{border-color:#ef4444;background:#180d0d;}.bbv-alert-card.ok{border-color:#22c55e;}.bbv-alert-card-name{font-size:11px;font-weight:700;color:#e2e8f0;margin-bottom:4px;}.bbv-alert-card-detail{font-size:10px;color:#94a3b8;line-height:1.4;margin-bottom:4px;}.bbv-alert-card-detail.alert{color:#fca5a5;}.bbv-alert-card-detail.ok{color:#4ade80;}.bbv-alert-card-time{font-size:9px;color:#475569;}';

    {keys:['pipeline','stages','pipeline stages','what are the stages','all stages','video stages'],ans:'<strong>🎬 Video Pipeline — 13 Stages:</strong>\n\n1. <strong>Video Shot</strong> — Raw footage received\n2. <strong>Cutting & Color</strong> — Initial cut + color grade\n3. <strong>Rendering</strong> — Export/render in progress\n4. <strong>Editing</strong> — Full edit underway\n5. <strong>Video Head Review</strong> — Ushane reviews\n6. <strong>Team Review</strong> — Team checks the edit\n7. <strong>Changes</strong> — Revision round\n8. <strong>Client Review</strong> — Sent to client\n9. <strong>Client Changes</strong> — Client wants edits\n10. <strong>COO Check</strong> — Shiara approves\n11. <strong>Sent to Client</strong> — Final delivered\n12. <strong>Add to Drive</strong> — Uploaded to Google Drive\n13. <strong>Posted</strong> — Live ✅\n\nDrag cards between columns to move them. Projects in the last 3 stages auto-archive after 72 hours.'},

    {keys:['archive','auto archive','auto-archive','archived','when does it archive'],ans:'<strong>📦 Auto-Archive:</strong>\n\nProjects in these 3 final stages auto-archive after <strong>72 hours</strong>:\n• Add to Drive\n• Sent to Client\n• Posted\n\nArchived projects are hidden from the main pipeline but not deleted. Admins and video heads can view and restore them from the Archive section.'},
    {keys:['tasks','my tasks','task','task book','task list'],ans:'<strong>✅ Tasks:</strong>\n\nThe <strong>Tasks</strong> page shows tasks assigned to the <strong>video</strong> team.\n\n• Editors see only their own tasks\n• Admins and video head see all video tasks\n• Tick the checkbox to mark a task done\n• Tasks can be linked to specific clients\n\nTasks are shared with BB Command Centre — admins see them from the main system.'},
    {keys:['time','time tracker','log time','my time','time tracking'],ans:'<strong>⏱ Time Tracker:</strong>\n\nLogs time per editor per project.\n\n• The system auto-calculates time from stage transitions\n• You can also add manual time logs\n• Weekly summaries are shown per editor\n• Admins see all editors; editors see only their own time\n\nNavigate to <strong>Time Tracker</strong> in the sidebar.'},

  function matchKB(q){
    var input=q.toLowerCase().replace(/[?!.,]/g,'').trim();
    var best=null,bestScore=0;
    for(var i=0;i<KB.length;i++){
      var e=KB[i],score=0;
      for(var j=0;j<e.keys.length;j++){
        var kw=e.keys[j].toLowerCase();
        if(input===kw){score=200;break}
        if(input.indexOf(kw)!==-1)score=Math.max(score,kw.length*3);
        if(kw.indexOf(input)!==-1&&input.length>3)score=Math.max(score,input.length*2);
        var qw=input.split(/\s+/),kw2=kw.split(/\s+/);
        for(var a=0;a<qw.length;a++){
          if(qw[a].length<3)continue;
          for(var b=0;b<kw2.length;b++){if(qw[a]===kw2[b])score=Math.max(score,10)}
        }
      }
      if(score>bestScore){bestScore=score;best=e}
    }
    return bestScore>=9?best:null;
  }

  }

  function buildErrorReport(){
    if(!_errLog.length)return'<span style="color:#4ade80">✅ No errors detected. System running clean!</span>';
    var html='<strong style="color:#f87171">⚠️ '+_errLog.length+' error(s):</strong><br><br>';

  // Write an issue to the central bug log (deduped + rate-limited so we never spam the DB)
  function report(issue){
    try{
      var key=(issue.category||'')+'|'+(issue.table_name||'')+'|'+(issue.message||'').slice(0,120);
      var now=Date.now();
      if(_seen[key]&&(now-_seen[key])<DEDUPE_MS)return;   // already logged recently
      _seen[key]=now;
      _issues.push(issue);
      // console first — always visible to a developer
      console.error('[BB Sentinel]',issue.category,issue.table_name||'',issue.message,issue.detail||'');
      // persist to system_bug_log via raw REST (independent of the app's sb client)
      fetch(SB_URL+'/rest/v1/system_bug_log',{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({
          app:APP,
          severity:issue.severity||'error',
          category:issue.category||null,
          table_name:issue.table_name||null,
          message:(issue.message||'').slice(0,500),
          detail:(issue.detail||'').slice(0,2000),
          user_name:who(),
          url:location.href.slice(0,300),

  function renderBanner(){

      el=document.createElement('div');

  // ---- Boot health check: ping every table the app needs ----
  function headCount(table){

    return fetch(SB_URL+'/rest/v1/'+table+'?select=id&limit=1',{

      var cr=r.headers.get('content-range'); // e.g. "0-0/20" or "*/0"

  }

  function checkHealth(){
    TABLES.forEach(function(t){
      headCount(t.name).then(function(res){
        if(!res.ok){

          var cat=res.status===404?'table_missing':(res.status===401||res.status===403?'db_permission':'network');

  }

  else window.addEventListener('load',waitAndRun);
})();
</script>

    el.innerHTML = '<div id="bb-detail-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9998;backdrop-filter:blur(3px);"></div><div id="bb-detail-panel" style="position:fixed;top:0;right:0;width:420px;max-width:92vw;height:100vh;background:#0f172a;border-left:1px solid #1e3a5f;z-index:9999;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;font-family:inherit;"><div id="bb-detail-header" style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #1e293b;flex-shrink:0;"><div style="display:flex;align-items:center;gap:10px;"><div style="width:3px;height:22px;background:linear-gradient(180deg,#6366f1,#8b5cf6);border-radius:2px;"></div><span id="bb-detail-title" style="font-size:15px;font-weight:700;color:#f8fafc;"></span></div><button id="bb-detail-close" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;">\u2715</button></div><div id="bb-detail-subhead" style="padding:10px 20px 0;font-size:11px;color:#64748b;flex-shrink:0;"></div><div id="bb-detail-body" style="flex:1;overflow-y:auto;padding:14px 20px 20px;"></div></div>';
    document.body.appendChild(el);
    document.getElementById('bb-detail-overlay').addEventListener('click', closeModal);
    var closeBtn = document.getElementById('bb-detail-close');
    closeBtn.addEventListener('click', closeModal);
    closeBtn.addEventListener('mouseenter', function () { closeBtn.style.background = '#ef4444'; closeBtn.style.color = '#fff'; });
    closeBtn.addEventListener('mouseleave', function () { closeBtn.style.background = '#1e293b'; closeBtn.style.color = '#94a3b8'; });
    var style = document.createElement('style');
    style.textContent = '#bb-detail-body::-webkit-scrollbar{width:5px}#bb-detail-body::-webkit-scrollbar-track{background:#0f172a}#bb-detail-body::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}.bbd-item{padding:10px 12px;margin-bottom:8px;background:#1e293b;border:1px solid #334155;border-radius:8px;font-size:12.5px;color:#e2e8f0;line-height:1.5;}.bbd-item strong{color:#f8fafc;}.bbd-ok{color:#10b981;font-size:13px;text-align:center;padding:30px 0;}.bbd-loading{color:#6366f1;font-size:13px;text-align:center;padding:30px 0;}.bb-card-hint{font-size:10px;color:#475569;margin-top:6px;text-align:right;letter-spacing:.3px;}';
    document.head.appendChild(style);
  }

  function openModal(agentKey) {
    var overlay = document.getElementById('bb-detail-overlay');
    var panel   = document.getElementById('bb-detail-panel');
    var title   = document.getElementById('bb-detail-title');
    var subhead = document.getElementById('bb-detail-subhead');
    var body    = document.getElementById('bb-detail-body');
    if (!overlay) return;
    var data = window.BB_VIDEO_DETAIL[agentKey];
    title.textContent = data ? data.label : agentKey;
    subhead.textContent = data ? (data.items.length + ' item' + (data.items.length !== 1 ? 's' : '') + ' found') : '';
    if (!data) {
      body.innerHTML = '<div class="bbd-loading">\u26a1 Running scan\u2026</div>';
    } else if (!data.items.length) {
      body.innerHTML = '<div class="bbd-ok">\u2705 All clear \u2014 no issues found.</div>';
    } else {
      body.innerHTML = data.items.map(function (t) { return '<div class="bbd-item">' + t + '</div>'; }).join('');
    }
    overlay.style.display = 'block';
    panel.style.transform  = 'translateX(0)';
  }

  function closeModal() {
    var overlay = document.getElementById('bb-detail-overlay');
    var panel   = document.getElementById('bb-detail-panel');
    if (overlay) overlay.style.display = 'none';
    if (panel)   panel.style.transform  = 'translateX(100%)';
  }

  function fixEmoji() {
    var t = document.getElementById(PREFIX + '-alerts-title');
    if (t) t.innerHTML = t.innerHTML.replace(/\ud83e\udd16/g, '\u26a1');
    var section = document.getElementById(SECTION_ID);
    if (section) section.innerHTML = section.innerHTML.replace(/\ud83e\udd16 AI Agent Alerts/g, '\u26a1 AI Agent Alerts');
  }

  var NEW_AGENTS_VID = [
    { key: 'ready-to-ship',    label: '\u2705 Ready to Ship',    desc: 'Videos cleared for delivery' },
    { key: 'revision-overload',label: '\ud83d\udd04 Revision Overload',desc: '3+ client revision rounds' }
  ];

  function addNewCards() {
    var section = document.getElementById(SECTION_ID);
    if (!section) return;
    var grid = section.querySelector('div[style*="grid"]') || section.querySelector('div[style*="display: grid"]') || section;
    NEW_AGENTS_VID.forEach(function (a) {
      if (document.getElementById(PREFIX + '-card-' + a.key)) return;
      var card = document.createElement('div');
      card.id = PREFIX + '-card-' + a.key;
      card.setAttribute('data-agent', a.key);
      card.style.cssText = 'background:#111827;border:1px solid #1f2937;border-radius:10px;padding:14px 14px 10px;cursor:pointer;transition:border-color .2s,box-shadow .2s;min-width:140px;';
      card.innerHTML = '<div style="font-size:12px;font-weight:700;color:#e5e7eb;margin-bottom:3px;">' + a.label + '</div><div style="font-size:10.5px;color:#6b7280;margin-bottom:10px;">' + a.desc + '</div><div id="' + PREFIX + '-val-' + a.key + '" style="font-size:22px;font-weight:800;color:#6366f1;">\u2014</div><div id="' + PREFIX + '-time-' + a.key + '" style="font-size:10px;color:#4b5563;margin-top:4px;">not run yet</div><div class="bb-card-hint">tap for details \u203a</div>';
      card.addEventListener('mouseenter', function () { card.style.borderColor = '#6366f1'; card.style.boxShadow = '0 0 0 1px #6366f133'; });
      card.addEventListener('mouseleave', function () { card.style.borderColor = '#1f2937'; card.style.boxShadow = 'none'; });
      card.addEventListener('click', function (e) { e.stopPropagation(); openModal(a.key); });
      grid.appendChild(card);
    });
  }

  var ALL_KEYS_VID = ['editing-stall','client-review-stall','changes-queue','deadline-alert','unassigned','ready-to-ship','revision-overload'];

  function attachClicks() {
    ALL_KEYS_VID.forEach(function (key) {
      var card = document.getElementById(PREFIX + '-card-' + key);
      if (!card || card._bbClickAttached) return;
      card._bbClickAttached = true;
      card.style.cursor = 'pointer';
      if (!card.querySelector('.bb-card-hint')) {
        var hint = document.createElement('div');
        hint.className = 'bb-card-hint';
        hint.textContent = 'tap for details \u203a';
        card.appendChild(hint);
      }
      card.addEventListener('mouseenter', function () { card.style.borderColor = '#6366f1'; });
      card.addEventListener('mouseleave', function () { card.style.borderColor = ''; });
      card.addEventListener('click', function (e) { e.stopPropagation(); openModal(key); });
    });
  }

  function setCard(key, count, level) {
    var valEl  = document.getElementById(PREFIX + '-val-' + key);
    var timeEl = document.getElementById(PREFIX + '-time-' + key);
    var cardEl = document.getElementById(PREFIX + '-card-' + key);
    if (!valEl) return;
    var colors = { red: '#ef4444', amber: '#f59e0b', green: '#10b981', info: '#6366f1' };
    valEl.textContent = count === 0 ? '\u2713 OK' : count + ' issue' + (count !== 1 ? 's' : '');
    valEl.style.color = colors[level] || colors.info;
    if (timeEl) timeEl.textContent = 'updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    if (cardEl) cardEl.style.borderColor = level === 'green' ? '#1f2937' : level === 'red' ? '#7f1d1d' : '#78350f';
  }

  function runDetailQueries() {
    var today = new Date().toISOString().split('T')[0];
    var threeDaysAgo   = new Date(Date.now() - 3 * 86400000).toISOString();
    var threeDaysAhead = new Date(Date.now() + 3 * 86400000).toISOString().split('T')[0];

    sbFetch('video_projects',
      'is_archived=eq.false&current_stage=in.(cutting_color_grading,rendering,editing)&updated_at=lte.' + threeDaysAgo + '&select=id,title,current_stage,deadline,client_id,assigned_editor_id'
    ).then(function (rows) {
      window.BB_VIDEO_DETAIL['editing-stall'] = {
        label: '\u23f8\ufe0f Editing Stalled (3+ days)',
        items: (rows || []).map(function (r) {
          return '\ud83c\udfa5 <strong>' + (r.title || 'Untitled') + '</strong> \u2014 stage: <strong>' + r.current_stage + '</strong>' + (r.deadline ? ' \u2014 deadline: ' + r.deadline : '');
        })
      };
      setCard('editing-stall', (rows || []).length, (rows || []).length ? 'red' : 'green');
    });

    sbFetch('video_projects',
      'is_archived=eq.false&current_stage=eq.client_review&select=id,title,deadline,client_id'
    ).then(function (rows) {
      window.BB_VIDEO_DETAIL['client-review-stall'] = {
        label: '\ud83d\udc41\ufe0f Awaiting Client Review',
        items: (rows || []).map(function (r) {
          return '\u23f3 <strong>' + (r.title || 'Untitled') + '</strong>' + (r.deadline ? ' \u2014 deadline: ' + r.deadline : ' \u2014 no deadline set');
        })
      };
      setCard('client-review-stall', (rows || []).length, (rows || []).length ? 'amber' : 'green');
    });

    sbFetch('video_projects',
      'is_archived=eq.false&current_stage=in.(client_changes,changes)&select=id,title,current_stage,client_id,assigned_editor_id'
    ).then(function (rows) {
      window.BB_VIDEO_DETAIL['changes-queue'] = {
        label: '\u270f\ufe0f Changes Queue',
        items: (rows || []).map(function (r) {
          return '\u270f\ufe0f <strong>' + (r.title || 'Untitled') + '</strong> \u2014 stage: ' + r.current_stage;
        })
      };
      setCard('changes-queue', (rows || []).length, (rows || []).length ? 'amber' : 'green');
    });

    sbFetch('video_projects',
      'is_archived=eq.false&current_stage=neq.posted&deadline=lte.' + threeDaysAhead + '&deadline=gte.' + today + '&select=id,title,deadline,current_stage,client_id'
    ).then(function (rows) {
      window.BB_VIDEO_DETAIL['deadline-alert'] = {
        label: '\u23f0 Deadline in 3 Days',
        items: (rows || []).map(function (r) {
          var days = Math.ceil((new Date(r.deadline).getTime() - Date.now()) / 86400000);
          return '\ud83d\udea8 <strong>' + (r.title || 'Untitled') + '</strong> \u2014 <strong>' + days + ' day' + (days !== 1 ? 's' : '') + ' left</strong> \u2014 stage: ' + r.current_stage;
        })
      };
      setCard('deadline-alert', (rows || []).length, (rows || []).length ? 'red' : 'green');
    });

    sbFetch('video_projects',
      'is_archived=eq.false&assigned_editor_id=is.null&current_stage=neq.posted&select=id,title,current_stage,client_id&limit=30'
    ).then(function (rows) {
      window.BB_VIDEO_DETAIL['unassigned'] = {
        label: '\ud83d\udc64 Unassigned Videos',
        items: (rows || []).map(function (r) {
          return '\u2753 <strong>' + (r.title || 'Untitled') + '</strong> \u2014 stage: ' + r.current_stage;
        })
      };
      setCard('unassigned', (rows || []).length, (rows || []).length ? 'amber' : 'green');
    });

    sbFetch('video_projects',
      'is_archived=eq.false&current_stage=in.(coo_check,add_to_drive)&select=id,title,deadline,current_stage,client_id'
    ).then(function (rows) {
      window.BB_VIDEO_DETAIL['ready-to-ship'] = {
        label: '\u2705 Ready to Ship',
        items: (rows || []).map(function (r) {
          var urgency = r.deadline && r.deadline <= today ? ' \u26a0\ufe0f DEADLINE PASSED' : '';
          return '\u2705 <strong>' + (r.title || 'Untitled') + '</strong> \u2014 stage: ' + r.current_stage + (r.deadline ? ' \u2014 deadline: ' + r.deadline : '') + urgency;
        })
      };
      setCard('ready-to-ship', (rows || []).length, (rows || []).length ? 'info' : 'green');
    });

    sbFetch('video_stage_history',
      'stage=eq.client_changes&select=video_project_id&limit=500'
    ).then(function (rows) {
      var counts = {};
      (rows || []).forEach(function (r) {
        counts[r.video_project_id] = (counts[r.video_project_id] || 0) + 1;
      });
      var overloaded = Object.keys(counts).filter(function (id) { return counts[id] >= 3; });
      if (!overloaded.length) {
        window.BB_VIDEO_DETAIL['revision-overload'] = { label: '\ud83d\udd04 Revision Overload', items: [] };
        setCard('revision-overload', 0, 'green');
        return;
      }
      sbFetch('video_projects',
        'id=in.(' + overloaded.join(',') + ')&is_archived=eq.false&select=id,title,current_stage,client_id'
      ).then(function (videos) {
        window.BB_VIDEO_DETAIL['revision-overload'] = {
          label: '\ud83d\udd04 Revision Overload (3+ rounds)',
          items: (videos || []).map(function (r) {
            return '\ud83d\udd04 <strong>' + (r.title || 'Untitled') + '</strong> \u2014 <strong>' + counts[r.id] + ' revision rounds</strong> \u2014 stage: ' + r.current_stage;
          })
        };
        setCard('revision-overload', (videos || []).length, (videos || []).length ? 'red' : 'green');
      });
    });
  }

  function init() {
    var attempts = 0;
    var check = setInterval(function () {
      attempts++;
      var section = document.getElementById(SECTION_ID);
      if (section || attempts > 60) {
        clearInterval(check);
        if (!section) return;
        fixEmoji();
        injectModal();
        addNewCards();
        setTimeout(function () {
          attachClicks();
          runDetailQueries();
          setInterval(function () { runDetailQueries(); }, 5 * 60 * 1000);
        }, 1500);
      }
    }, 400);
  }

  window.BB_VIDEO_DETAIL_PATCH = {
    runNow:   function () { runDetailQueries(); },
    openCard: function (key) { openModal(key); }
  };

  document.readyState === 'loading'
    ? document.addEventListener('DOMContentLoaded', init)
    : init();
}());
</script>
